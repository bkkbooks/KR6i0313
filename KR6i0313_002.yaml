body:
  text: 北涼三藏法師曇無讖譯經天台智者大師説文句門人灌頂録四明沙門知禮述文句記雙徑沙門明得會句并記入於經文記二明五戒事理復簡偏圓上雖通示五戒之義該攝淺深若不委論事理偏圓何能精識持犯之相此自分五初不殺戒二初委示二初總示事理持犯文句復次害命名事殺不害命名事不殺法門解者析法名理殺體法名理不殺當知不殺之戒種種不同論其果報亦復不同記欲令行者用理不殺持事不殺方名初心持具足戒今明體法須別空中體法即空乃屬偏觀望圓是殺須體諸法無非中道世相皆常是今所論理不殺戒欲顯此意故從人天辨至圓極故云因果種種不同二別明偏圓得失二初偏二初人天但事二初人文句若作意防護如馬著勒如牧牛執杖者報在人道百二十年唯得肉眼無有四眼記持戒功淺須加防護心如牛馬若非轡勒則見奔佚若無杖策則犯苗稼喻不作意則於境成犯報百二十年是上方壽人道諸根但明肉眼餘報可例二天文句若任運性成如河注海者報在六天極長者九百二十六億七千萬歲唯得天眼未得三眼記持戒功成任運成性心如河水自然注入淨戒海中未論定共唯報六天以人歲數較第六天當爾許歲唯得肉天無慧法佛餘根可知二三乘加理二初二乘文句若加修客戒無常苦無我等慧者報在變易壽七百阿僧祗唯得慧眼未得二眼記義攝藏通涅槃經以外道先出喻以舊醫如來後現喻以客醫佛所制戒名客戒也事戒之外加修隨道及無著戒此戒位極當教灰斷不説有報今據大乘生方便土受變易壽諸文不説此土壽限但因移果易耳今云七百阿僧祗者必取爾許劫數之後方入實報也若在此土破塵沙惑亦得法眼今論二乘初生之者但得慧眼二菩薩二初正示文句若加修常無常等慧報在蓮華藏海受法性身分得五眼分得常壽記義當別教次第修於三諦道共等常即假觀是智所讚及自在戒無常即空慧即是隨道及無著戒前空次假今從語便空慧居次言等慧者即中慧也乃是隨定及具足戒分得此二當於初地生實報土名華藏海佛眼分顯四眼乃融是故名為分得五眼諸根亦然壽是慧命已屬意根經云諸根復云壽命故須並説二結況文句比佛猶是諸根不具壽命損減況前諸根諸壽耶記此教比佛有於二意若當教者以因比果分滿不同二比圓教別教始終是菩薩法望圓始終皆是佛法故稱不具及損減也二圓二初示相二初明得意持二初略示事持文句若圓教人持事不殺戒記即不傷殺衆生身命此同偏小輪王之戒但不殺所以與之永異次文所明理觀是也二廣明理持三初約體明持文句及持理不殺戒不壞於身而隨一相不斷癡愛起於明脫體陰界入無所毀傷若子若果不生不滅記此理不殺若其不解性具九界但云體達諸法即理全波是水猶濫通別未顯圓修故荊溪云若不談具乃屬別教故須體達假合之身三惑癡愛三科實法皆性本具性無差別故名一相性非暗縛稱為明脫既即性具何可毀傷癡愛是子假實是果全體即性性豈生滅如斯妙觀即障是德不待轉除方是持於理不殺戒二稱性得報文句成就智慧居常寂光土常壽湛然五眼具足得根自在耳見眼聞得命自在修短自任記初住已上至于妙覺皆得名為成就智慧居常寂光此乃分滿依正二報也無生後報但現報故名常壽湛然無損減也五眼具足諸根亦然離不具也若論外用六根互通略舉眼耳根自在也現十界壽或修或短壽自在也三結示因果文句是則名為究竟持戒諸根具足命不損減也記二明得意犯二初總示二犯文句又圓教人何但持之是戒唯殺唯慈亦作事殺亦作理殺記此事理犯若其不解性具違用及殺法門但以慈愍能現逆相而解釋此豈前三教菩薩之行不能作耶故普門疏明瞋法門為成就故常念觀音是知須得性殺之意慈方無緣故云唯殺唯慈名得意犯二別示二相二初引人明事殺文句如仙豫大王殺五百婆羅門與其見佛之眼與其十劫之壽記大經聖行品佛説本生曾為國王名曰仙豫愛念大乘時世無佛十二年事婆羅門為師後遂勸彼發菩提心而婆羅門不信謗法王乃殺之而王不墮獄以無殺罪故至梵行品佛説慈心之果住一子地迦葉難言若菩薩住一子地云何佛昔為王斷婆羅門命邪佛言我以愛念故斷非惡心也諸婆羅門命終生阿鼻獄即有三念一自知從人道來二知是地獄三自知謗法為王所殺念是事已即信大乘尋時命終生甘露鼓王世界於彼壽命十劫我於位昔乃與是十劫壽命云何名殺然須明於得殺法門令其愛念成無緣慈方合疏文唯殺唯慈也二據經明理殺二初正釋文句又作法門殺者析蕩纍著淨諸煩惱如樹神折枝不受怨鳥如劫火燒木灰炭雙亡故鴦掘云我誓斷陰界入不能持不殺戒一切塵勞是如來種斷此種盡乃名為佛記前就不斷名持不殺今明有斷故云犯殺圓教自論斷與不斷二義同時既明六即六故有斷即故不斷亦可秪就即之一字明於二義障體即德無障可論斯為斷義障既即德障何嘗斷斯不斷義故煩惱即菩提生死即涅槃斷與不斷妙在其中諸大乘經説圓頓觀有此兩門今就有斷名為理殺故云析蕩纍著是業及諸煩惱以為所斷樹神喻於修觀之人劫火喻於能斷之智故大論三十云譬如空澤大樹衆鳥集宿一鴿後至住一枝上其枝即折澤神問其故樹神答曰此鳥從我怨家樹來食彼尼拘類子或當放糞子墮地者惡樹復生為害必大是故寧捨一枝所全者大菩薩亦爾於魔外惑業無如是畏而畏二乘二乘於菩薩邊亦如彼鳥壞彼大乘心永滅佛乘心今文但以怨鳥通纍著等也劫火等者亦大論文論第二云二乘雖破三毒氣分不盡如草木薪火燒煙出炭灰不盡火力薄故佛三毒永盡無餘譬如劫火燒須彌山一切地都盡無煙無灰今謂佛智即圓智也斷陰入界生死即涅槃也約即論斷名得意犯理觀斷破名不持戒此為誠證下諸理犯其義皆成一切塵勞是如來種此是性種亦敵對種惑非性染安名佛種以知即性修染本虗本虗名滅即理殺也二得報文句成就金剛微妙法身湛然應一切唯殺唯慈垂形九道隨其所宜示長短命任其所見用缺具根而化度之記事理二犯既順性德殺害法門故殺法成就乃得法身垂形九界示命長短現根缺具此自在用真因分得極果究竟二結勝文句前諸戒行淺近隘塞非是通途圓戒宏遠徑異會同故名究竟持不殺戒也記先且斥劣人天近事藏通淺理別教次第是故隘塞此等皆非修性不二通達之途唯圓實戒一攝一切宏廣無邊即事而中深遠莫測凡小之徑必會逆順之異能同十戒之中名畢竟戒二結責文句不殺之戒人天已上極佛已還曠大縱橫其義如是云何而謂是小乘數耶記先結該收後責局小二明不盜戒二初總明事理持犯文句復次不與取名事盜與取名事不盜法門解者如佛言曰他物莫取名法門不盜菩提無與者而取菩提是名法門盜不盜之戒種種不同記事盜可見就理論盜據阿含經演小成大人天取有藏通取空別取但中皆他物也非盜是何淨名云無取是菩提捨攀緣故二別明偏圓得失二初偏三初人天二初斥事持成犯文句若持戒作業求可意果可意果者無常速朽悉是他物臭如糞果害如毒食有智之人所不應求設使得之心不甘樂云何殷勤飲苦食毒而自毀傷記人天妄樂為可意也欲成理持乃斥事戒故就所求果報而責有漏之樂猶如糞中有菴羅果有智童子不應求食樂雜見思如世美食雜以毒藥食則害命有觀智人所不應求謂得華報心不甘嗜而生歡樂云何凡夫為欲持戒二約經文明報文句貧窮四姓即此三界洄澓困苦豈過有流三障障佛第一義天之所捨離是名為盜非不盜也記四姓者毗舍首陀婆羅門剎利人中雖謂二賤二貴既乏聖財四姓三界俱屬貧窮洄轉水也澓深水也漏心持戒求可意果正為有流洄澓所困三有流轉故曰有流非四流中一有漏因果具足三障能障見佛天中天也亦是障於第一義天以障隔故義言捨離此乃事持成於理犯據經招報貧窮困苦諸天捨離也二二乘二初斥理持成犯二初約有求斥文句又二乘之人以四諦智觀身受心法厭惡生死欣求涅槃涅槃心起為自為他為共為無因介爾心生即取他物記智舉四諦境唯在苦於身等四觀苦等四流厭生死欣涅槃樂在小名持於大名盜為於涅槃生欣求心介爾者微弱也微有心生即墮四性既有性過乃屬生死無所得中而生得想成不與取豈非盜邪二引諸經斥文句即非時取證即不待説所因焦種不生見苦斷集修道造盡非求法也謂有涅槃成涅槃見若有著空者諸佛所不度身長三百由旬而無兩翅墮三無為坑受若死若死等苦記煩惱為薪智慧為火成涅槃食不非時證此斥二乘匆匆取證是非時證不待法華説於所因於小涅槃思惟取證大根不發如焦敗種以見苦果故斷除集因以修道品故造趣滅盡則非大乘即惑成智無斷無修即生成滅無苦無盡故云非法求也中論云諸佛説空法為度著有者若有著空者諸佛所不度身長三百下引金翅鳥雛以為喻也二乘但念空無相無願三種三昧如身長三百無中假二智如無兩翅墮三無為坑如鳥墮地若死等苦成羅漢果也若死苦成辟支果也苦等於死名死等苦而實未死也或云二乘方便是死等苦聖位是死苦又學人是死等苦無學是死苦三無為者一擇滅二非擇滅三虗空通舉言三二乘所證蓋擇滅也然此喻本出大品而大論釋之謂金翅身長三百由旬能從一須彌至一須彌是鳥初出兩翅未成意欲飛去墮閻浮提受若死若死等苦中道生悔我欲還天不能自舉本喻菩薩墮二乘地今借喻二乘耳二引經明盜報文句法華云飢餓羸瘦體生瘡癬豈非貧窮困苦邪淨名云不見佛不聞法不入衆數豈非第一義天遠離邪此猶名盜非不盜也記不得大乘法食為飢餓無大力用為羸無大功德為瘦有無善上起見思如瘡癬不見三身一體之佛不聞圓頓之法不入三賢十聖衆數三菩薩二初斥次第成犯文句若別教菩薩次第行次第學次第道從淺至深捨一取一來已更復來去已更復去悉是辱於來去相亦是不與而取記行學道三對戒定慧言次第者此三皆隨空假中轉三諦縱故從淺至深是故逐一而論取捨生死為來空中為去本論生死已名為來去已載來建立生死故成兩來破有出界已名為去捨邊趣中名為更去故成兩去如此來去豈非屈辱諦觀不殊離二取相今既別修以觀緣諦名不與取二據經名盜報文句取已而捨亦是貧窮捨已更取數數去取即是困苦不即與第一義相應即是遠離此猶名盜非不盜也記取捨既數即此名為貧窮困苦盜業之報以別圓教詮變易報不就改生念動是業遷變是苦故起信論云動即有苦果不離因不能初心頓絶思議故使義天雖近而遠即捨離也二圓二初示相二初明得意持二初讚理持相文句圓人觀諸法實相受亦不受不受亦不受亦受亦不受亦不受非受非不受亦不受不受亦不受不取是菩提障諸願故是法平等無有高下不高故不取不下故不捨記唯有圓觀乃能究竟離不與取絶取之觀謂五不受即不受四邊及不受不受此五不受若其不以妙理甄之恐濫偏教是故先云圓人觀諸法實相諸法不出佛及衆生依報正報此乃逆順二修之法全修即性一一無非中道實相中實之相非待對相圓人觀此故無四受不獨境絶四句之待亦絶境觀能所之待故不受之觀亦不受也既於初心即依中實修五不受則唯屬圓也五不受故名為不取是大菩提能障一切有緣之願法法皆中高外無下下外無高何法可取何法可捨二約經明報文句如是觀者觀如來藏具足無缺是如意珠隨意出寶即修羅琴任意出聲即是大富大富故無取無取故即第一義第一義故天不遠離也是名究竟持不盜戒也記即以理富顯不貧窮富故不取寧有困苦以不取故思議即絶第一義天不相違背乃應經文諸天不離二明得意犯文句圓人復有盜法門菩提無與者而取菩提如海吞流不隔萬派如地荷負擔四重簷衆生悉度煩惱悉斷法門悉知佛道悉成此義可知不能多説記盜法門者所謂性惡佛所師故名之為法智由茲入故名為門圓人得門逆順自在能作理盜亦作事盜今文略事例殺例淫合有其相若理盜義文出鴦掘彼經偈云不與者菩提無有授與者不與而自取故我不與取此意乃明究竟不取是究竟取此取得名如海吞流四重擔者鴦掘經云譬如大地荷負重簷一者大水二者大山三者草木四者衆生菩薩亦爾正法住世餘八十年為一切衆生説如來藏是名初簷重於大山惡人毀罵聞悉能忍是第二簷重於大水無緣得為國主大臣説如來藏唯為下劣堪忍演説是第三簷重於衆生窮守邊地惡處豐樂之處不得止住是第四簷重於草木彼經四簷喻於四事觀今文意似喻四弘二結勝文句前諸戒行淺而且塞非是通途圓戒宏遠徑異會同故名究竟持不盜戒也記淺而且塞者且兼也三不淫戒二初示事理持犯文句復次男女身會名事淫不會名事不淫法門解者若心染法是名為淫不染法名為不淫不淫之戒種種不同記示事理者意在兼持以事扶理以理導事既居末代功在事持乃是涅槃扶律之意理持論於著不染者心觀他境名為染法即境為觀方名不染言種種者事隨理觀小大偏圓具如下辨二明偏圓得失二初偏三初人天二初人文句若關禁七支如猴著鎖擎一油鉢過諸大衆割捨觸樂求於未來淨潔五欲如市易法以銅錢博金錢此乃增長欲事非不欲也記持心未淳如猴著鎖擎一油鉢者大經譬如大衆滿二十五里王敕一臣擎一油鉢經由中過勿令傾覆若棄一滴當斷汝命復遣一人拔刀隨之臣受王勑盡心持行雖見五欲心不貪著彼經以二十五里喻二十五有拔刀喻無常今文喻凡夫持戒拔刀可喻三塗罪也割捨現粗求未來細如以賤易貴也二天二初六欲文句若為生天故持戒如羝羊相觸將前而更却帝釋共八十億那由他天女縱逸嬉戲看東忘西欲猶不足化為老修羅納舍脂使諸天亡身失首又見仙人入定汙弄其女仙從定起釋羞自化為羝羊仙人呪之千根著身無能却者後來懺謝變為千眼是亦增欲非不欲也記文舉帝釋意遍六天二八地文句若斷欲界粗弊之欲染著色無色界禪定之樂如氷魚蟄蟲墮長壽天是為一難貪著禪味名為大縛是染欲法非不欲也記以數息法攝五欲心意生四禪受枝林樂極至有頂如氷魚等豈知長壽八難中一攝在味禪非不染欲二二乘二初於小名持文句若憎惡生死如怨如蛇愛玩涅槃如親如寶棄之直去涉路不回諸有色聲不能染屈如八方風不能動須彌記知苦斷集如怨如蛇修道證滅如親如寶但自調故直去無悲濟故不回四方四維謂八方風喻於人天四違四順謂利衰毀譽稱譏苦樂也須彌喻二乘心也二於大名犯文句若聞菩薩勝妙功德甄迦羅琴聲迦葉起舞不能自持隨嵐風至破須彌如腐草是染欲法非不染也記隨嵐此云迅猛壞劫中此風起時能破須彌以界外二土五塵能動二乘也大論中迦葉聞甄迦羅琴不能自安即云八方風不能動須彌隨嵐風至破如腐草三界五欲我已斷竟不能動心此是菩薩淨妙五欲吾於此事不能自安三菩薩文句若菩薩惡生死如糞穢惡涅槃如怨鳥捨於二邊志存中道起順道法愛生名頂墮是菩薩旃陀羅既無方便此慧被縛不能勝怨己所修治為無慧利是染欲法非不欲也記此別菩薩望圓成犯緣但中道而生順愛若入十行退不取小不進求圓如墮山頂故名頂墮旃陀羅者此云嚴幟乃是西土屠殺之輩以惡業自嚴行時搖鈴持竹以為標幟故以為名今斥但中解者於圓菩薩猶如人中屠膾惡類也既無即中二觀方便乃被教道中慧所縛既與無明怨讐共住何能勝之別修之慧無無作利望畢竟淨是染欲法凡斥別教多是住行及十信人以回向位能圓修故二圓二初示相二初明得意持二初約義示三初示能淨諦觀文句圓人觀一心三諦即空即假即中即空何所染即假何所淨即中何所邊即空即假何所中記一心者見思心也觀此染心即是淨性性非淺狹極三諦源全諦發觀即空假中即空故不染於染即假故不染於淨即雙遮故不染二邊即雙照故不染中道三諦三觀秪一剎那能所不殊中邊俱淨二示所淨愛見文句即空故無我人十下知見依正等愛即假故無空無相願等愛即中故無佛菩提轉法輪度衆生等愛記上之諦觀俱為能淨今明見愛方是所淨須知所淨該於通別佛菩提等是順道愛深觀即中其愛自泯三示三諦名淨文句三諦清淨名畢竟淨是淨亦淨記淨是空義畢竟空者須空三諦以驗能空不少三觀能空亦空故是淨亦淨於通不塞也二引經證二初引經文文句經言唯佛一人具淨戒餘人皆名汙戒者記二會經意文句圓人引行於佛法即究竟持不淫戒也記經就位論持唯在果今約圓觀初心即能頓持佛戒以觀實相因果無殊若不爾者云何能以如來莊嚴而自莊嚴二明得意犯二初引諸經事文句圓人又有染愛法門如和須蜜多女人見人女天見天女見者得見諸佛三昧執手者得到佛剎三昧歍者極愛三昧抱者冥如三昧各各皆得法門亦如魔界行不汙戒菩薩變為無量身共無量天女從事皆令發菩提心如維摩詰若入後宮後宮中尊化正宮女先以欲鉤牽後令入佛道記既得本性染愛法門故能行於事染之行亦能示於理染之觀染觀可例取菩提義故今略之但依華嚴出事染相行不汙戒者菩薩名也先以欲鉤牽者愛欲如鉤能牽於人然後令彼達欲法界名入佛道二明用犯意文句斯乃非欲之欲以欲止欲如以屑出屑將聲止聲記指上三人久住性染無染法門能現修染故得名為非欲之欲而令衆生即欲悟性故得名為以欲止欲喻以屑者字應作榍又作楔同説文云楔櫼也櫼子林切出前櫼者必假後櫼故云以楔出楔也將聲止聲者大論第七云譬如執事比丘舉手唱言衆皆寂靜是為以聲遮聲非求聲也二結勝文句前諸行淺塞非是通途圓戒宏遠徑異會同是名究竟持不淫戒也記四明不妄語戒二初示事理文句復次不見言見見言不見名事妄語法門解者未得謂得未證謂證名為妄語妄語多種記問事中妄語重者乃是未得聖法言知言見今法門解於未證得謂已證得與事何別答蓋第四戒自知未得上人之法誑他言得故此妄語除增上慢若理妄語內心實謂已得已證此心增上而慢於他是增上慢故法華云比丘比丘尼自謂究竟便不志求無上菩提當知此是增上慢人今未解圓理於人天三教各自謂實名為妄語亦是上慢二明偏圓二初偏二初人天二初人二初妄語相二初愛文句諸欲求時苦得時多怖畏失時懷憂惱諸欲無樂時凡夫癡人於下苦中橫生樂想記下苦者輕苦也三塗苦重人間苦輕凡夫不覺計之為樂以苦為樂故曰橫生樂想也猶如世人罪合當死而以千罰放命罰實是苦以得全命罰罰之下皆生樂想又如病者恐死加之針灸針灸實苦言除病故皆生樂想八苦交煎妄謂為樂事亦如是二見文句豎我慢幢打自大鼓謂色即是我我即是色色中有我我中有色執有與無鬪執無與有鬪依止斷常起六十二戲論破慧眼不見於真實增見長諸非吾我毒甚盛記廣如大經凡夫外道慢心自高喻之竪幢口宣慢言喻之打鼓於五陰上各起四見文中略示色陰餘之四陰可以例作次句應云離色是我今云我即是色者文之誤也色中有我即色大我小也我中有色即我大色小也起六十二者五陰各起四見共成二十歷三世成六十而其所計不出斷常二見故有六十二也所説無實其猶諧謔故云戲論由斯戲論不見真空故破慧眼二結示口過文句備口四過略標妄語爾記見是妄情須生轉計即兩舌也宣邪惡理即惡口也巧飾邪言即綺語也諸見本邪以邪為正而誑於人故標妄語其實備四二天文句三十三天黃葉生死謂是真金非想自地具細煩惱謬計涅槃此非妄語誰是妄語邪記大經嬰兒行品云如彼嬰兒啼哭之時父母即以楊樹黃葉而語之言莫啼莫啼我與汝金嬰兒見已生真金想便止不啼然此楊葉實非金也木牛木馬木男木女嬰兒見已亦復生於男女等想即止不啼如來亦爾衆生造惡為説三十三天常樂我淨端正自恣於妙宮殿受五欲樂衆生聞已心生貪樂止不作惡勤作善業三十三天實是生死無常樂我淨為度衆生方便説有章安釋云此合天上四德楊葉喻妄淨色鮮明故楊樹喻妄常體柔軟故木牛木馬喻妄樂可戲故木男木女喻妄我似人故非想細煩惱者彼有十種細心數法一受謂識受二想謂識想三行謂法行四觸謂意觸五思謂法思六欲謂欲入出定七解脫謂行法解八念謂念於三昧九定謂心如法住十慧謂慧根慧力二二乘二初出行相文句二乘之人競執瓦礫歡喜持出生滅度想生實未盡寧得滅度生安隱想所作未辦寧得安隱淨名云佛為增上慢人説離淫怒癡名為解脫其實未得一切解脫記競執瓦礫者用大經春池失珠喻也春池譬衆生塵欲耽湎之境失珠譬圓解潛昏信小乘教如入水修觀如求珠但見偏真謂為究竟如得瓦礫便謂真珠生滅度安隱之想猶如歡喜持出也生實未盡者猶受變易故所作未辦者佛道未修故離毒説脫乃一小脫即毒明脫名一切脫大涅槃也佛為上慢執著三毒便為解脫是故説離聲聞住此謂究竟脫其實未得一切解脫此以淨名對法華文出妄語相也二結成妄語文句未得謂得豈非妄語邪記三菩薩二初示其行相文句佛為別教人以四門説實相執於一有隔礙三門乃至執非有非無而隔有無記佛説四門意詮一實別人根鈍各執一門彼此隔礙二結為妄語文句夫實相者言語道斷心行處滅云何以字字於無字云何以數數於無數豈非妄語邪記諸法實相離言説相離心緣相以法法體遍多少性融豈可定以空有等言一二等數此教言思既乖實理非妄是何二圓二初示相二初明得意持二初總標心口文句圓人如實而觀如實而説記圓人根利聞空有等皆知性具性具四門豈有隔礙一門具三三門皆爾稱性而觀稱性而説既皆稱性性絶言思故觀即無觀説即無説是故觀説皆云如實二別釋心口二初明心離諸相而觀文句如實觀者非內觀得是解脫非外觀非內外觀非離內外觀亦不以無觀得是解脫記所非內外或約自他或約根塵或約心法或約法性對於無明此等內外雙亦雙非皆成四相妙觀得脫皆離此四亦不以無四相觀而得解脫性空非四相空非無此之二空名濫通教須就圓理揀彼偏空圓理者何謂諸四相不出本覺全本為始即境是觀豈更偏著四種之性及無四之相非此二空不名解脫二口稱四實而説二初約法示文句如實説者一切實一切不實一切亦實亦不實一切非實非不實如是皆名諸法實相記實等四句亦乃不出本覺之性以此覺性真空畢竟故名為實具足緣起故名不實二不相礙故成雙亦二無二相故即雙非覺性無偏四皆全分實攝三句乃一實一切實不實攝三餘二亦爾是故四句皆云一切其圓解者雖談一句一外無餘何有一言不稱本覺真實之性是故四句皆得名為如實説也二引經證文句經言諸佛皆實語佛語實不虗能以一妙音遍滿三千界隨意之所至隨諸衆生類各各皆得解即是以佛道聲令一切聞也記初心圓説與果無殊故引法華本佛作證佛施權迹及開實本皆稱真如有何一句而非實邪似位妙音髣佛同佛口密之相開小成大能似佛聲如實而説令諸衆生聞皆入實二明得意犯三初約果人示文句圓人亦有妄語法門無車説車誘戲童子無樂説樂止彼啼兒若有衆生因虗妄説得利益者佛亦妄説記雖就果示意顯始行故云圓人妄語法門者乃是性德權巧妙門也稱妄語者無而説有也謂十界冥合本是一乘無有三乘差別之相佛為機故分別説三令諸衆生各為究竟自求趣證速出生死如無三車説有三車令諸樂著嬉戲之子爭出火宅天無常樂説有常樂如以黃葉止彼啼兒此皆巧用妄語法門而為利益也二引經證文句經言我是貪欲尸利我是瞋恚尸利愚癡尸利然實非也我是天是人實非天人我是龍鬼實非龍鬼記諸法無行經中文殊説不動相法門已空中萬天子讚言世尊文殊名為無礙尸利不二尸利等文殊語天子言止止天子汝等勿取相分別我不見諸法是上中下我是貪欲尸利等具如今疏天子唯以性善法門而讚文殊且別教但中豈非性善須斷九界然後證得斯乃於法見上中下文殊欲顯圓頓之理具足善惡無非法界特以三毒而自立稱然三毒等雖俱性具不異而異是即實之權皆是祕妙方便之法故一一句望實言非成妄語義雖是妄語而皆是性本具法門今宗講者才聞權假便謂非性吾知其人未生圓解三明犯意文句將虗以出虗令得不虗爾記同於前文以楔出楔也二結勝文句前諸行淺近隘塞圓行深遠夷坦無礙徑異會同故能如此是名究竟持不妄語戒也記五明不飲酒戒二初示事理文句復次若穀若草昏心眩亂者名事酒法門解者迷惑倒見名之為酒倒見多種記二明偏圓二初偏三初人天二初人中事酒二初據教明過文句夫酒為不善諸惡根本既生三十六種之失招於五百世中無手慢刑失禮發出伏匿眠臥糞穢搪揬水火記三十六失出沙彌戒經大論唯三十五失結為頌曰財虗招病諍三裸露醜名彰二無智得者失二説匿廢事業二醒愁身少力二色壞慢父母二沙門婆羅門二及伯叔尊長二不敬佛法僧三黨惡遠賢善二破戒無慚愧二不守情縱色二人憎親屬棄二行惡捨善法二智人所不信一遠涅槃狂癡二命終墮惡道一若得人常騃一酒失三十五大論之所明五百世無手者梵網經云若佛子若自身手過酒器與人飲酒者五百世無手何況自飲伏匿皆隱也自説私隱故云發出也二斥人好尚文句過患如此人猶尚之晉世引滿稱藝能魏朝清濁為賢聖畢卓自署為酒徒鄭泉自誓為酒壺竹帛載之古今歌之不應作而作不應歌而歌非醉酒是何記引滿者晉左思蜀都賦云合樽促席引滿相罰樂飲今夕一醉纍月注云酒將闌故合併其樽促近其席引持也持滿以相罰酒厚樂極故醉纍月三國志魏尚書郎徐邈私飲至沈醉時科禁酒校尉趙達問以曹事邈曰中聖人達白之太祖太祖甚怒度遼將軍鮮于輔進曰醉客謂酒清者為聖人濁者為賢人邈性修慎偶醉言耳竟免刑晉畢卓為吏部郎比舍釀酒熟卓醉後夜至甕下盜飲之掌酒者縛之明旦乃畢吏部也自署為酒徒者以酒徒自號也如唐元結自號酒徒皮日休自號醉士之類也三國志吳大中大夫鄭泉字文淵陳郡人博學有奇志性嗜酒臨卒謂同類曰必葬我於陶家側庶百年後化成土卒見取為酒壺竹帛載之者謂史志皆書其事也古皆記言事於竹簡繒帛以未有紙也後代稱其故實故謂史籍為竹帛也古今歌之者古今之人不斥其失往往為歌詩以稱美之也不應作而作者引滿中聖酒徒酒壺之事皆耽湎荒恣其失大矣尚書酒誥誡之甚明而四賢反為之是君子所不應作之事而作之也不應歌而歌者古今之賢當貶其失而反作歌詩以美之也若作若歌非酒之過失而是何耶二三界惑酒二初別示二初引論明見醉文句釋論云有一法師為王説五戒罪福王難云飲酒招狂飲者甚多狂者何少邪法師舉手指諸外道而已更言餘事外道侜張云王難甚深是禿高座更不能答王云法師答竟狂亦不少指汝等是將護不彰爾此即世人之醉也記釋論第八文也王即南天竺王也侜張爾雅云侜張誑也侜字張由反二約喻明愛醉文句又貪如海納流無有滿時嗔如火益薪展轉彌熾癡如膠黏結如氷足水八萬塵勞煩惱其心無暫停住掣電蛇舌揚𦦨獼猴五欲攪作無時不醉大經云從昔已來常為聲色所醉流轉生死記二總結文句三界人天通有此醉也記二二乘二初斷通從別以明能醉文句若二乘之人雖斷九十八使四住煩惱無明未吐如半瘧人記九十八使者見惑有八十八思惑有十也四住者三果見合為見住地三界思分為三住地無明未吐者以酒喻惑也半瘧人者四住已除無明尚在半安半病其猶瘧疾此亦大經中喻二兼凡斥小以明所迷文句大經引醉歸之人世間無常樂而言我淨如來實我淨而言無常樂如彼醉人見日月轉此二乘醉也記引醉歸之者謂佛引醉喻歸還二乘也按哀歎品中諸比丘説醉喻以喻凡夫流轉無常見常如醉小乘修無常想故如醒佛即引醉喻於二乘謂於真常而見無常是醉義也故云引醉歸之文人合作文世間下文辭從省四倒四德各舉其二影互相顯三菩薩二初約教道觀中皆名不了三初法文句菩薩之人無明未盡不了了見菩薩行故見不了了記別教至極但破無明一十二品故於佛性見不了了又從初心不知五住即是法界不名佛法是菩薩行故於佛性見不了了二喻文句如遠望大舶遙觀鵝鴈夜覩畫像遠視人杌亦如醉人朧見道記凡舉五事悉喻見性不得了了舶者大船也喻出大經然彼十喻並喻於圓以分揀極故云見不了了今喻別者有二意一者別教極果秪齊圓教第二行故見不了了二者二教理同得意具德失意但中今就失意故以喻別如來藏經十喻亦爾止觀在別十六觀疏而顯於圓三合文句如是等無量譬喻顯於菩薩未得明了記二明自圓解外皆名邪見文句故迦葉云自此已前我等悉名邪見人也此菩薩醉也記未得圓中正見故也二圓二初示相二初明示行相二初得意持二初稱性觀故得名醒悟文句圓人行如來行具煩惱性能知如來祕密之藏雖有肉眼名為佛眼所可見者更不復見故文云入深法性即於此典金光明中而得見我釋迦牟尼大經云了了見佛性猶如妙德等記此段文意乃將果德頓為始行苟不了知第六識心是性惡者何能初心修如來行即觀祕藏肉眼即佛永不改觀而見牟尼與妙德等荊溪的示須聞性惡方修性行不可欺也二以圓伏故名除酒法文句是則五住正習一時無有餘酒法既除何所可醉是為究竟持不飲酒戒也記五住正習同居一念即惑為觀觀外無境如翻大地草木寧存亦如日光不與暗共有何酒法而不除耶此人事戒輕重等持與上理戒念念兼行方名究竟二得意犯二初明具大智故能理醉文句圓人亦有飲酒法門鴦掘云持真空瓶盛實相酒變化五道宣揚哮吼記何名大智謂了性具九界因果是故名為飲酒法門真空實相如起信論一真如性有二種德一如實空與過河沙煩惱不相應故二如實不空體具河沙功德無有所少故護一切失故空如瓶德用無礙故不空如酒然河沙性德即十法界圓融法門九界即佛成前持相佛界即九成今犯相故犯相云變化五道宣揚哮吼其猶𨠯酒之用也二明具大悲故能事醉文句波斯匿醉轉更多恩末利后飲佛言持戒入于酒肆自立其志亦立他志記波斯匿此云和悅若飲酒後應死判生故曰多恩末利即匿王正后也王嘗瞋怒欲殺厨人諸臣共議國中唯有此人殺已無人知厨稱王意者時末利后即辦好酒美肉沐浴名香莊嚴身體將諸妓女來至王所王見后已瞋心乃息后即遣人詐傳王敕勿殺厨人匿王後以此事問佛后持五戒月行六齋一日之中犯酒妄二戒八戒之中則犯其五謂過中食服香華作倡妓高廣牀飲酒妄語也破戒之罪輕耶重耶佛言如是犯者得大功德何以故為利益故出未曾有經六卷入于酒肆即淨名居士此上三人皆是高位皆住性惡權巧法門故於持犯得大自在不可秪將慈念而解若無性染慈豈無緣二結得斥失文句夫得其門者逆順俱當失其柄者操刀傷手記若得性具善惡之門則逆順俱當失茲要枘則持犯俱非如把刃自害得失之要不可不窮二結勝文句前諸行淺近隘塞圓行宏遠徑異會同故能如此是名究竟醉醒無二也記若善惡分岐豈醉醒不二諸佛究盡寧有所偏二觀心釋圓論理戒豈不觀心但為前文是約教釋正為開解今撮五戒入一念心成於圓觀正為立行即聞而修修發之門説者應授若不爾者數寶何為分二初附上諦智問文句上觀四諦智名四佛觀五佛云何觀記上觀四諦各發覺智乃言四佛今明五戒亦可觀之成五佛不問意如此二據今戒體答文句觀五戒實相覺智清淨即是觀心中見五佛也記若觀五戒是實相者所發覺智豈非五佛然五實相是所觀境五境發智名為五佛實相無相尚叵言一豈定五耶由附五戒各見實理故似分五實理者何所謂本覺此之覺體是無緣慈故名不殺無取故不盜無染故不淫真實故不妄明了故不飲今圓行人以妙三觀順性修慈乃至三觀順性修智説之如此修乃同時故得名為觀五實相觀之不已本覺全體發成始覺名為五佛名字觀五觀行已去皆得稱發二破煩惱障愁憂恐怖記文三初節示經文文句次破煩惱障指愁憂恐怖一句是也記二對上下辨二初對上下定體二初對上報論義便文句上來諸事或約內身或約外報是報障義便此一句專明心為煩惱障便記報多約色惑唯在心故云義便二與下業論體別二初問起文句報障如上可解煩惱與業云何記以十惡中貪瞋癡業名同煩惱如何分別二釋通二初引數人釋文句數人云數起而輕名煩惱數起而重名為業記二俱數起但以輕重分於惑業二今師釋二初約心剋示文句天台師云任運常有是煩惱卒起決定心發動身口必牽來報者是業記貪等決定發動身口招報名業以異煩惱非決故故二因示生疑二初疑文句若爾惡星災異都不關心云何是業障記若決定心發動身口名為業者下惡星等自是外境何名業障二釋文句此乃外相表業將起是業責報之相即得是業障也記星等乃是業之前相表於責報故屬業障今示作業體下明宿業相若論作起時豈非心色二對上下論轉文句若煩惱業轉報未必轉若報轉業煩惱必轉記二障在因是故易轉報障已受是故難轉難者若轉易者必去三約文示相二初通別文句通論見思煩惱皆有愁憂恐怖別論愁憂屬見煩惱恐怖屬愛煩惱記通論可見若別論者見惑執我愛但著事此之二惑皆具三毒執我三毒若其不遂則多愁憂著事三毒既不執我但恐不遂必無愁憂二指廣文句今不具記云云記章安記録不能廣陳見思之相令後説者委而示之故注云云三破業障惡星災異衆邪蠱道變怪相續臥見惡夢晝則愁惱記文二初節經文句三破業障者從惡星災異下是也記二釋義三初定文是業文句業將感報故其相前現相名表發意在此也記已作之業將感惡報故有異相表發其事驗知此句明於業障二略釋經文文句惡星者別有客星也亦是五星二十八宿一方有七四七二十八也違其度數失其分野若熒惑亂行麻彗暴出是客星也災異者風雨雪霜乖候等是也衆邪者有三人邪鬼邪法邪是也蠱道者毒鬼也又言三毒是蠱也變怪者詭怪也謂禽獸醜惡形聲等是也惡夢者心靈潛密業現其中夢見不適意事是也記別有客星者以五星二十八宿常現則非惡星亦是下約常星失其行度躔次亦名惡星一方有七者角亢氐房心尾箕東方蒼龍七宿南斗牽牛須女虗危營室壁北方玄武七星奎婁胃昴畢觜參西方白虎七宿東井鬼柳七星張翼軫南方朱鳥七宿凡四方之宿皆逆數宿音秀失其分野者周官云天星皆有州國分野角亢氐兖州房心豫州尾箕幽州斗牽牛婺女楊州虗危青州營室東壁并州奎婁胃徐州昴畢冀州觜檇醉綏反參益州東井與鬼雍州柳七星張三河翼軫荊州熒惑火星也漢書音義云妖星曰孛星彗星長星亦曰攙搶釋名云星光稍稍似彗言其孛孛然似掃彗也又類散麻故云麻彗左傳凡人火曰火天火曰災今但取風雨雪霜乖候者皆名災法邪謂外道經書蠱道者事釋乃是他鬼毒害於人蠱工戶反聲類作戈者反蠱物害人也説文蠱腹中蟲也楞嚴云貪恨為罪是人罪畢遇蠱成形名蠱毒鬼理解乃是自心三毒名之為蠱此蠱能害百千萬身法身慧命永為所害比夫毒鬼為害至微矣醜惡形聲見聞為怪不適意者適悅也三勸令正信二初明相見表五罪二初約現文表示文句夫諸業表報不出五罪若惡星表亡身失命者殺生業相也惡星表神棄困窮者竊盜業相也惡星表親離幽厄者淫罪業相也惡星表誣枉讒謗者妄語業相也惡星表喪失財産者飲酒業相也記親離即親厚鬪訟幽厄即王法所加幽謂幽禁二例餘相亦然文句其餘災異怪禽惡夢等隨其時節各有所表細心推詳不出五罪之報記二誡行者問邪師文句行者知解推之何須折篾鑽龜問管公明邪記禮記曰龜謂之卜蓍謂之筮卜筮者所以決嫌疑定猶豫也今云折篾篾謂竹篾謂揲蓍取卦折竹篾為文也管公明者魏人也名輅字公明善卜筮所向皆驗應知惡報由罪結罪由心苟正于心罪報自蕩不修內德卜筮何為吳氏春秋云宋景公時熒惑在心公召子韋問焉子韋曰禍當君雖然可移於宰相公曰宰相所以與理國家可移於民公曰民死寡人將誰為君可移於歲公曰歲飢民餓死為民后而殺其民誰以我為君乎子韋曰君有至德之言三天必祐君熒惑必三徙舍舍行七里一里當一年君延年二十一矣熒惑果徙三舍況能內觀法性達罪本空均生佛於自心起慈悲於法界惡星之變何慮乎不滅耶故於次文明其方法二舉方法若依初開章為四此當第三能破方法今依重科當淨洗浴聽是經典至心清淨著淨潔衣專聽諸佛甚深行處記從諸根不具下敘空品文為二初三行半明所破之惡即三障文也次二行半明能破之方即今文也而釋一行半訖復依初開章以後一行為四結成然取義成分章從便分三初節經立意文句從當淨洗浴下二舉方法能空於惡也記以順重科云能空也二據意釋經三初立意文句前業相外彰報對不久內無方法何以禳之約其三業作三德之方以事表理也記禳謝也又除殃祭也二釋經二初釋前三句文句洗浴臭體擬作法身緘脣攝耳擬聽般若至心清淨擬作解脫記欲知智在説故以聽經而為般若又聽經發智慧故心有染故用不自在今既清淨能成解脫二釋後三句文句前令洗浴內身後更勸淨外服內外相成爾前但令聽後誡令專聽鄭重緘口爾前令至心後示至心之境成其方法爾記至心之境即甚深行處不念此處安名至心三勸信二初約身陳類文句夫人身本於不淨蓮華本於淤泥譬如栴檀生于伊蘭世間理見也記今之三業表法之身本是血肉不淨之物次舉二喻栴檀香木伊蘭臭樹大經明闍王造逆後既見佛罪除乃自敘云我見世間從伊蘭子生伊蘭樹不見伊蘭生栴檀樹我今始見從伊蘭子生栴檀樹伊蘭子者我身是也栴檀樹者即是我心無根信也二約行可期文句今近因三業規矩遠成三德妙義可不信哉記三業雖近三德雖遠修得規矩即近成遠規圓矩方孟子曰大匠訓人必以規矩三行成破障文句洗浴法身能禳報障攝耳緘口能禳煩惱障至心能禳業障云云記若於浴等無三德觀如何能禳三障惡罪四結成是經威德能悉消除如是諸惡令其寂滅記文三初節示經文文句從是經威德下四結成也記二正釋經義文句能悉消除者明三障轉也令其寂滅者三德成也記三深明經意四初據今文示法文句寂滅秪是涅槃涅槃秪是三德記寂滅華音涅槃梵語涅槃之名召三德體故知寂滅是三德成二約行成德顯文句前三業方法既成三障理數應轉三障既其已轉理數成於三德記三業既修金光明行成則契於三德之理修在名字觀行相似至分真位皆得名為轉障成德不爾豈曰行方等經三明轉障成德文句報障轉成法身德煩惱障轉成般若德業障轉成解脫德記四明經巧難知文句前寄事相將淺以表深後明寂滅將深以結淺經文繡密見之者寡云云記二敘流通明教相護世四王將諸官屬并及無量夜叉之衆悉來擁護持是經者大辨天神尼連河神鬼子母神地神堅牢大梵尊天三十三天大神龍王緊那羅王迦樓羅王阿修羅王與其眷屬悉共至彼擁護是人晝夜不離我今所説諸佛世尊甚深祕密微妙行處億百千劫甚難得值若得聞經若為他説若心隨喜若設供養如是之人於無量劫常為諸天八部所敬如是修行生功德者得不思議無量福聚亦為十方諸佛世尊深行菩薩之所護持著淨衣服以上妙香慈心供養常不遠離身意清淨無諸垢穢歡喜悅豫深樂是典若得聽聞當知善得人身人道及以正命若聞懺悔執持在心是上善根諸佛所讚文句護世四王下敘流通中品皆如上説記疏略指上三明疑念序二初壽量品題金光明經壽量品第二記句文分二初正釋二初約三佛難思以釋二初佛本無三文句佛本無身無壽亦無於量記不唯法佛無身壽量報應亦乃不可説三以一切法離於名字言説相故二隨世俱立衆生若有得益因緣即須隨世立諸名相非唯應佛立身壽量法報亦乃可論此三須知無三不減一法雖立三三不增一法良以有無皆法界故故真無俗有真有俗無皆是悉檀令於三身得四益也此文分二初列三身各三文句隨順世間而論三身亦隨順世間而論三壽量記二釋三佛三義二初約義分別二據理融即分別且從修二性一令義易明法是本覺報是始覺始本一合方有應用一往似縱説者應以次融即文非縱非橫妙會此義令其聞者識圓三身文分三初法佛二初別釋三初身文句法身者師軌法性還以法性為身此身非色質亦非心智非陰界入之所攝持強指法性為法身爾記始覺報智依本覺成故以法性而為師軌究論始本唯是一覺故云還以法性為身是故馬鳴歸命三寶即以佛身及體相等而為法寶此身等者非分段變易色質心智三科所攝乃是常住五陰等法聚以為身此法無相不可説示為衆生故疆名法身二明壽文句法性壽者非報得命根亦無連持疆指不遷不變名之為壽記色心和合乃有執得連持壽命身既非陰豈有命根為物疆指不遷為壽三明量文句此壽非長量亦非短量無延無促疆指法界同虗空量記量依身壽故同疆指二總釋文句此即非身之身無壽之壽不量之量也記身壽量上言非無不者若據次文義當雙非以其法體離於二邊及超報應疆於此理立身壽量三種名字令物忘情也二明報佛二初稱法有報二初引經文句報身者修行之所感也法華云久修業所得涅槃云大般涅槃修道得故記此從順修稱理事説修行所感釋報義也法華文證智德之報以彼經云慧光照無量故涅槃文證斷德之報以云大般涅槃故二釋義文句如如智照如如境菩提智慧與法性相應相冥相應者如函蓋相應也相冥者如水乳相冥也記修行所感二種之報乃是始覺與本覺合即以始本而為境智此二不異故名曰如各二如者智如如境境如如智故也復以菩提名如如智為能應冥法性名於如如之境為所應冥以函蓋合先喻應義函蓋雖合猶存際畔復以水乳喻其相冥此乃泯然而成一相始覺本覺義二體一正同於此二明就報立三即身壽量也三中一一言法身者報智所冥離法無報故初身文句法身非身非不身智既應冥亦非身非不身強名此智為報身也記言非身者非應佛有分齊身非不身者非報佛無分齊身又非身則非有非不身則非空中道法身乃本覺體始覺冥此能冥亦忘為成觀故強名報智二壽文句法壽非常非無常智既應冥亦非常非無常強名常為壽也記三量文句法量非量非無量智既應冥亦非量非無量強名無量為量也記稱本雙非為物強指義皆同身三明應佛三初明應物有三三初身文句應身者應同物身為身也記二壽文句應同連持為壽也記三量文句應同長短為量也記皆如谷響大小隨聲是故此三悉云應同二明依二有應三初法文句智與體冥能起大用記不覺忘處始本一如故云智與體冥覺體自在故云能起大用二喻文句如水銀和真金能塗諸色像記真金上色須水銀和方能塗去聲物闕此一緣金無塗用三合文句功德和法身處處應現往記報智功德以合水銀法身合金處處應現合塗色像三明應遍三土二初雙明報應文句能為身為非身能為常壽為無常壽能為無量能為有量記上所説報但論冥法即自受用也今明垂應以他受用常住之應對於生身無常之應示二迹用是故雙明身非身等身即生身有分齊相故名為身非身是報無分齊相故曰非身小般若云佛説非身是名大身大身者乃他受用身也無分齊身其壽則常故無量也有分齊身壽則無常故有量也此二應用乃依真中二理而住機依事業二識而見住理廣如序品疏文辨之二識委在起信論明論意要在事識見則取色分齊故名應佛業識見則離分齊相故是報身行者應知常身無量通應三土無常有量但應同居所以者何蓋實報機分證論見他受用身方便土人唯稟別圓所見佛相雖小優降然匪生身悉是報佛若同居土具四教機稟別圓者能覩報佛故法華明常在靈山華嚴説法盡未來際及諸大乘即於應相見是法性尊特之身故知常身遍應三土若無常身唯應同居逗藏通機及凡夫衆也二單示應身二初明有量二義文句有量有二義一為無量之量二為有量之量如七百阿僧祇及八十等是有量之量如山斤海滴實有齊限凡夫所不知阿彌陀實有期限人天莫數此是有量之無量記上之所説自受用外垂三土身皆名為應其他受用雖就對機名之為應而是實因之所感剋復名為報非是差別逗機之用若論逐物隨緣參差長短身壽量者須就同居無常用説故今別示應身之相但於有量開出兩量而此兩量依於事識但空見故唯屬無常若依業識不空見者即此無常全體是常則常無常二用相即二鳥雙遊也若上二土機息應轉亦是無常以非八相故且言常七百等者首楞嚴三昧經云堅首菩薩問佛壽幾何佛令往東方過三萬二千佛土於莊嚴國問照明莊嚴自在王佛彼佛答云如釋迦壽我亦如是汝欲知者我壽七百阿僧祇劫堅首回此白佛阿難云彼佛乃是釋迦異名雖機勝見長而七百猶可數故亦是有量之量若阿彌陀人天莫數故是有量之無量也二結應佛皆然文句應佛皆為兩量逐物隨緣參差長短記佛佛既皆三身圓證應身被物物壽長短豈不隨順各示兩量故彌陀現長亦能現短釋迦現短亦能現長故大論第三十六云當知釋迦文佛更有清淨國土如阿彌陀佛國阿彌陀佛亦有不嚴淨國如釋迦文佛國又三十八云此間𨶒浮惡故釋迦壽應短餘處好故佛壽應長故涅槃二十二云西方去此三十二河沙有無勝國所有莊嚴如安樂世界我於彼土出現於世斯皆隨逐物機也二據理融即二初約理融文句然此三身三壽三量不可並別一異則乖法體即一而三即三而一乃會玄文記上之三身三皆在性則並二從修有則別不分修性則一三不互融則異別異故縱並一故橫是則乖於所詮法體若能妙達秪一法性而能成就一性二修名即一而三也修性雖成而其三身一性本具名即三而一也此乃得云全性所修全修在性性無所移修常宛爾方合能詮玄妙之文矣二引文證文句故下文云如深法性即於此典金光明中而得見我釋迦牟尼即其義也記經文具云若入是經即入法性如深法性即於是典金光明中而得見我釋迦牟尼此乃以理而為經也金等三字即法報應三身異名與一法性即一而三即三而一若知此理即是三身三不縱橫名為得見釋迦牟尼故大經中明於三德不縱不橫名大涅槃我今安住如是三法為衆生故言入涅槃故知不達三身三一融妙不名見佛今解三佛既此融即方會此典玄妙文也二明二字標題之巧二初委明其意二初從應佛融三釋二初明因偏疑見圓體文句但信相偏疑應身之有量四佛偏舉應佛之無量斷其有量迹疑既除深達報法記偏疑八十是應有量四佛舉喻明應無量無量既破有量之疑即達法報非量非無量此因偏疑見於圓體二明從圓體不偏題二初指偏題相文句若從信相所疑應言壽有量若從四佛釋疑應言壽無量記二示圓論意文句而今不道壽有量不道壽無量直言壽量者意欲圓論三佛之壽量故不偏題記以不偏題故三壽量二字能詮二就報佛融三釋三初明報佛體圓文句取意為釋若從義便正是報身之壽量何故取此報身上冥下應上冥法性即非量非無量下應機緣能量能無量記上約品題壽量二字不偏有無則收二應能顯法報就文便也若義便者今經既以果德為宗合以報身釋於品目以報身上冥下應則三身義任運成就是故二字正在報身二明因疑達圓文句量疑牽無量之答即達於圓記報身義顯良由四佛以長壽應釋短壽疑故使信相達於報智圓具三身三明從圓題品文句經家從其生圓解而題品舉一而蔽諸記題稱壽量正在報身此從信相圓解所見蔽猶當也舉報身一當三身諸也二結示立題文句從此義故題為壽量品記二明重解三初示異解時文句又一時重解壽量品記大師非止一回講説故於一時別立義名章安既聞是故兼録二明異解相二初標列章門文句亦作三重一玄義二引證三還源記玄義者文選云睿哲玄覽注云玄通也謂離文通示其義故曰玄義引證者義雖妙悟而與經會故引文證令人生信還源者品題是派經目為源所約三身明於壽量不離法性金光明源攝還此源令義究竟二依章解釋三初玄義二初直示三身壽量三初應身三初壽文句玄義者壽者命也謂報得命根連持不斷名之為壽記二量文句延促期數名之為量故言壽量也記三結文句此釋應佛因緣之壽量也記因緣者感應更互而為因緣二報身三初壽文句又壽者受也境智和合共相盛受謂無分別智盛受無分別境無分別境盛受無分別智如函大蓋大故壽是受義也記智外無境境外無智名相盛受既絶能所故無分別函蓋絶待當體名大二釋量文句量者相應也境智相應故言量記境智俱遍名為相應此之相應實無際畔義言於量三結文句此釋報佛之壽量也記三法身三初壽文句又壽者久也常不變易稱之為久記法性不變無去來今是真久義約此久義釋法身壽二量文句量者銓量也常久之壽非多數非少數非相應盡知非相應不盡知非可説非不可説無以名之強以銓量説其長久記銓猶度也常久之壽實叵度量強以雙非而度量也非多等者出度量相初非多少數次非知不知三非説不説此顯法壽是不思議境故大論云不思議者不決定也若離可説而謂法壽定不可説是名決定非不思議上二雙非其意亦爾如此銓量是常久量又多少數銓量法壽非長短用盡知不盡知銓量法壽非分滿報可説不可説銓量法壽體非説默三結文句此釋法身之壽量也記二更作三雙顯示蓋前直以延促境智及雙非義示三壽量恐猶難解故今各以二義銓量欲令行人識三佛相文分為三初番應佛二義文句初番為二一有量量如釋迦之壽方八十是也二量無量如彌陀之壽實是有量人天所不能測故言量無量也此量無量皆應佛所為也記第二番報佛二義文句第二番亦二義佛以如如智稱如如境境無分別智亦無分別若境稱於智智有分別境亦有分別此知與不知皆報佛所明也記境無分別非謂頑境全無覺知乃指心體本來離念名境無分別此離念心全體覺悟名智有分別此之境智究竟相稱智外無境境有分別境外無智智無分別是則境照於境智寂於智以此二義顯報身相第三番法佛二義文句第三番亦二義一者深寂不可説二以慈悲方便亦可得説此可説不可説皆法佛之法也記體本無相故不可説依言顯德是故可説二引證二初引今文三初引二文證應身二義文句二引證者方八十年證有量也諸天世人八部之衆無能思算山斤海滴不可數知此證量無量也記二引三文證報身二義文句虗空分界不可齊限證境無分別也又唯除如來證智可分別也又下文云智淵無邊法水具足亦是證智也記虗空喻通前取不壞喻無量應今取無相證境無念三引三文證法身二義文句壽不可計此證不可説也將欲宣暢釋迦如來所得壽命此證慈悲可説也又聞是四佛宣説如來壽命無量證大悲可説也記問前云四喻皆喻應壽能為無量今何引之證報證法答非全法報為應身者應必斷滅安能延促不曾休廢今欲顯示三身融妙故即以應而證法報若昧此意諸大乘對機之身莫能深識二引新本二初別證應身二義文句新本明婆羅門求佛舍利如粟大求六天報即證有量也王子説金光明難思難解福報無邊福報無邊是證量無量記彼憍陳如婆羅門欲得如來舍利如芥粟許此乃知佛九旬當滅故願求之可證應為八十有量也王子下即栗毗王子答婆羅門也雖即法報且從福報以證勝應二總證法報四義文句難思難解即總證智境不可説等云云記智即報身境即法身具知不知説不説四但略舉一以等餘三四皆絶慮故可總用難思難解而證之也今述此意故注云云三還源三初總明意文句三還源者亦云復宗釋此壽量雖作三身六義勿作異解秪是經題金光明義爾記然法報應與金光明皆是法性當體之名本無優劣以此經正用金等顯於法性故佛首唱而為經目故金光明得為宗源一切三法便成流派今解壽量須約三身恐作別解故示復宗二示還相三初應還明文句初番量無量者秪是明義以其明故大小長短延促數量悉現明中還是明義爾記勝劣二應全是法性能多利益也二報還光文句第二番智境函蓋體解相應色大故般若亦大以法常故諸佛亦常還是光義也記報必冥法故於句句法報雙陳此舉所冥智全是法性寂而常照也三法還金文句第三番可説不可説常樂我淨説滿法界法性無所益都無一言法性無所損還是金義記説時常默默時常説圓妙四德有何損益全是法性可尊可重也合論融即例前故略三例一切文句夫解一則千從迷一則萬惑即此義也記若解體金光明義豈止三身義歸三字一切法相皆還此源故得千從不即萬惑三明兼録意文句既是兩時之聞兼而録之云云記二時之説俱彰妙理後之學人隨何開悟欲示此意故注云云二正明疑念二初序入正品指上説文句此品正説而序文未盡分別如上記二還從序意釋此文二初節經文文句從王舍城下是第三疑念序文為二一出人二明疑出人為四一出處二明位三出名四歎德記二隨文釋二初出人四初出處爾時王舍城中文句處如文記事釋如通序觀解見出名二明位有菩薩摩訶薩文句菩薩者菩名道薩名心自行此道復能化人故言摩訶薩依勝行立勝位也記翻名道心復能化人故道心大此行雖該前之三教今位在圓三出名名曰信相記文二初約教釋名三初直就相似釋二初約名釋文句信相者信家之相在似道中別判三十心圓判鐵輪位記信通真似既言信相信則非真以其似信是其真證前相故也別教三賢是似信位初地已上方得真信圓教登住便得真信即以十信名為似信言鐵輪者本業瓔珞經以六種輪譬六因位鐵輪十信銅輪十住銀輪十行金輪十向琉璃輪十地摩尼輪等覺信斷見思得是鐵輪二以相驗文句下文云見有一人似婆羅門以枹擊鼓鼓是法身擊是機動似位機興知非真擊記枹鼓杖也或作桴二明似通上位二初明位位有似文句又真似之位地地相隨無位不有如普賢修普賢行滿位鄰尊極此似則高記已證名真未證名似普賢等覺望極名似故立賢名二明高下難測文句信相稱似道者未敢判其高下也記三設難核實二初高位無疑難二初難文句難者言若同普賢言似者何故有疑記二釋二初約權實釋文句此亦非妨菩薩為疑者作發起人爾又佛地未了疑無所嫌記為他發起是權示疑未了佛地是實行疑二引二經證文句法華中補處彌勒亦復懷疑大集中有生疑菩薩於菩提未了菩提為我作名名為生疑記法華本迹皆是彌勒懷疑起問大集菩薩菩提未極故云未了本性菩提熏心起疑疑故求了故云菩提為我作名二斷見無疑難二初難文句難者言見諦已斷疑十地云何疑記二答文句答言見諦斷通疑十地有別疑也記通疑障真別疑障中中道未極安得不疑二就處辨觀文句觀解者心王名王五陰名舍觀此五陰空寂空寂即涅槃涅槃能防非禦敵呼之為城初心後心常觀涅槃行道故是住處也記今出人名觀那就處良由觀法皆從陰起以王舍城約陰便故故就處明以善惡王觀無記舍能所不二人法俱空二空所顯即大涅槃防五住非禦二死敵城豈過此名字初心觀陰涅槃妙覺後心涅槃究竟今意正辨初心住處明後心者示此妙觀同果智也四歎德二初科判二初正科經文句歎德文為二外供養佛內種善根記二重判位文句此菩薩殖善既深多值諸佛作高位解釋亦應無愧色云云記殖種也愧慚也云云者令準歎德判同普賢二隨釋二初外供養佛已曾供養過去無量億那由他百千諸佛記文二初約財法釋文句供養有二義一財供養可解二法供養佛説百千法門隨而修學名法供養記大經云諸供養中法供養最為第一財供養則有窮盡法供養者則無窮盡二約觀行釋文句觀心解者一念覺了心名為佛無量功德心資此覺心令轉明淨名供養佛如膏資火如食益身如禪發慧皆供養義也記無明一念全體覺了此之覺心名之為佛緣因資了是供佛義三喻可見二內種善根種諸善根記文四初直明種善義文句種善根者法性名地觀法性智名種子常以觀觀名下種久習不退名種久五善根生名增長記體本覺心名法性地觀性始覺名為種子下種種久其義可知五善根者於本法性生不動信進念定慧五皆不動名為五根此根生者相似位高故名增長二以值佛釋成二初舉三事譬文句增長由風動日照雨潤漸增茂好記二以三輪合文句風譬佛身輪日譬佛意輪雨譬佛口輪值佛三事能大利益記身輪現通駭動其心意輪鑒機智光照也口輪演教法水潤也三明三因增長文句楞嚴般若若增法性轉顯法性若顯定慧倍明記楞嚴是定緣因也般若是慧了因也法性是理正因也二修一性照發互資由修照性由性發修此三增長轉似入真於真增道並得名為倍明轉顯四結二成德文句殖種值佛二義相成舉此一雙歎菩薩德也記二正明疑念序二初節經文句從是信相下正明疑念序又為二初疑之由次正生疑記二隨釋二初生疑之由是信相菩薩作是思惟何因何緣釋迦如來壽命短促方八十年記文三初正出疑由文句由有遠近遠由三月唱入涅槃近由敘述若有聞者則能思惟無上之義又云由乎本誓擊動生疑記遠則由於九十日前告魔期滅也此經乃是方等後分也近則由在靈山聞佛定中唱序既起思惟故生疑念雖有二由無本誓擊此疑不生二釋何因緣二初約三性分因緣文句何因何緣者通論三種皆名因而此文既略緣了相資共能顯正正當於因緣了當緣記通論三種即正緣了名為三因同在理性以修緣了各三為緣今文略云何因何緣須合性三但名為正以當於因修中緣了合六為二以對因故合二為緣以當於緣就此因緣而生疑念二約因緣疑壽命文句正因常恆壽命無量緣能顯理境常智亦常此因此緣皆非八十之因緣今方八十是何因何緣是故生疑也記正因常久為所顯理理境既常全境發智以為能顯豈可無常能顯兼福而智為正故但云智此境此智俱感常壽故疑八十是何因緣三釋方八十三初通示世壽三方文句方八十者世壽有三品下方四十中方八十上方百二十記二特示中方為表文句下方少夭上方太老中方不少不老表常又十二因緣第八名愛支八十滅者表愛已盡入有餘無餘涅槃愛盡無縛表我涅槃表樂又中方表中道佛樂中道中道表淨為此義故方八十年也記應化之事皆依理現是故外事悉內表理豈中方壽不表四德佛意雖密今智者師據後四佛約應顯常故以所顯驗其能表則知佛意三不知表意故疑文句信相不作此解是故生疑何因緣也記信相若達上之表意即見三身是圓四德豈疑應迹定是短促而反疑云何因何緣耶二正生疑復更念言如佛所説有二因緣壽命得長何等為二一者不殺二者施食而我世尊於無量百千億那由他阿僧祇劫修不殺戒具足十善飲食惠施不可限量乃至己身骨髓肉血充足飽滿飢餓衆生況餘飲食記文二初約理教互疑二初執教疑理文句從復更念言下是正生疑如佛所説者此執教疑理記二執理惑教文句教詮止行二善感壽則長佛昔行因甚多而今果壽極少理教相違不能不惑若無此理教為虗設若其必然長壽安在是為執理而惑教也記佛之所説是能詮教長壽因果是所詮理即道理也互執成疑文義可見二約經文廣示二初釋有二因緣二初對前辨異文句有二因緣者與前為異前合止行同是緣了今就止行自作因緣記前即經云何因何緣也前釋既以正性為因乃以修中緣了為緣今云長壽有二因緣既是佛修止行二善各具緣了即是前文能顯之緣今於前緣自作因緣是故與前因緣異也二就今解釋二初約十善略釋二初正示因緣三初於十善各論止行二初標示文句十善中一一善皆具止行記二釋相二初約殺盜釋二初約行相合具文句不殺是止善放生是行善不盜是止善施食是行善記二明今經互舉文句今經舉不殺家之止善不盜家之行善互舉一邊共明止行記二例八各論文句若備論者一一皆有止行止之與行須明也記止行二善有三差別謂自他共一自行者如文云不殺是止放生是行不盜是止施食是行二化他止行如文云若不遮奪名止方便勸修名行若備論十種止行者不殺不盜如疏已明其八種即不淫梵行不妄言誠實語不綺語質直語不兩舌和合諍訟不惡口常行軟語不貪不淨觀不瞋慈心觀不癡因緣觀皆自修止行也自他共明者自不作十惡名止勸他不作十惡名行二於止行各論因緣二初標文句今就一一各有因緣記二釋二初就不殺示四二初止善因緣文句夫命是衆生之所共惜奪而害之居然大苦宥而放之則為快樂慈心是因不畜殺具是緣此是止善因緣也記因是善本緣是資助為成慈心故除殺具二行善因緣文句夫食是依報得之則命存失之則壽殞施心是因施具是緣此行善因緣也記準止可知二例九善皆爾文句不殺一條既爾乃至不邪見亦復如是記三結示止行因緣數文句總有止行二十善四十因緣記二結成疑念文句此等因緣俱感長壽佛之止行二善纍高於山積厚於地云何今日八十而終記二就五乘廣釋二初結上起今文句此約因果一途論止行二善但作此解於義未允今當更説記若其但説十善因果斯乃淺近一途之説於方等經未為允愜此結上也今當更約世出世間漸頓止行方是佛因此起今也二明今廣示二初明教義二初不殺二初明行相二初示相二初正示二初總示五乘命殺文句人天之因以五戒十善名之為命三乘行人以智慧為命魔名殺者記若但不殺報得命根斯善甚淺今辨五乘修因之命義乃該深梵云魔羅此云殺者以能害人世出世善故斷下諸命皆是魔業也二別明修者止行七初人天文句若遮奪此事即是斷人天命若不遮奪名為止善方便勸修名為行善記此事即戒善也二三藏二乘文句若破壞三藏法名殺二乘人命若不毀傷名為止善方便勸修名為行善記三事度菩薩文句若毀訾事檀乃至毀訾世智名斷六度菩薩命若不障礙名為止善方便勸修名為行善記以不能達三輪體空故行六度皆名事也四通教二乘文句若修體法斷貪恚癡是二乘命若障不令修名斷二乘命若不障者名為止善方便勸修名為行善記五通教菩薩文句非撥體空則斷通教菩薩命若不障者即是止善方便勸修即是行善記説法之過名非廢令勿學曰撥體空字下應云六度方異二乘或脫或略六別教菩薩文句若毀訾漸次是斷別教菩薩命不作障礙即是止善方便勸修即是行善記七圓教菩薩二初順行文句若誹謗圓融即斷圓教菩薩命亦斷佛命若不留難即是止善方便勸修即是行善記亦斷佛命者此教初心即佛界故二逆行二初明二逆文句圓人非但不壞諸法而隨一相即殺諸法而隨一相如仙豫大王害五百之短命施十劫之長齡如佛斷一切煩惱及習一切無有餘記了順逆修即逆順性性非差別故名一相故仙豫事殺果佛理殺以即性故皆長壽因仙豫緣如前釋五戒中二明順理文句此皆言逆而理順非小行者所行記前三教人皆小行者以別初心行亦同小故皆不能即逆而順二結廣文句如上所論一一法皆有止行二善一一善皆有因緣若得此意歷諸法門浩然若海記始從人天終至圓教所有止行若無因緣善不成就然且約不殺須歷餘九及一切法皆須論於止行因緣故云若海二引證文句故大經云行檀波羅蜜得壽命長菩薩行檀則施衆生無量壽命乃至行般若得壽命長菩薩行般若則施衆生無量壽命即其義也記不作上説豈一一度能施衆生無量壽命邪二成疑念文句而我世尊行無不圓果無不滿云何今日方八十年記二明施食二初明行相二初明事法權實二初明事法食體二初明事食輕重文句次明施食者百味甘漿等依報食也身肉骨髓者正報食也此皆事中施食爾記依報食輕正報食重二明法食權實文句經言法食法食者世間法味出世間法味出世間上上法味記經是此經流水品云未來當施法食也世間人天也出世三教也上上圓融也二明菩薩施相三初總明文句菩薩能為一切衆生作大施主令未發心者回邪入正已入正者增長萌芽如陰陽養卉如父母鞠子多積繒綿令墮地不痛記回邪入正者令正信因果也萌始也種子之始剖也卉豈之都名也鞠養也大論二十二云如國王子在高危處立不可救護欲自投地王乃使人敷厚繒褥墮地不死二別示四初授人天食文句授以五戒十善記二授三藏食文句已持五戒者説三界火猛多所燒害讚歎三乘無繫解脫記三施通別食文句已入證者毀訾小乘敗種焦穀讚歎菩薩所行之道記四施圓教食文句設飢國人大王之膳煩惱為薪智慧為火以是因緣成涅槃食令諸弟子皆悉甘嗜記無大乘法食故名飢國圓頓之法如王者之膳非衆人之食也膳善也謂美食也煩惱下觀惑即智如薪助火智因惑緣故能成於四德之食令四十一位弟子皆悉分得甘嗜三結示文句如是等一切法門悉名法食記二結止行因緣文句一一法皆具止行二善一一善具因具緣記二成疑念文句此諸因緣感長壽果而我世尊行無不圓果無不滿云何今日方八十年記二示觀行文句觀心不殺者無明為父貪愛為母若斷此者即成逆害但觀無明即是明愛即是淨體達能所皆如虗空是為止善觀諸心數亦復如是是名行善能如是觀獲得金剛常住之壽也記的明己心無明貪愛能生一切煩惱子孫故名父母若不能體二是性惡則須斷破乃名殺逆若觀即性則不離癡愛全體明淨能觀所觀皆不可得既如虗空癡愛則寂故名止善以即寂觀歷諸心數皆令明淨復名行善此乃觀心見一切法常豈得不感三身常果二釋己身骨髓二初明行相二初簡事從法二初所簡事身文句己身骨髓血肉者此彼相望此為己身智慧推之非己身也如王子飼虎尸毗貿鴿皆捨父母遺體非捨己身記事論己身人誰不解故今簡之智推九界皆非己身況人報質二所取法身文句己身者法性實相是也釋論云持戒為皮禪定為血智慧為骨微妙善心為髓記所取既深驗前所簡非獨人報然若能解色心法界而捨事身乃今所取也今簡不能解法界捨名非己身須知實相為己身者且是總説若依釋論於實相身論戒定慧及妙善心為皮血骨髓雖分戒等一一皆是實相全分二就法明施二初施實身五初施皮文句為他説戒戒能遮罪修福無相最上非持非犯尸波羅蜜者是施己皮也記為他宣説實相之戒遮二邊罪修中道福此戒無相持尚叵得豈存於犯體既雙忘名尸彼岸如此説戒方名布施法身之皮血等例爾二施血文句説諸禪定神通變化不起滅定現諸威儀者是施己血也記諸禪定者九種禪也亦是有漏無漏一切禪定皆達實相皆成無記化化神通故於滅定現十界身名諸威儀例前合云非定非亂三施骨文句説無著妙慧非智非愚亡泯清淨終日説終日無説其所説法皆悉到於一切智地者是施己骨也記能照功忘故云非智全惑成智故曰非愚此智起説無説可得能説既妙故使所説皆到智地智地者智即是地本覺智也智所依地始覺智也修性合一二義俱成四例應施肉文句檀忍等應是肉也記論但三學及所顯理大師義加檀忍進三成六度義以消今經骨髓血肉義方整足説者應例前之三學明雙非相五施髓文句説甚深法性諸佛行處不一不二言語道斷心行處滅微妙中道者是施己髓也記前説戒等既皆雙非豈不斷於言思之道然是談行今是説理雖皆實相而須分別能契所契六度乃是全濕之波微妙善心是波中濕也二明施權身三初結實標權文句將此充足飢餓衆生況餘飲食記以圓法食充七方便飢餓衆生圓頓之外所有法門皆悉名為餘飲食以勝況劣也二正明施相文句餘飲食者即是人天二乘戒皮定血慧骨真諦之髓爾記文略不語三教菩薩別教六度可為餘食髓是中道必在己身是故餘髓但在真諦三引法華證文句法華云於餘深法中示教利喜者即其義也記示教利喜者大論五十九云示者示人生死涅槃三乘六度教者教言汝應捨惡行善利者未得善法味故心則退沒為説法利引導令出喜者隨其所行而讚歎之令其心喜以此四事莊嚴説法二成疑念文句如來往昔隨他意説無量無邊隨自意説亦無量無邊皆是長壽因緣云何今日方八十歲也記隨他意語施權飲食隨自施實四現瑞序二初結前開後大士如是至心念佛思是義時記文二初節經文句從大士如是至心念佛思是義時此一句結前開後記二釋意二初結前二初明至心文句至心者徹到心源盡心實際故言至心記至猶極也心佛同源今欲念佛故須徹至己心實際二明念佛文句觀心既然觀佛亦爾故言念佛念佛不殺施食與法性虗空等如此之壽不應短也是為結前記觀心既極故能盡念佛不殺等種種功德皆等虗空以深觀故乃成疑念二明開後文句開後者由作此觀機動瑞興故言開後也記妙機關應瑞相乃興二正明現瑞二初敘意分文三初敘意二初正敘文句從其室自然下是第四現瑞序瑞者密報相者表發密報四佛當臨此室為爾斷疑表發增進常因感得常果也記為爾者爾汝也表發信相增分真因感究竟果二料簡二初簡作者二初問文句問佛作此瑞信相福作記二答文句答信相無機佛亦不應若無諸佛機無所扣機應相須瑞以之興記二簡感者二初問文句問衆緣感瑞信相獨感記二答二初簡通從別文句答通由衆緣別在信相若瑞在靈山可非其力室中所見豈不由之譬張家降瑞寧得王家受福記二益本在他文句雖然信相是發起之人無容獨善法華云如為一人衆多亦然記信相既為發起之人乃同諸佛而為能應故知能感本在衆機故應一人是應衆多也二分文文句就文為二一現相由二正現相取結前開後之文為現瑞之由從其室自然下為正現相也正現相又二一別現相二總現相從其室自然下是別現相從舉要言之下是總現相記三判相二初正判二初約十因一果判文句別相為十表十地因成也總相為一表因成一果也記二約十地一地判文句又別相表地地各各增益總相表一地具諸地功德也記二料簡二初約經宗簡二初問文句問此經常果為宗何得作相表因記二答文句答此因是果家之因因必成果不乖宗也記二約似位簡二初問文句問前判信相是似位後相則非其徵若似同普賢前相亦非其兆記前判似位有二種意一約十信似於分真二例普賢似於妙覺若今瑞相定表十地豈令十信便登法雲豈使普賢倒入初地二答文句答一往云十地一地之中皆有諸地功德表報利益前後皆霑也經家不定判位秪可從容不得剋斷也記須知二往一一地中具諸地功德十信發真獲十功德等覺亦進後心十德此則前後皆霑十益故約橫竪從容而判二隨文釋相二初別現相其室自然廣博嚴事天紺琉璃種種衆寶雜廁間錯以成其地猶如如來所居淨土有妙香氣過諸天香煙雲垂布遍滿其室其室四面各有四寶上妙高座自然而出純以天衣而為敷具是妙座上各有諸佛所受用華衆寶合成於蓮華上有四如來東方名阿閦南方名寶相西方名無量壽北方名微妙聲是四如來自然而坐師子座上放大光明照王舍城及此三千大千世界乃至十方恆河沙等諸佛世界雨諸天華作天伎樂爾時三千大千世界所有衆生以佛神力受天快樂諸根不具即得具足記文二初節文示十相文句別相有十者一其室廣博二其地寶嚴三妙香氛氳四高座涌出五佛坐華座六放大光明七雨諸天華八作天伎樂九皆受天樂十根缺者具記二約表發釋相二初牒示誡勸文句此之十相表報十地功德止可斐斖擬議不得責其備悉記斖尾音斐斖者文貌意謂止可以經十段文彩準擬評議倣似之耳不可備具論其行相故云不可責其備悉一約相表德二初竪表十地功德文句其室自然廣博表初歡喜者此地初開過於凡聖故以廣博表之嚴淨琉璃間錯表離垢地者此地對戒戒是諸行基壇諸行莊嚴於戒故以間錯表之香氣表明地者其地對忍唯辱而忍增如煙多則香盛故以香表之高座表𦦨地者其地對精進精進督出衆行故以高座表之佛坐其上表難勝者其地對禪禪有神通轉變大力故以佛表之光明表現前者其地對般若般若洞照故以光明表之天華表遠行者其地對方便方便善巧觸處嚴淨故以天華表之作樂表不動者其地對力力能利安一切如妓悅物故以作妓表之受樂表善慧者其地對願願滿則心喜故以受樂表之根具表法雲者其地對智因中衆行故智慧為首智導諸行隨階而圓故以根具表之云云記十初此地初開者大凡小聖無明所覆境界局狹今破此惑故以廣博表之二此對戒者準於華嚴十度對地則初地當檀文略不言既諸地互具則十度皆融三唯辱而忍增者不逢屈辱寧彰忍力四督出衆行者督率也衆行諸度也率諸行至于極果故以高座表精進也五六七八九皆可見十隨階而圓者行以智導故隨階位諸行分圓其猶根具注云云者應明六度十度開合之相然六通大小十唯在大十度者於禪中有願智力故開願度有禪通力開出力度根本定禪守本禪度般若有道種智開出方便度有一切種智開出智度一切智守本受般若名二橫表一地功德二初總表一地功德二初約初地三初通示文句復次十相表一一地中具諸功德且約初地釋之記二別表十初室淨表智二初明了陰功能文句其室自然廣博嚴事者此相表初地智也室者以五陰為室此陰非陰亦非非陰不為陰非陰所作亦不作陰非陰故言自然不得陰不得非陰二邊虗豁故言度博非直空無二十五有二種涅槃亦有因中十力無畏種種功德而莊飾之故言嚴事記室能覆蓋故表五陰欲彰智相須明了陰於陰達中故雙非二邊不為下釋自然中智不被二邊所作良由此智不作二邊故本來覺性任運現前不得下釋廣博微有所得即當局狹非直下釋嚴事小智無常離過而已終歸灰滅大覺本有過河沙德自然莊嚴二明三智體相文句嚴事即假智廣博即空智自然即中智三智一心中具足是故歡喜記其室表一心自然廣博嚴事六字表三智始行圓修今日頓發二寶間表境二初直表三諦文句天紺琉璃雜廁間錯以成其地者此相表初地所照境天紺琉璃瑩淨明徹表真諦境雜廁間錯種種莊嚴表俗諦境猶如如來所居淨土至聖所居極尊之地表中道第一義諦境記二兼表融即文句一地而三相三相而一地表一諦而三諦三諦而一諦記室中一地有此三相可表妙境三一相即行者應知諦智名別其體不殊欲彰修證強立能所三妙香表慈悲文句有妙香氣過諸天香者此相表初地慈悲功德慈能與樂如香氛氳悲能拔苦如香離臭此慈悲竪高故言過諸天香此慈悲橫濶故言遍滿遍滿一切陰界入中無不溥覆也記一心境智普能與拔即名慈悲境智高廣與拔稱之故使慈悲竪高橫濶三無差別故能遍滿一切衆生三科之內四高座表四德文句其室四面有四高座者此相表初地四德四德是祕密之藏佛住其中如高座可坐為坐諸佛也記常我是法身樂即解脫淨即般若三德互具故一一具四不可思議名祕密藏是佛究竟棲依之處故以座表五佛座表覺智文句有四如來者此相表初地覺四德智智與德冥如佛坐座也記本有四德即是三諦以為所坐修得四德即是三智以為能坐故用佛表六放光表自他文句放大光明者此相表初地自行化他照此土表自行照他土表化他也記以照此土光即能照他土可表以自行而化諸衆生七雨華表四辨文句雨諸天華者此相表初地四辨華雨於空如辨詮於理也記解一切衆生語言陀羅尼用法義辭及樂説辨一多融談慈注無盡聞無不喜以華表之文字性離故雨於空此辨方能詮示妙理八天樂表四攝文句作天伎樂者此相表初地四攝四攝攝物如樂樂他也記布施愛語利行同事此四攝物其猶雅樂悅樂於人九受樂表法喜文句受天快樂者此相表初地法喜法喜澄神如受天樂記一心三智即寂而照無法不知此曰澄神受義天樂十根具表互用文句根缺具足者此相表初地諸根互用耳見眼聞一根之中具足諸根之用也記業轉現識已分破故見聞覺知根根皆具三總歎文句初地功德佛辨所不能宣略舉十相表其梗介爾記法性功德不可窮盡此地能稱法性顯德故使諸佛不能盡説止十相者經家略舉也梗介者介應作槩聲之誤也云梗槩粗略也二例餘地文句初地既然一一地亦復如是記此去九地地地皆然將橫入竪無竪不橫二別表一地自他二初約初地二初略示文句復次十相表初地自行化他功德前五相表自行功德後五相表化他功德記自行功德即自行因果化他功德即化他能所此與法華十妙意同二正表二初前五表自行文句其室廣博表自行之般若天紺琉璃表自行之法身有妙香氣表自行之解脫高座華衣表自行之因成佛坐座上表獲記成佛也記若以此文配十妙者法身境妙般若智妙解脫行妙因成位妙成佛三法妙此自行因果也若境智行對理性等住前三即此乃從強約修別對若論法體真位無缺二後五表化他文句後五相表化他功德者放光表意輪益物也雨華表口輪益物也作樂表身輪益物也又表能令衆生轉煩惱障而受法喜之樂根具表能令衆生轉報障也記意輪鑒機即感應妙口輪説法妙身輪神通妙又表下以受天樂根缺具足既皆轉障可通對於眷屬利益二種妙也此即化他能所二例餘地文句初地既然後一一地亦得如是記二總現相舉要言之一切世間所有利益未曾有事悉具出現記文二初述意總表文句從一切世間下是總現相也別相文廣意略總相文略意廣此表十地因成一果究竟具足也記言意略者止在十義故意廣者以一切之言無所不該故二依文別表文句一切者該十法界也世間者包三世間也未曾有者因中所無也悉具現者因圓理顯也國土世間未曾有則實相滿衆生世間未曾有則般若滿五陰世間未曾有則解脫滿舉要者實相是要實相既圓何法不滿邪記該包也十法界者心佛衆生三人皆具具雖不異迷悟且殊佛已證悟心生在迷全迷則曰理性十界信説則曰名字十界念念體達名觀行十六根遍照名相似十證十起應名分真十今表極果乃究竟十己心合佛十界體用亦見衆生十界同佛是今表果十界之義不作此解徒云一切該十法界三世間者假實依報也攬實成假名字不同即衆生世間所攬實法色心間隔即五陰世間正報所依依報差別即國土世間未曾有者分證十本分垂十迹雖得圓融若望極果明昧尤別如華嚴説灌頂菩薩所得功德如一塊土妙覺功德如四洲土故因圓理顯若自若他三十世間一一究竟清淨自在未曾有也國土下以三世間配三德且從義便也國土等者迷時假實既依國土果上智斷全依法身故於國土明實相滿衆生等者釋論云衆生無上者佛是佛翻為覺始覺人空終覺法空故於衆生世間明般若滿五陰等者釋論云法無上者涅槃是因滅是色獲得常色受想行識亦復如是二執既盡五陰自在故於五陰世間明解脫滿以三對三須知其意良以三德舉一即三顯三世間一一圓遍互融互攝新伊天目類之可知實相是要者實相無相極果俱是究竟忘相故稱實相自他圓滿也音釋文句洄澓洄胡雷切逆流也澓防福切流也歍屋徒切口相就也彗徐醉切妖星也篾亡結切竹皮也飼夕恣切食也記幟尺志也切巾虗約切戲也楔先結切火一切行也𨠯許具切躔直連切踐也攙搶攙音讒搶音撑攙搶妖星也蓍音尸蒿屬蓍巫者以為䇿也筮音世筮卜也揲音設數蓍也
