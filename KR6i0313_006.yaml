body:
  text: 北涼三藏法師曇無讖譯經天台智者大師説文句門人灌頂録四明沙門知禮述文句記雙徑沙門明得會句并記入於經文記三大章流通分二初四天王品題金光明經四天王品第六記句文分二初因緣釋二初約處釋人二初明處文句四天王者上升之元首下界之初天居半須彌記二十八天皆上升之趣此當其首天分三界於下界中此復在初居半須彌者處之所依欲界六天二天依山忉利居頂四王在半梵語須彌此云妙高出水八萬四千由旬四寶所成二出人文句東黃金埵王名提頭賴吒此翻持國領乾闥婆富單那南琉璃埵王名毗留勒叉此翻增長領鳩槃茶薜荔多西白銀埵王名毗留博叉此翻雜語領毗舍闍毒龍北水精埵王名毗沙門此翻多聞領夜叉羅剎記持國者護持國土故乾闥婆此云尋香行天帝俗樂神也富單那此云臭餓鬼中勝者或云主熱病鬼也增長者令自他善根增長故鳩槃茶此云甕形頗似冬瓜是厭魅鬼也薜荔多此云祖父鬼餓鬼中最劣者雜語者能作種種語故毗舍闍此云噉精氣鬼噉人及五穀精氣故亦云顛狂鬼也毗沙門此云多聞福德之名聞四方故夜叉此云輕捷飛空捷疾故羅剎此云可畏亦名暴惡二明品來意文句此四王聞經歡喜各領五百眷屬發誓護經從此標章故稱四天王品記二觀行釋三種觀法此當託事以其境智一一皆借事義而立也須知託事多兼法相如王舍城而觀五陰耆闍崛山而表三德此之五三何殊四諦然此正是託感應事明境觀也分二初示觀相文句觀心釋者東集南苦西道北滅四諦理是四天觀四諦智為四王護四諦境名護國護心數是護衆生世者他也為他説心數名護他衆生八部者苦諦下有利鈍見思法華指此為鬼神乃至滅諦下亦有見思是為八部也記四諦四智乃至諦下各論見思何教不説今釋教義既專約圓故所明觀不觀三教四天須表無作諦理四王乃表無緣妙智照事即理名護諦境了縛為脫名護心數為他説此名為護世通別見思同體為障名為鬼神法華指此等者不無少異彼以鬼神但譬五利乃將蟲鳥而譬五鈍今則利鈍俱類鬼神但取分同也二明利益文句若不照四諦理見思二惑侵害心王毀損境界心王亡境國敗心數人民迸散境智俱為鬼神所惱能觀苦集控御見思則國安民寧能為他説四諦是護他國土遮彼見思使得安樂是為觀心護世四天王也記而且先明不觀有損侵害心王妙智不發也毀損境界諦理不彰也心王至迸散示迷三德而為三障雖論三障迷由煩惱故云俱為鬼神所惱能觀下正示觀之有益無明即明為能觀智此觀觀苦生死即涅槃也此觀觀集煩惱即菩提也控御等者不動諸見而修道品不斷癡愛起諸明脫如斯控御豈獨不被侵害而能顯理備德顯理故諦境國安備德故心數民寧以轉八萬塵勞成八萬定慧也自行了達既其若此令他修證豈不然乎託護世天王之事修觀獲益其相略爾二十三品經文二初立意分章二初立意文句此下十三品是流通段佛慈季末使邪惡不翳於正真經王不壅於來代有緣之者得正聞正聽故曰流通記季亦末也翳障也二分章三初開流通七章文句凡為七意四天王至散脂明天王發誓勸獎人王弘宣此經正論善集明人王弘經天王祐助亦是示往日弘經方軌鬼神品明聽經功德天神地祇若河若海菩提薩埵咸守衛之授記品證聽經功德之不虛除病流水引昔聽經之功德證今護持之非謬捨身品引昔行經不惜軀命戒勸師弟勿吝法財讚佛品明諸菩薩稱揚佛法能宣所宣利益深重云云記方軌者方法軌範也二出天神五段文句天王發誓又為五四王以天力擁護請者大辨品以辨充益説者功德天品誓以資財潤請者説者地神品誓以地味膏腴味請處説處散脂品誓以威武摧外敵攘內難安於請説聽等也又天王護其國大辨護其師功德護其衆地神護其地散脂禳其災令經法大行也云云記以地味膏腴請處説處者膏腴土田良沃也史記曰東割膏腴之地是也腴下多味字攘除也又天王下且從增勝備論一一皆有五能三示此品六番文句四天王品者有六番問答即為六段第一白佛述有護國之能第二白佛述其護國之事第三白佛示其軌模第四白佛要其法利第五白佛雙述興衰第六白佛説偈頌德記二正釋經文七初五品明天王發誓勸獎人王弘宣此經分五初四王品以天力擁護請者分六初述護國之能二初分文文句初番為二一白佛二佛述成白佛又二一經家敘二正白佛記二釋義二初四王白佛二初經家敘爾時毗沙門天王提頭賴吒天王毗留勒叉天王毗留博叉天王俱從座起偏袒右肩右膝著地胡跪合掌白佛言文句敘敬如文記先標北方天王者西土以北方為上也偏袒者西方之禮弟子詣師必須偏袒表有執役二正白佛二初分文立義文句正白佛文為二一歎經二述能護諸天信法有力是故歎經欲得經弘述其能護歎經為三從是金光明下歎經體從莊嚴菩薩下歎經宗從此經能照下歎經用正説乃多歎三則略攝於廣也記二用義釋文二初歎經三初歎經體世尊是金光明微妙經典衆經之王諸佛世尊之所護念文句法性之理佛所護念文詮此理故言經王既言經王知是歎體記佛所護理無量甚深橫攝法周豎收法盡理若不爾豈名經王問文銓此理故言經王是則經文但是能詮王惟在理釋題那云文號經王教攝衆典指文指理二處不同如何和會答若前三教文理不合此則為妨今乃從圓法皆不二文外無理理外無文釋題舉文若其孤立豈得稱王今疏指理不攝文者翻屬前教信文理合是經是王其義祕妙不可情求今經王歎體與序品不別二歎經宗莊嚴菩薩深妙功德常為諸天之所恭敬能令天王心生歡喜亦為護世之所讚歎文句約體修行能令菩薩具二莊嚴成於極果既言莊嚴知是歎宗世天淨天義天皆宗仰極地施三業供養恭敬是身歡喜是意讚歎是口記約體修行者體是本覺起成始覺方得名為約體修行體具佛界因果二嚴全體成修二嚴無作名非莊嚴而為莊嚴今以極果二嚴為宗世天下經云諸天包此三也然應有四恐文脫誤或可天王本是生天故疏不出此四天名義出大經德王品云一者世間天如諸國王二者生天從四天王乃至非非想三者淨天謂四果支佛四者義天謂十住菩薩以見一切法是空義故大論明三種天一假名天即世天也二生天三清淨天則兼三乘也三歎經用此經能照諸天宮殿是經能與衆生快樂是經能令地獄餓鬼畜生諸河焦乾枯竭是經能除一切怖畏是經能却他方怨賊是經能除穀貴飢饉是經能愈一切疫病是經能滅惡星變異是經能去一切憂惱舉要言之是經能滅一切衆生無量無邊百千苦惱文句又下從地獄上至菩薩無明未盡通有熱惱此經能除如月清涼知是歎用云云記上至菩薩者經無菩薩之言既云能滅一切衆生苦惱則通指九界方名一切經文有四初天趣能與衆生快樂者天趣衆生也次是經下三惡趣諸河三趣沈沒猶如大河焦乾枯竭者滅三惡苦也有經於枯竭上加能令二字者妄也三能除怖畏去是人趣初言一切怖畏是總次別明破三障惡三災是報障怨賊即刀兵也并飢饉疫病名三災惡星是業障業來責報故惡星現也憂惱是煩惱障四舉要下總指九界衆生也二述能護二初分文文句從世尊是金光明下是第二述能護國文為二一內以法護國二外以策護國法護國又四一護國之由二以法護國三以天黨護國四以天眼護國記二釋義二初內以法護國四初護國之由世尊是金光明微妙經典若在大衆廣宣説時我等四王及餘眷屬聞此甘露無上法味增益身力心進勇鋭具諸威德文句護國由者由聞此經獲於四益身益光明力益勇猛心益增進德益尊嚴理獲二益謂法身慧命皆得增長由國弘經致斯法潤寧得不護記二以法護國世尊我等四王能説正法修行正法為世法王以法治世文句述所以者此義正與觀心相應以四諦智護四諦境即是修行正法以四諦智導諸心數使諸心數不行故名行般若波羅蜜即是能説正法內有如此護國所以名護世王正治國土爾記即是述其護國所以無法安能護持國土而其所以有內有外外即世法內即心法若但行説世間之法則令此經非方等教天王全是凡夫心口須知文文皆有世間出世間意但以此句顯內義便故云正與觀心相應如下散脂鬼神品中諸文且順世法詮辨及至自述得名之由則全廢事解故云現見不思議智境不思議智光乃至云我能安住一切法如性於一切法含受一切法境智若是故名為密方能外現鬼神大將豈非有理密故乃有事密今文經雖不顯大師得意乃以行説諦智之法而為護世安民所以心數不行等者心心數法全體即是方便般若心王邪故數行邪境今王既正導令不行不行而行行深般若到於彼岸三天黨護國世尊我等四王及諸天龍鬼神乾闥婆阿修羅迦樓羅緊那羅摩睺羅伽以法治世遮諸惡鬼噉精氣者文句帥黨護國者此亦與觀心相應心王帥心數黨降伏見思利鈍諸使如諸天王共眷屬遮諸惡鬼如轉輪王與七寶千子有所至處四方歸德四王共五百所臨之地何惡不除邪記意同向説黨謂徒黨即八部也黨輩也帥黨者帥音率導引也如轉輪王下是事釋以輪王降四方喻天王遮惡鬼七寶謂輪象馬女珠臣兵也四天眼護國世尊我等四王二十八部諸鬼神等及無量百千鬼神以淨天眼過於人眼常觀擁護此閻浮提世尊是故我等名護世王文句用天眼護國者以報得天眼徹視無幽不燭防萌杜漸何惡不除邪記以報得天眼者非修得也受天身則眼必徹障幽暗也燭照也萌種子初剖也杜塞也謂以天眼徹照防將萌之禍根塞漸起之惡源也二外以策護國二初標科敘二初標科文句二從若此國土有諸衰耗下是智策護國令內外因緣和合文為三記二敘意三初勸説聽因緣和合二初勸法師為外緣若此國土有諸衰耗怨賊侵境飢饉疾疫種種艱難若有比丘受持是經我等四王當共勸請令是比丘以我等力故疾往彼所國邑郡縣廣宣流布是金光明微妙經典令如是等種種百千衰耗之事悉皆滅盡文句一若王國多災種種艱難謂兵飢疾者我以智策勸法師往或威神勸往或現形勸往或降夢勸往法師若往廣宣此經如日出朝陽氛霧自歇此勸外緣也記日出朝陽者爾雅云山東曰朝陽山西曰夕陽氛撫文反不祥氣也呂氏春秋曰冬行夏令則氣霧冥冥春秋元命包曰霧陰陽之氣也陰陽怒而為風亂而為霧今以日出喻弘經氛霧歇喻三災息也二勸王者修內因世尊如諸國王所有土境是持經者若至其國是王應當往是人所聽受如是微妙經典聞已歡喜復當護念恭敬是人世尊我等四王復當勤心擁護是王及國人民為除衰患令得安隱文句次王心無智照災承暗入若有明慧變怪不生師既秉法來儀王須專心聽受王若勤聽天亦勤護所以加於可加護於可護一人有慶賴及萬方王身與國安隱無患此內因也若外雖有弘法人王內心不殷重則不和合不能攘災也記秉法者秉持也一人謂王也慶善也王有善則萬方之民恃賴之即尚書曰一人有慶兆民賴之也故王受是典而致國安經飢饉者爾雅云五穀不熟曰飢菜蔬不熟曰饉國邑郡縣者王制曰凡四海之內九州方千里州建百里之國三十七十里之國六十五十里之國百有二十凡二百一十國凡九州千七百七十三國春秋左氏傳曰凡邑有宗廟先君之主曰都無曰邑又曰上大夫受縣下大夫受郡二勸供給四衆因緣世尊若有比丘比丘尼優婆塞優婆夷受持是經若諸人王有能供給施其所安我等四王亦當令是王及國人民一切安隱具足無患文句二者王無惠施則寡於福祿如不勤田倉厨少穀勸王傾財供給四衆四衆得安福資於王舉國眷屬一切無患此內外因緣和合能致豐年流衍云云記經優婆塞此云近事男優婆夷此云近事女以成就戒者堪可親近承事出家二衆故也流衍者衍達也三勸能讚所讚因緣世尊若有四衆受持讀誦是妙經典若諸人王有能供養恭敬尊重讚歎我等四王亦復當令如是人王於諸王中常得第一供養恭敬尊重讚歎亦令餘王欽尚羡慕稱讚其善文句三者王身無先王之德行臣民不從口無先王之法言鄰國不詠今勸王三業供養恭敬是身業尊重是意業讚歎是口業夫高以下為基辨以訥為師屈尊敬卑功亦大矣以天威力使鄰國遙崇羽檄稱讚歌詠羡慕三業顒顒上之化下如風之靡草鄰國既然國人牛馬草萊無不低回內向此則能讚所讚因緣和合頌聲溢於鄰國云云記先王之德行者先王道德之行若行之於身即可以儀軌風俗法言者是出自典誥聖人禮法之言若宣之於口即可以教人民君既無此故民不從其令鄰國不詠其德今勸下即勸王重道尊師修功補過也身意恭重謙以自牧即道德之行也讚歎在口即典誥之法言也夫高下明謙卑之意王高而民下為國者以人為本基故當勞謙以聚之辨以訥為師者訥者內照清淨故外絶矜飾即大辨若納也故能為俗中小辨之師尋常治身理國尚當如此況今請出世之法祈人民之福豈宜踞慢乎儒禮以父事三老兄事五更屈王之尊敬卑為師儒釋一揆矣羽檄者文心雕龍云檄者曒也宣露於外曒然明白也或稱露布蓋露板不封布諸視聽也顏師古注漢書高記曰檄以木簡為書長尺二寸用徵召也其有急事則加鳥羽插之示速疾也今云羽檄稱歎者即告之以文辭述具休明也爾雅云顒顒昂昂君之德也靡偃也論語曰君子之德風小人之德草草上之風必偃草萊者萊黎草也或作葉或作菜字之誤也二用意銷文三文句經文分明尋之可見記當以上意對經釋之故云可見二如來述成二初分文文句次佛述成文為二初合述歎經二述其能護國記二釋義二初合述歎經爾時世尊讚歎護世四天王等善哉善哉汝等四王過去已曾供養恭敬尊重讚歎無量百千萬億諸佛文句四王初歎經説既合理佛述而成之成其上體宗用三歎故言佛合述善哉善哉其上總歎一教佛述成其遍讚百千諸佛諸佛從是法生故舉多讚成於一也記四王所讚經體宗用既合佛證三德妙理故佛述成諸佛從是法生者體宗用三既是法性豈有一佛不從此生二述能護國二初分文文句從於諸佛所下述成其能護國又為二初述以法護國二述以智眼護國記二釋義二初述以法護國四初述護國之由於諸佛所種諸善根文句法護國有四佛皆述成上明護國之由由聞經得益佛述今益良由先種發心畢竟二不別如是二心前心難是故敬禮初發心此舉前以成後述後以顯前記發心畢竟者昔種善根是發心今日聞經得益是畢竟二心比校昔種誠難故佛述成歎其宿種然此發心等語即大經迦葉説偈讚佛故佛初心但用彼語以成今意二述其以法護世説於正法修行正法以法治世為人天王文句從説於正法下述其以法護世上云能説能行所以名為護世佛亦述成能説能行得名護世云云記護世下云云者與觀心相應義如前述也三超述天眼護國汝等今日長夜利益於諸衆生行大慈心施與衆生一切樂具能遮諸惡勤與諸善以是義故若有人王能供養恭敬此金光明微妙經典汝等正應如是護念滅其苦惱與其安樂文句從汝等今日下超述其天眼護國小不次第於義無失上云以淨天眼過於人眼佛述長夜利益夫天眼夜照不假日光故言長夜也記四追述天黨護國汝等四王及諸眷屬無量無邊百千鬼神若能護念如是經者即是護持去來現在諸佛正法文句從汝等四王及諸眷屬下追述其天黨護國上直言護國佛今加讚是護三世諸佛正法也記二述以智眼護國汝等四王及餘天衆百千鬼神與阿修羅共戰鬪時汝等諸天常得勝利汝等若能護念此經悉能消伏一切諸苦所謂怨賊飢饉疾疫若四部衆有能受持讀誦此經汝等亦應勤心守護為除衰惱施與安樂文句從汝等四王及餘天衆下述其智眼和合護國上云請法師入境攘惡此功歸己能却修羅之陳汝勸王聽經供給四衆佛述其內智外福實是消伏諸苦能致安樂如文云云記前云䇿今云智眼互見其文䇿即智謀智能鑒照名之為眼言和合者即前云內因外緣因緣和合然後攘惡云云者前白佛則三段別明今則一番總述以包前別也第二番白佛述護國之事二初分文文句第二番白佛述護國之事文為二一白佛二佛述成白佛又二記二釋義二初白佛二初王奉人法天除怨患爾時四王復白佛言世尊是金光明微妙經典於未來世在所流布若國土城邑群縣村落隨所至處若諸國王以天律治世復能恭敬至心聽受是妙經典并復尊重供養供給持是經典四部之衆以是因緣我等時時得聞如是微妙經典聞已即得增益身力心進勇鋭具諸威德是故我等及無量鬼神常當隱形隨其妙典所流布處而作擁護令無留難亦當護念聽是經典諸國王等及其人民除其患難悉令安隱他方怨賊亦使退散文句一是經流布之處其王自能頂受又供給四衆者我及眷屬誓當隱形令其顯益記經天律治世者師古治民則天行化罰必當罪賞必當功名天律也二鄰國興兵天令懅退若有人王聽是經時鄰國怨敵興如是念當具四兵壞彼國土世尊以是經典威神力故爾時鄰敵更有異怨為作留難於其境界起諸衰惱災異疫病爾時怨敵起如是等諸惡事已備具四兵發向是國規往討伐我等爾時當與眷屬無量無邊百千鬼神隱蔽其形為作護助令彼怨敵自然退散起諸怖懅種種留難彼國兵衆尚不能到況復當能有所破壞文句二者惡鄰興兵侵斥善國我當隱形起諸怖懅種種難起令其軍兵顯然退散尚不擾邊況復壞中云云記斥逐也經四兵象馬車步也規往討伐者規求也或作親者字之誤也討誅也傳例曰有鐘鼓曰伐或作罰者非罰折辱也出金贖罪也軍者萬二千五百人曰軍天子六軍諸候三軍二佛述成二初標科文句次佛述成文亦為二記二隨釋二初述成初意爾時佛讚四天王等善哉善哉汝等四王乃能擁護我百千億那由他劫所可修習阿耨多羅三藐三菩提及諸人王受持是經恭敬供養者為淨衰患令其安樂復能擁護宮殿舍宅城邑村落國土邊疆乃至怨賊悉令退散滅其衰惱令得安隱亦令一切閻浮提內所有諸王無諸凶衰鬪訟之事文句從爾時佛讚下至無鬪訟之事是述成初意其上隱形護國欲使經弘佛述隱形是護三寶我是佛寶修習菩提是法寶諸王無鬪訟是僧寶述其護一而能成三也記無鬪訟名僧者無鬪訟即和合也二述成後意四王當知此閻浮提八萬四千城邑聚落八萬四千諸人王等各於其國娛樂快樂各各於國而得自在於自所有錢財珍寶各各自足不相侵奪如其宿世所修集業隨業受報不生惡心貪求他國各各自生利益之心生於慈心安樂之心不諍訟心不破壞心無繫縛心無楚撻心各於其土自生愛樂上下和穆猶如水乳心相愛念增諸善根以是因緣故此閻浮提安隱豐樂人民熾盛大地沃壤陰陽調和時不越序日月星宿不失常度風雨隨時無諸災橫人民豐實自足於財心無貪吝亦無嫉妒等行十善其人壽終多生天上天宮充滿增益天衆若未來世有諸人王聽是經典及供養恭敬受持是經四部之衆是王則為安樂利益汝等四王及餘眷屬無量百千諸鬼神等何以故汝等四王若得時時聞是經典則為已得正法之水服甘露味增益身力心進勇鋭具諸威德是諸人王若能至心聽受是經則為已能供養於我若供養我則是供養過去未來現在諸佛若能供養過去未來現在諸佛則得無量不可思議功德之聚以是因緣是諸人王應得擁護及后妃采女中宮眷屬諸王子等亦應得護衰惱消滅快樂熾盛宮殿堂宇安隱清淨無諸災變護宅之神增長威德亦受無量歡悅快樂是諸國土所有人民悉受種種五欲之樂一切惡事悉皆消滅記文二初正以等慈述其懅退文句從四王當知此閻浮提下是述成後意上以天威懅之天力退之似若憎惡愛善佛勸慈心平等向之為惡者自懅為善者自豫非薄惡而厚善成其懅退之意也記豫安也二兼勸諸國各守本業文句又勸諸國各守本業住境自樂勿起貪企諸王和則民無夭法興盛則熏諸天佛告帝釋鬪諍因緣人天損減善能慈和天下非止供養於我則是供養三世如來非止安於一王遍安諸王非止安於一國遍安一切故以慈和述成第二意也云云記貪企者企望也佛告帝釋者大經文也經楚撻者楚一名荊可以為杖撻擊也廣雅沃濕也美也亦柔也壤土也時不越序者四時和也心無貪吝者無貪故不多求無吝故能惠施后妃采女者天子一后三夫人九嬪妃二十七世婦八十一御女風俗通云采女者采擇其容色之女也第三番白佛示其規模二初分文文句其三白佛示人王規模文為二一出其願欲二示其軌模願欲有六一欲安己身二欲安妻子三欲安宮殿四欲王領殊勝五欲攝諸福德六欲國無憂苦記二釋義二初白佛二初出願欲六文如疏列初欲安己身爾時四天王白佛言世尊未來之世若有人王欲得護身記二欲安妻子及后妃采女諸王子等記三欲安宮殿宮殿屋宅得第一護記四欲王領殊勝身所王領最為殊勝具不可思議王者功德記五欲攝諸福德欲得攝取無量福聚記六欲國無憂苦國土無有他方怨賊無諸憂惱及諸苦事文句六願如文記二示軌模六初示莫放逸世尊如是人王不應放逸散亂其心應生恭敬謙下之心記二示嚴法堂應當莊嚴第一微妙最勝宮宅種種香汁持用灑地散種種華敷大法座師子之座兼以無量珍琦異物而為校飾張施種種無數微妙幢幡寶蓋記三示令洗沐當淨洗浴以香塗身著好淨衣瓔珞自嚴坐小卑座不自高大除去自在離諸放逸謙下自卑除去驕慢記四示專聽經正念聽受如是妙典於説法者生世尊想記五示和顏語復於宮內后妃王子采女眷屬生慈哀心和顏與語勸以種種供養之具供養法師記六示應自慶是王爾時既勸化已即生無量歡喜快樂心懷快豫倍復自勵不生疲倦多作利益於説法者倍生恭敬文句從世尊如是人王下是第二示其規模雖不次第六數足上欲安身今示莫放逸制心則身安也上欲安宮殿今示嚴法堂幡蓋映於上香華麗於下三寶受用則柏梁無災上欲王領殊勝今示洗沐香塗敦恭去慢一身敬於此八紘休於彼上欲攝取福聚今示正念聽經正念聽經能致無量功德天神竭其力覆地神竭其力載鬼神竭其力護臣民竭其力愛上欲安妻子今示和顏與語勸其興福內外修善感益事多上欲得國無憂苦今示應自喜慶自勵忘疲倍作利益一人既悅則四海謐然此之謂也記一一如數對上六願柏梁者漢時殿名天火曰災漢方土以海中鴟魚尾安殿脊以禳之災遂息世昧其由謂之鴟吻八紘八方也休美也自勵者勵勉也四海者博物志云天地四方皆海水相通地在其中蓋無幾也七戎六蠻九夷八狄形類不同總而言之謂之四海皆言近於海也二述成二初分文立意文句次佛述成文為二先述成六方法次述成六願欲四王約六事又所説少止在現世佛約一事而所益多超無量世倍述成之記二用意釋文二初別述二初述成六方法六初述成安身方法爾時佛告四天大王爾時人王應著白淨鮮潔之衣種種瓔珞齊整莊嚴執持素帛微妙上蓋服飾容儀不失常則躬出奉迎説法之人何以故是王如是隨其舉足步步之中即是供養值遇百千億那由他諸佛世尊文句從佛告四王下秪弘經聽經即是述成安身方法上直示心不放逸今加示羽儀出宮迎候步步值那由他佛方法既倍體亦彌安記羽儀者漢書高紀曰紀信乘王車黃屋左纛注云以黃繒為蓋裹纛毛羽幢也在乘輿車衡左方上注之祭雍曰犛牛尾為之如斗或在騑頭或在衡以纛是毛羽幢為天子儀仗故曰羽儀經躬出者躬親也二述成安國方法復得超越如是等劫生死之難文句從復得超越爾許劫難者述成安國方法上止一世無憂苦今則超爾許生死之難記爾許生死之難者劫數如值佛之數也三述成安妻子方法復於來世爾所劫中常得封受轉輪王位隨其步步文句從復於來世封受輪王者述成安妻子方法輪王有玉女千子悉無怨對爾許劫中妻子常安也記四述成安王領方法亦得如是現世功德不可思議自在之力文句從亦得如是現世自在之力者述成上安於王領方法也記五述成宮殿方法常得最勝極妙七寶人天宮殿文句從常得最勝七寶宮殿者述成上安於宮殿方法也記六述成上攝福方法在在生處增益壽命言語辨了人所信用無所畏忌有大名稱常為人天之所恭敬天上人中受上妙樂得大勢力具足威德身色微妙端嚴第一常值諸佛遇善知識成就具足無量福聚文句從在在生處訖具足無量福聚述成其上攝福方法也記二述成六願欲六段如疏初述成上願安身汝等四王如是人王見如是等種種無量功德利益是故此王應當躬出奉迎法師若一由旬至百千由旬於説法師應生佛想應作是念今日釋迦如來正智入於我宮受我供養為我説法我聞是法即不退轉於阿耨多羅三藐三菩提文句從汝等四王下述成其六種願欲從四王下至不退轉述成上願安身記二述成上安國已為得值百千萬億那由他佛已為供養過去未來現在諸佛已得畢竟離三惡道苦文句從已為得值至畢三惡道苦述成上安國記三述成上願安妻子我今已種百千無量轉輪聖王釋梵之因文句從我今已種輪王釋梵之因述成上願安妻子記四述成上欲攝福聚已種無邊善根種子已令無量百千萬億諸衆生等度於生死已集無量無邊福聚文句從已種無邊善根下述成上欲攝福聚記五述成上願安宮殿後宮眷屬已得擁護宮宅諸衰悉已消滅文句從後宮宮宅無諸凶衰述成上願安宮殿記六述成上王領第一國土無有怨賊棘刺他方怨敵不侵能陵文句從國土無有他方怨刺述成上王領第一記經棘兵器也與戟字同刺殺也二總述汝等四王如是人王應作如是供養正法清淨聽受是妙經典及恭敬供養尊重讚歎持是經典四部之衆亦當回此所得最勝功德之分施與汝等及餘眷屬諸天鬼神聚集如是諸善功德現世常得無量無邊不可思議自在之利威德勢力成就具足能以正法摧伏諸惡文句從汝等四王下更總結成六法六願皆令具足者若能屈己迎候至心聽法即是六願六法又回利施天亦即能令六願六法成就滿足也記第四白佛要其法利二初分文文句第四白佛要其人王施善此由第三段末文為二一白佛二佛述成白佛又二一人王運心二天宮相現記由第三段末者由前世尊述成云亦當回此所得最勝功德之分施與法等及餘眷屬四王因茲遂要法利二釋義二初白佛二初人王運心爾時四王白佛言世尊若未來世有諸人王作如是等恭敬正法至心聽受是妙經典及恭敬供養尊重讚歎持是經典四部之衆嚴治舍宅香汁灑地專心正念聽説法時我等四王亦當在中共聽此法願諸人王為自利故以己所得功德少分施與我等世尊是諸人王於説法者所坐之處為我等故燒種種香供養是經記二天宮相現是妙香氣於一念頃即至我等諸天宮殿其香即時變成香蓋其香微妙金色晃耀照我等宮釋宮梵宮大辨天神功德天神堅牢地神散脂鬼神最大將軍二十八部鬼神大將摩醯首羅金剛密迹摩尼跋陀鬼神大將鬼子母與五百鬼子周匝圍繞阿耨達龍王娑竭羅龍王如是等衆自於宮殿各各得聞是妙香氣及見香蓋光明普照是香蓋光明亦照一切諸天宮殿記文二初事釋文句人王心存至典是故香作金光回施必得是故天宮相現香至天宮龍宮鬼神等宮總至三法界爾記人王至金光者心存即三智金光明也至典即三諦金光明也智諦合即起事用金光明也以色心不二故香隨智遍回施下天王意云若以法利回施我等我等皆得故以光照天宮為表能猶屬畜對天并鬼成三法界言法界者今從解脫所燒之香非法界者何能周遍三趣之體非法界者豈能承受經摩醯首羅此云大自在金剛密迹者正法念經云昔有國王夫人生千子欲試當來成佛次第故俱留孫探得第一籌釋迦當第四籌乃至樓至當千籌第二夫人生二子一願為梵王請千兄轉法輪次願為密迹金剛神護千兄教法世傳樓至化身非也乃法意王子耳據經唯一人今狀於伽藍之門而為二像者夫應變無方多亦無咎摩尼跋陀此云威伏行阿耨達此云無熱惱娑竭此云鹹海二觀釋文句觀心解者以智慧火然實相香起戒定慧煙實相是真法故言金光戒慧與理冥故徹照無礙也云云記上之所説雖談諦智猶是約教示經力用未論觀行今之所論的就研心令觀詣理故荊溪云本雖久遠圓頓雖實第一義雖理望觀屬事此乃託事觀心借義成行三智妙解如火能然三諦融心如香離臭起三學行如煙氤氳真本覺照故曰金光行冥真故無礙而照但期觀行契金光明功用自然相周沙界唯務相現內觀不修心緣五塵魔必得便慎之慎之二佛述二初標科文句次佛述成文為二記二隨釋二初述成香光普遍佛告四王是香蓋光明非但至汝四王宮殿何以故是諸人王手擎香爐供養經時其香遍布於一念頃遍至三千大千世界百億日月百億大海百億須彌山百億大鐵圍山小鐵圍山及諸山王百億四天下百億四天王百億三十三天乃至百億非想非非想天於此三千大千世界百億三十三天一切龍鬼乾闥婆阿修羅迦樓羅緊那羅摩睺羅伽宮殿虗空悉滿種種香煙雲蓋其蓋金光亦照宮殿如是三千大千世界所有種種香煙雲蓋皆是此經威神力故是諸人王手擎香爐供養經特種種香氣不但遍此三千大千世界於一念頃亦遍十方無量無邊恆河沙等百千萬億諸佛世界於諸佛上虗空之中亦成香蓋金光普照亦復如是文句先述香光非但至天宮等三法界遍至百億諸宮又至恆沙佛上總而言之遍至十法界也記經百億非非想天者夫百億即大千界也但同一四禪及四無色三禪統中千界以大千言之則有一千三禪也二禪統小千界則有百萬二禪唯四洲至初禪則有百億今非想亦言百億以下望上言之耳又恐翻譯之訛也以義淨重翻則無百億非想之言二述成施善護讚二初讚因諸佛世尊聞是香氣見是香蓋及金色光於十方界恆河沙等諸佛世界作如是等神力變化已異口同音於説法者稱讚善哉善哉大士汝能廣宣流布如是甚深微妙經典則為成就無量無邊不可思議功德之聚若有聞是甚深經典所得功德則為不少況持讀誦為他衆生開示分別演説其義何以故善男子此金光明微妙經典無量無邊億那由他諸菩薩等若得聞者即不退於阿耨多羅三藐三菩提文句從諸佛世尊聞是香氣下述成人王運善奉施諸天為諸佛所讚先讚因成次讚果滿記二讚果爾時十方無量無邊恆河沙等諸佛世界現在諸佛異口同聲作如是言善男子汝於來世必定當得坐於道場菩提樹下於三界中最尊最勝出過一切衆生之上勤修力故受諸苦行善能莊嚴菩提道場能壞三千大千世界外道邪論摧伏諸魔怨賊異形覺了諸法第一寂滅清淨無垢甚深無上菩提之道善男子汝已能坐金剛座處轉於無上諸佛所讚十二種行甚深法輪能擊無上最大法鼓能吹無上極妙法螺能竪無上最勝法幢能然無上極明法炬能雨無上甘露法雨能斷無量煩惱怨結能令無量百千萬億那由他衆度於無涯可畏大海解脫生死無際輪轉值遇無量百千萬億那由他佛文句如文記經勤修下明修苦行善能下壞外道降魔怨是莊嚴道場也覺了下成正覺善男子下轉法輪此並果上之事如瑞應經廣明第五白佛舉興衰勸二初分文文句第五白佛雙舉興衰文為二一白佛二佛述成白佛又為三初從白佛至諸惡災患悉令消滅是第一舉興勸從若有人王心生捨離至善神遠離生如是等無量惡事是第二舉衰勸從世尊人王欲自護及王國土是第三正勸記二釋義二初白佛三初舉興勸四初述弘經四天聽受爾時四天王復白佛言世尊是金光明微妙經典能得未來現在種種無量功德是故人王若得聞是微妙經典則為已於百千萬億無量佛所種諸善根我以敬念是人王故復見無量福德利故我等四王及餘眷屬無量百千萬億鬼神於自宮殿見是種種香煙雲蓋瑞應之時我當隱蔽不現其身為聽法故當至是王所止宮殿講法之處文句舉興勸為四一人王弘經則四天隱形聽受二非但四王聽受釋梵八部皆集聽受三以是人王為善法知識四既得法利護國彌勤記二明釋梵八部皆集大梵天王釋提桓因大辨天神功德天神堅牢地神散脂鬼神大將軍等二十八部鬼神大將摩醯首羅金剛密迹摩尼跋陀鬼神大將鬼子母及五百鬼子周匝圍繞阿耨達龍王娑竭羅龍王無量百千萬億那由他鬼神諸天如是等衆為聽法故悉自隱蔽不現其身至是人王所止宮殿講法之處記經釋提桓因者具云釋迦提婆因達羅此云能天帝三明人王為善知識世尊我等四王及餘眷屬無量鬼神悉當同心以是人王為善知識同共一行善相應行能為無上大法施主記四明得利護國彌勤以甘露味充足我等我等應當擁護是王除其衰患令得安隱及其宮宅國土城邑諸惡災患悉令消滅文句皆如文記二舉衰勸二初分文文句次舉衰勸亦四一王不弘經天失甘露則威勢減少二釋梵舊神並皆遠捨三惡鬼亂行災毒競起四展轉結成災災何故起惡鬼亂行鬼何故行天神捨離天何故捨不聞法食何故無法食王不弘經記二隨釋四初明天失法食世尊若有人王於此經典心生捨離不樂聽聞其心不欲恭敬供養尊重讚歎若四部衆有受持讀誦講説之者亦復不能恭敬供養尊重讚歎我等四王及餘眷屬無量鬼神即便不得聞此正法背甘露味失大法利無有勢力及以威德減損天衆增長惡趣記二明天神捨離世尊我等四王及無量鬼神捨其國土不但我等亦有無量守護國土諸舊善神皆悉捨去記三明惡男興災我等諸王及諸鬼神既捨離已其國當有種種災異一切人民失其善心唯有繫縛瞋恚鬪諍互相破壞多諸疾疫彗星現怪流星崩落五星諸宿違失常度兩日並現日月博蝕白黑惡虹數數出現大地震動發大音聲暴風惡雨無日不有米勇貴飢饉凍餓多有他方怨賊侵掠其國人民多受苦惱其地無有可愛樂處記經疏星者星説曰絶迹而去曰奔星光迹相連曰流星博蝕者案漢書天文志作日月薄蝕孟康注曰日月無光曰薄韋昭曰氣往迫為薄虧缺曰蝕京房易傳云日月赤黃為薄釋名云日月虧曰蝕謂稍侵虧如蟲食草木葉也虹者爾雅云螮蝀虹也爾雅音義云雙出鮮盛者為雄雄曰虹暗昧者為雌雌曰霓霓或霓江東呼為雩俗呼為美人釋名云虹攻也謂純陽攻陰義也四展轉成災世尊我等四王及諸無量百千鬼神并守國土諸舊善神遠離去時生如是等無量惡事文句如文記三正勸二初分文文句三正勸為六一欲得現利故必定聽二天欣法食故必定聽三出過三論故必定聽四始終得益成就菩提故必定聽五教主勝於釋梵故必定聽六諸法之本故必定聽記二隨釋六初欲得現利世尊若有人王欲得自護及王國土多受安樂欲令國土一切衆生悉皆成就具足快樂欲得擁伏一切外敵欲得擁護一切國土欲以正法正治國土欲得除滅衆生怖畏世尊是人王等應當必定聽是經典及恭敬供養讀誦受持是經典者記二天欣法食我等四王及無量鬼神以是法食善根因緣得服甘露無上法味增長身力心進勇鋭增益諸天何以故以是人王至心聽受是經典故記三出過三論如諸梵天説出欲論釋提桓因種種善論五通之人神仙之論世尊梵天釋提桓因鬼神通人雖有百千億那由他無量勝論是金光明於中最勝文句三論者四韋陀論説梵事毗伽羅論説十善事僧佉衛世師勒沙婆論説學通事云云記四韋陀者即外人典籍摩隥伽經云初人名梵天造一韋陀次有仙名白淨變一為四一名讚誦二名祭祀三名歌詠四名禳災次名弗沙有二十五弟子各一韋陀能廣分別遂成二十五韋陀次名鸚鵡次名善道及其弟子漸漸增廣如是展轉有千二百六韋陀今言四者從其根本為名皆明梵事出離欲染故云梵天説出欲論也毗伽羅論此名記論婆尼尼造明種種經書并諸雜語又名字本河西云世間文字之根本典籍音聲之論宣通四辨訶責世法讚出家法言辭清雅義理深邃雖是外論而無邪法將不是善權大士所為也僧佉此云數論諸法從數起故劫初黃頭仙所造衛世師此云勝論謂諸論中勝故勝人所造故成劫末鵂鶹外道造勒沙婆此云苦行未知出世時節以人名名所造論此三仙所説無漏盡通故唯五通四始終獲利所以者何如來説是金光明經為衆生故為令一切閻浮提內諸人王等以正法治為與一切衆生安樂為欲愛護一切衆生欲令衆生無諸苦惱無有他方怨賊棘刺所有諸惡背而不向欲令國土無有憂惱以正法教無有諍訟是故人王各於國土應然法炬熾然正法增益天衆我等四王及無量鬼神閻浮提內諸天善神以是因緣得服甘露法味充足得大威德進力具足閻浮提內安隱豐樂人民熾盛安樂其處復於來世無量百千不可思議那由他劫常受微妙第一快樂復得值遇無量諸佛種諸善根然後證成阿耨多羅三藐三菩提得如是等無量功德悉是如來正遍知説記經如來正遍知説者十號中二號也五教主勝故如來過於百千億那由他諸梵天等以大悲力故亦過無量百千億那由他釋提桓因以苦行力故是故如來為諸衆生演説如是金光明經記經以大悲力故等者用無緣大悲普覆法界故超梵王四等之心以難思苦行積劫利物故超帝釋十善之因六諸法本故若閻浮提一切衆生及諸人王世間出世間所作國事所造世論皆因此經欲令衆生得安樂故釋迦如來示現是經廣宣流布世尊以是因緣故是諸人王應當必定聽受供養恭敬尊重讚歎是經文句皆如文記經一切衆生等者世間謂五戒十善十二門禪等出世間者四教法門者三乘修證也國事者禮樂征伐治世育民之事也造世論者如上三論及下正論等也皆因此經者乃教行理三種經也故新本云欲生人天欲得四果支佛欲得佛皆依此經懺悔滅障方得成就若探取化意即是於一佛乘分別説三但以此經部在方等教猶屬通理就人分未免異趣故欲令等言隨其五乘而得安樂也二佛述二初分文文句次佛述成文為二初番述成舉興勸不弘則衰無可述成又解云前番則兩述成而與安樂是述成舉興勸滅其衰患是述成舉衰勸記二隨釋二初舉興衰勸爾時佛復告四天王汝等四王及餘眷屬無量百千那由他鬼神是諸人王若能至心聽是經典供養恭敬尊重讚歎汝等四王正應擁護滅其衰患而與安樂記二正勸若有人能廣宣流布如是妙典於人天中大作佛事能大利益無量衆生如是之人汝等四王必當擁護莫令他緣而得擾亂令心恬靜受於快樂續復當得廣宣是經文句從若有人能於人天中作大佛事者述成正勸云云記第六説偈頌德二初分文文句第六白佛文為三一説偈歎二佛以偈答三歡喜發誓偈歎有八行半文為三初一行歎三身次五行半歎身相次二行結歎記二釋義三初説偈歎三初歎三身爾時四天王即從座起偏袒右肩右膝著地長跪合掌於世尊前以偈讚曰佛月清淨滿足莊嚴佛日暉曜放千光明記文三初依現文別對三身文句夫三身有通別依文是別空是法身日是報身月是應身記空是法身者經無空字以其日月必依於空又下文云佛真法身猶如虛空是故疏以空日月三對於三身空無明暗日月共依別喻法身體本周遍日能破暗別喻報身三惑盡淨月能盈昃別喻應身隨機勝劣此之別對為下圓融而作張本耳二取喻義通具三身二初取喻顯圓文句通意者空是法身日是報身水日是應身空是法身月是報身水月是應身空是法身日中空是報身水中空是應身月亦如是記若以三喻別對三身恐謂三身其體隔異故今委取能喻之事其義不局每喻各自具於三義如日一喻上必依空下必現水此之三義則顯報智圓具三身此則三般若論三身也月喻亦爾可顯應用圓具三身此則三解脫論三身也太虗空是日所依空天日水日當體含空此之三空則顯法體圓具三身月亦如是者月所依空天月水月其中含空亦顯法體圓具三身空遍日月兩説三身者乃約雙照中道而示此則三軌而論三身也二以結文示文句依結歎文空是法身月是報身水月是應身空是法身日是報身𦦨是應身化法是法身化主是報身化事是應身記此結歎文凡舉三喻謂月𦦨化此三事義各合具三如月一喻必上依空必下現水此乃應身圓具三身文舉如焰焰必依日日必依空此乃報身圓具三身文舉如化化必有術名為化法術必在人即是化主其變化物名為化事此乃法身圓具三身三復取結文以通融別文句雖復別説義則通融故文云無有障礙即通意也記經既顯云無有障礙若非以法而定於喻一一圓融何稱此中無障礙説當以此意融身相文使一一相皆嚴三身成密藏相二歎身相二初分科釋經二初分科文句歎身相文為五初一行歎上兩相謂目與齒次一行半歎智斷兩德謂智三昧次兩行歎下兩相謂平與網次兩句絶言歎謂不可思議次兩句結歎記二釋經五初歎上二相如來面目最上明淨齒白無垢如蓮華根記二歎智斷功德無量猶如大海智淵無邊法水具足百千三昧無有缺減記初二句總標有喻有法次四句是別歎二句是智二句是斷淵海也管子曰水出於地而不流曰淵三歎下二相足下平滿千輻相現足指網縵猶如鵝王光明晃曜如寶山王微妙清淨如鍊真金記四絶言歎所有福德不可思議記五結歎佛功德山我今敬禮記二總示身相三初通嚴三身文句夫相好不獨在應身報法亦通莊嚴父母生身者應相好也莊嚴尊特身者報相好也莊嚴法門者法身相好也記相好不獨在應身報法亦通等者如今所列目齒輪網例於上下二十八相通能莊嚴三種身也以身相是一隨見成三莊嚴父母生身者以藏通人但言偏空所見佛相謂由正習搆造而成相非奇特但能少勝輪王而已以不知心現見從外來取色分齊故名生身此乃如來曲順凡小示現此身故名為應莊嚴尊特身者以別教人能信中道妙色妙心隨緣變造所見佛相知從心現無有分齊或現大身十蓮華藏世界塵相或現八萬四千相好或時秪於丈六三十二相令其機緣無分齊見不同藏通分齊之身故名尊特此乃如來修道所得故名為報莊嚴法門者以圓教人了大小身及多少相皆性本具修德無功相雖是色色即是心故起信論云色性即智説名智身智性即色説名法身今從即智名法門故以八萬四千陀羅尼為髮乃至定慧為足以即色故故得名為法身相好此乃相好隨解而轉故使莊嚴三身相異二別示法門文句今言歎智斷即法身相好也記此乃指經智淵無邊而為智德百千三昧而為斷德此之二德能收一切莊嚴法門也學者若於色心分隔而解此義則永不識法身相好也三文示圓融文句文云無有障礙者非獨歎一身相也記上來分別法報應相欲令易解故須就機淺深優劣須了前前不知後後須了後後必見前前良以前粗後妙故也今四天王是大菩薩就圓稱歎見三身相與妙三德無二無別應是解脫豈隔二德報法準知欲彰此義是故特云無有障礙若知此意方是深達金光明法門也三結歎佛真法身猶如虗空應物現形如水中月無有障礙如𦦨如化是故我今稽首佛月記文二初直銷經文二初銷文文句偈初標佛月今結先佛月為三身次結三身通融故言無有障礙次結佛日故言如𦦨次結佛化身即是四身義故言如化皆具三身四身則是無障礙也結竟即禮禮於佛月亦是禮佛日佛化也記結佛月為三身者現文唯有空與水月合有天月可喻三身言佛化為四身者法身妙色而為化法報應二身照理鑒機而為化主曲順機緣現九界身而為化事今以化事顯具上三故論四身皆具三四者趣舉一身即三即四彼彼皆爾方名無礙二結妙二初明始末皆三文句品初歎經歎體宗用品後讚佛辭異義同佛真法身即是體佛月清淨即是宗應現水月即是用記三章是法三身是人攬法為人人不離法故云辭異其義是同佛月清淨者取偈初句成今三身二歎天辨絶妙文句天王天辨其妙若此也記初歎三章云金光明微妙經典顯不縱橫今結三身言無障礙亦非縱橫以初以後顯於中間句句無非談祕密藏大師歎妙其意在茲二料簡機應上明三身無有障礙其義幽微猶慮學人三相不泯情有分張今明三身及以所被無非法界法界無外更何彼此三初一問答明法外無餘文句問空譬法身月譬報身空為作月不作月空若作月月非空作空不作月月那依空答空不作月亦不作非月月非月必依於空法不作報亦不作非報報非報必依於法記言法不作報非報者非報是應難云三身秪一法界豈有能作作所作耶而言依法者此同體依依而復即全體之用用還依體二一問答報即法界文句又問法不作報非報報非報必依於法者亦應月不作影亦不作非影影非影必依於月者月亦是法身邪答智與法冥法是法界智亦如法界云云記影是應身非影是化身以現九界非佛像故法界下注云云者更合明於應是法界三同祕藏豈有一身非法界耶三一問答明機外無應三身一體人或信之其所對機多謂他境故今顯示令泯此疑二初設並顯文句又並影不作動與不動動不動必依於水水亦是法界邪答動不動譬機一切諸法中悉有安樂性譬法界亦是無妨記動譬機生不能覩應不動譬機熟則能覩應水譬正因安樂性者即大涅槃既是三德性必妙融寧非法界故自他不二門云物機無量不出三千能應雖多不出十界物機應契身土無偏同常寂光無非法界若昧此意勿議今宗二引文證文句又淨度三昧云衆生亦度佛若無機感佛不出世亦不能得成三菩提出世菩提皆由衆生機為法界此義成也記因感出世由生成佛人皆共知四教悉爾今從圓説始窮經意良以自他性本不二方有能感及有能資因感出世者即十界機感十界應也以生地獄與佛地獄性不二故方能感見地獄之應乃至感佛亦復如是今宗所論感應皆具十法界者為顯不二義若不然豈惟衆生不能感佛抑亦十處不成法界宜深究之宜深究之由生成佛者衆生能作成佛勝緣也若順若違並資佛行而惡逆者其功最強如無達多佛豈成道然若惡法本非佛性何能資助菩薩成佛菩薩不觀生為法界非同體悲非無作行何能成就大菩提果若其佛外有一衆生非佛法界生外有佛法界不成不作此解未超三藏何況通別二佛以偈答二初立意分文二初立意二初正立文句佛答二十四行半偈天王所以讚佛者佛能説法故也法王所以讚法者法能成佛故也記法能成佛者諸佛軌法方成因果以法常故諸佛得常例樂我淨亦復如是二引證文句般若云我初成道觀誰可敬可讚無過於法法能成立一切凡聖故佛讚法以答天王記法能成立一切凡聖者以法本具十法界故隨染淨緣起成凡聖凡夫雖迷而其迷中假實依正未始離性須知染緣熏於性染方成染法淨緣熏淨人皆共知性染性淨其體本融全體而起隨染緣則染淨俱染隨淨緣則染淨俱淨故不二門云三千在理同名無明三千果成咸稱常樂性之染淨是金光明經王妙體如來今説為作淨緣是故稱歎以答天王二分文文句文為三初一行歎經體答其法身次一行歎經宗答其報身次二十二行半歎經用答其應身悉如文記二用意釋文三初歎經體爾時世尊以偈答曰此金光明諸經之王甚深最勝為無有上記二歎經宗十力世尊之所宣説汝等四王應當勤護記三歎經用私開為四初通就衆生明生善滅惡以是因緣是經妙典能與衆生無量快樂為諸衆生安樂利益故久流布於閻浮提能滅三千大千世界所有惡趣無量諸苦記二別約人王明生善滅惡三初明願欲閻浮提內諸人王等心生慈愍正法治世若能流布此妙經典則令其土安隱豐熟所有衆生悉受快樂若有人王欲愛己身及其國土欲令豐盛記二明立行應當至心淨潔洗浴往法會所聽受是經是經能作所有善事摧伏一切內外怨賊復能除滅無量怖畏是諸經王能與一切無量衆生安隱快樂記三明獲益譬如寶樹在人家中悉能出生一切珍寶是妙經典亦復如是悉能出生諸王功德如清冷水能除渴乏是妙經典亦復如是能除諸王功德渴乏譬如珍寶異物篋器悉在于手隨意所用是金光明亦復如是隨意能與諸王法寶記三約上聖護念明生善滅惡是金光明微妙經典常為諸天恭敬供養亦為護世四大天王威神勢力之所護持十力諸佛常念是經記四約師弟説聽明生善滅惡若有演説稱讚善哉亦有百千無量鬼神從十方來擁護是人若有得聞是妙經典心生歡喜踊躍無量閻浮提內無量大衆皆悉歡喜集聽是經聽是經故具諸威德增益天衆精氣身力記三四王歡喜發誓爾時四王聞是偈已白佛言世尊我從昔來未曾得聞如是微妙寂滅之法我聞是已心生悲喜涕淚橫流舉身戰動肢體怡解復得無量不可思議具足妙樂以天曼陀羅華摩訶曼陀羅華供養奉散於如來上作如是等供養佛已復白佛言世尊我等四王各各自有五百鬼神常當隨逐是説法者而為守護文句三四王歡喜發誓如文記經悲喜者悲昔不聞喜今得聞悲他不聞喜自得聞涕淚橫流者涕音體涕即淚橫謂交橫古本皆作橫流不須改為交字大經亦爾無識所翻多云橫流也文選王粲登樓賦曰悲舊鄉之擁隔兮涕橫墜而未禁怡解者怡謂和悅解胡買反舒散也記二大辨品二初品題金光明經大辨天品第七記句文分二初釋大辨二初所住法門二初具明四辨文句辨有四種小辨無量辨雙辨大辨無漏法名小辨恆沙法名無量辨備二種名雙辨雙非雙照名大辨記擬於四教藏不明大但説無漏故名小辨通教出假説於界內塵沙八門名無量辨別教能説界內界外二種塵沙故名雙辨圓談十界法法皆中二邊情泯法法互遍真俗宛然三諦一諦名為大辨二明所住法文句此天住智慧莊嚴法門自住大辨記最勝王云大辨才天女依高山頂葺茅為室結草為衣坐翹一足空假中智一心中得破根本惑莊嚴法身心既融通説乃自在即自住大辨也二能用四悉文句以自在力為悅衆生故隨説一辨若二若三若四故名大辨為宜衆生故若授一辨若二若三若四宜而立之故名大辨為對衆生故或對一辨若二若三若四對而治之故名大辨為悟衆生故若悟一辨若二若三若四一悟一切悟而開發之故名大辨記圓辨深妙能談粗淺隨機而授無有罣礙方名大辨是故疏以悅宜對悟而論四悉令得四悅乃至四悟此則一悉明於四教亦是四教各有四益大辨才天力用如是二明品意文句對佛發願以大辨加於説者故稱大辨品記二經文二初分文釋義二初分文文句文為三一從白佛下以大辨力加益法師二從若有衆生於百千下以感應力加於化道三從復令無量下以行力加於聽者記二釋義三初加法師爾時大辨天白佛言世尊是説法者我當益其樂説辨才令其所説莊嚴次第善得大智若是經中有失文字句義違錯我能令是説法比丘次第還得能與總持令不忘失文句初加法師以樂説辨才莊嚴次第是辭辨大智是義辨總持是法辨記加圓四辨自能該三即前四四十六益也樂説辨者於一字中説一切字於一語中説一切語於一法中説一切法隨可度者而有所益也辭辨者種種莊嚴言語善巧也義辨者知諸法義所歸趣處也法辨者智慧通達諸法名字也二加化道若有衆生於百千佛所種諸善根是説法者為是等故於閻浮提廣宣流布是妙經典令不斷絶文句若有衆生下加化道流布不絶加其能化之道無人無所化無道無能化因緣和合化道不絶也記前加四辨是能化之道今加其人是所化之機此二和合化道無窮也三加聽者復令無量無邊衆生得聞是經當令是等悉得猛利不可思議大智慧聚不可稱量福德之報善解無量種種方便善能辨暢一切諸論善知世間種種伎術能出生死得不退轉必定疾得阿耨多羅三藐三菩提文句從復令無量下是加聽衆兩益聞經至不退轉是加因益必定得菩提是加果益記經伎術也二結示益深文句文言雖略誓願甚深為益大矣記第三功德天品二初品題金光明經功德天品第八記句文分二初釋功德文句此天住福德莊嚴法門攝一切法而以功德為首故言功德天又能與説者所須無所乏少故名功德天又令説者晝夜思惟是經深義故名功德天又令聽者速成菩提具此衆義故名功德天品記於二嚴中此當福德福能資智以嚴本理智即三般若福即三解脫所顯所嚴即是三軌若總若別皆金光明一體異名也應知大辨與功德天咸皆證入金光明法門皆能遍攝一切法也引物偏好名行不同彼攝一切以智為首此攝一切以福為首能攝所攝對智不同故當世界所須不乏能生正念即當為人思惟深義能破偏淺即當對治能令速悟本性菩提當第一義二明品意文句此是天王護經第三意福資請説及以聽者記二經文二初分文文句文為六一從白佛下發誓四事資給法師二從我已於過去下明福德之由三從若有人能稱下勸示行法文中有略示廣示云云四從我於爾時如一念頃下誓臨影響五從若能以已所作回施我下要求同行六從應當禮下別示歸敬記二釋義六初誓給四事即經所列衣服飲食臥具醫藥也爾時功德天白佛言世尊是説法者我當隨其所須之物衣服飲食臥具醫藥及餘資産供給是人無所乏少令心安住晝夜歡樂正念思惟是經章句分別深義若有衆生於百千佛所種諸善根是説法者為是等故於閻浮提廣宣流布是妙經典令不斷絶是諸衆生聽是經已於未來世無量百千那由他劫常在天上人中受樂值遇諸佛速成阿耨多羅三藐三菩提三惡道苦悉畢無餘記及餘資産者即四事之外一切資具産生之物也二明福德之由世尊我已於過去寶華功德海琉璃金山照明如來應供正遍知明行足善逝世間解無上士調御丈夫天人師佛世尊所種諸善根是故我今隨所念方隨所視方隨所至方能令無量百千衆生受諸快樂若衣服飲食資生之具金銀七寶真珠琉璃珊瑚琥珀璧玉珂貝悉無所乏記述過去世值佛修證金光明法門故能今日隨弘經處有求皆與寶華等八字別號也如來等通號也無虛妄名如來良福田名應供知法界名正遍知具三明名明行足不還來名善逝知衆生國土名世間解無與等名無上士調他心名調御丈夫為衆生眼名天人師知三聚名佛具茲十號名世間尊種諸善根者以照金光明微妙之智為諸善之根也璧者玉所琢器也周禮云以蒼璧禮天是也珂貝螺屬也三勸示行法二初略勸示若有人能稱金光明微妙經典為我供養諸佛世尊三稱我名燒香供養供養佛已別以香華種種美味供施於我灑散諸方當知是人即能聚集資財寶物以是因緣增長地味地神諸天悉皆歡喜所種穀米芽莖枝葉果實滋茂樹神歡喜出生無量種種諸物我時慈念諸衆生故多與資生所須之物記二廣勸示私開六初示常所住處世尊於此北方毗沙門天王有城名曰阿尼曼陀其城有園名功德華光於是園中有最勝園名曰金幢七寶極妙此即是我常止住處記經阿尼曼陀此云有財二示稱名供養若有欲得財寶增長是人當於自所住處應淨掃灑洗浴其身著鮮白衣妙香塗身為我至心三稱彼佛寶華琉璃世尊名號禮拜供養燒香散華亦當三稱金光明經至誠發願別以香華種種美味供施於我散灑諸方記三明誦持神呪爾時當説如是章句波利富樓那遮利一三曼陀達舍尼羅佉二摩訶毗訶羅伽帝三三曼陀毗陀尼那伽帝四摩訶迦梨波帝五波婆禰薩婆多㖃六三曼陀修鉢梨富隸七阿夜那達摩帝八摩訶毗鼓畢帝九摩訶彌勒簸僧祇帝十醯帝篩三博祇悕帝十一三曼陀阿咃十二阿䨲婆羅尼十三記四明歎呪勸持是灌頂章句必定吉祥真實不虛等行衆生及中善根應當受持讀誦通利七日七夜受持八戒朝暮淨心香華供養十方諸佛記灌頂章句者以法性水灌十地頂受法王職今密談此法故名灌頂必定是般若德吉祥是解脫德真實不虛是法身德以此三德讚灌頂義等行謂具行諸行中善根謂行一行八戒者即在家人一日一夜也於五戒上更加不著華香不觀聽妓樂不止高牀此八是戒不過中食是齋五勸回向菩提常為己身及諸衆生回向具足阿耨多羅三藐三菩提作是誓願令我所求皆得吉祥記此乃奉供及誦密言邀請意也若為自身受五欲樂希望財寶即輪回業衆聖所訶尊天寧護令為己他成菩提故其所剋獲非生死因當依此文修今行法六勸嚴處奉待自於所居房舍屋宅淨潔掃除若自住處若阿蘭若處以香泥塗地燒微妙香敷淨好座以種種華香布散其地以待於我記阿蘭若此云無諍以其所居不與世諍即離聚落五里處也又有達摩阿蘭若謂説諸法本來清淨因名其處為法阿蘭若即華嚴經初於阿蘭若法菩提場是也今經所指該其二也四誓臨影響我於爾時如一念頃入其室宅即坐其座從此日夜令此居家若村邑若僧坊若露地無所乏少若錢若金銀若珍寶若牛羊若穀米一切所須即得具足悉受快樂記五要求同行若能以已所作善根最勝之分回與我者我當終身不遠其人於所住處至心護念隨其所求令得成就記六別示歸敬應當至心禮如是等諸佛世尊其名曰寶勝如來無垢熾寶光明王相如來金𦦨光明如來金百光明照藏如來金山寶蓋如來金華𦦨光相如來大炬如來寶相如來亦應敬禮信相菩薩金光明菩薩金藏菩薩常悲菩薩法上菩薩亦應敬禮東方阿閦如來南方寶相如來西方無量壽佛北方微妙聲佛文句悉如文記問大經中説功德姊主黑暗妹隨有智主人二俱不受今令奉供與彼大違兩經所談如何和會答尊經設法取捨多塗大權垂形表報非一彼對黑暗表生必死四相相隨此對大辨表福資智二嚴互顯也四相是過寧不雙驅二嚴是功理合俱進有智之福生死自亡有福之智菩提可證今為説聽金光明典故藉天資所須之物須知今用雙亡生死弘經之心感功德天所獲資財離我我所姊尚不著妹豈能來此為弘經彼專修觀用捨論益去留豈同又如國王大臣官長法華令離涅槃令近故知設法各有異門豈以彼經難今所説記第四堅牢地神品二初品題金光明經堅牢地神品第九記句文分二初正解名二初所表之智立四悉文句上諸天或住善權方便道為衆生法父此天住善實智度道為衆生法母一義也譬如陰陽覆載卉木智度養育出生衆善二義也餘度各有所主未亡未泯實智照了無相無名三義也餘度有等有上智度無等無上是究竟度四義也記淨名云智度菩薩母方便以為父一切衆導師無不由是生上是天神天是陽故如父此既地神地神是陰故如母一義也者父母不同故屬世界天陽上覆地陰下載卉是草之總名木是樹之都稱智度下合喻衆善合卉木也各有下如檀主破慳乃至禪主破散五屬緣因故未亡泯智破生法方無名相破惡中最故當對治智度復本破立俱忘故無等無上名第一義此於智度立四悉檀二能召之名彰四德文句智度法門常無改變義曰堅牢常也能荷樂也能生淨也名之為地德力自在我也稱之為神從此等法門故名堅牢地神品記堅牢即常德地即樂淨無苦受故荷持一切離染著故出生無盡神即我德威德力用悉自在故二明品意文句此品是天王護法第四意翻涌地味資益請説聽等地也記二經文二初分文文句文為三一從白佛下誓涌地味利益行者二從爾時佛告下如來述成三從爾時地神下發誓弘經記二隨釋三初誓涌地味三初明己身增長二初生起八事文句初涌地味文為三從初白佛下明己身利益凡約八事展轉增長由聞法故法味增長法味增長故氣力增長氣力增長故翻地味增長地味增長故諸物增長諸物增長故衆生五果增長五果增長故修行增長修行增長故供養增長供養增長故弘通增長記二隨事釋經八當依生起次第消之初法味增長爾時地神堅牢白佛言世尊是金光明微妙經典若現在世若未來世在在處處若城邑聚落若山澤空處若王宮宅世尊隨是經典所流布處是地分中敷師子座令説法者坐其座上廣演宣説是妙經典我當在中常作宿衛隱蔽其身於法座下頂戴其足我聞法已得服甘露無上法味記經聚落者落居也人之聚居故名聚落山澤者下有水曰澤宿衛謂止宿衛護二氣力增長增益氣力記三地味增長而此大地深十六萬八千由旬從金剛際至海地上悉得衆味增長具足豐壤肥濃過於今日記四諸物增長以是之故閻浮提內藥草樹木根莖枝葉華果滋茂美色香味皆悉具足記五五果增長五果者即經云壽命色力辨安也此之五果由食而致衆生食已增長壽命色力辨安六情諸根具足通利威德顏貌端嚴殊特成就如是種種等已記六修行增長所作事業多得成辦有大勢力精勤勇猛是故世尊閻浮提內安隱豐樂人民熾盛一切衆生多受快樂應心適意隨其所樂記七供養增長是諸衆生得是威德大勢力已能供養是金光明經及恭敬供養持是經者四部之衆記八流通增長我於爾時當往其所為諸衆生受快樂故請説法者廣令宣布如是妙典文句悉如文記二明眷屬增長二初生起五事文句從何以故世尊下明眷屬利益是經力增長凡約五事展轉增長以經力故我眷屬增長眷屬增長故地味增長地味增長故諸物增長諸物增長故衆生快樂增長快樂增長故依報皆具足具足亦名增長記二隨事釋經五並如生起初眷屬增長何以故世尊是金光明若廣説時我及眷屬所得功德倍過於常增長身力心進勇鋭世尊我服甘露無上法味已記二地味增長閻浮提地縱廣七千由旬豐壤倍常記經縱廣者南北曰縱東西曰廣三諸物增長世尊如此大地衆生所依悉能增長一切所須之物增長一切所須物已記四快樂增長令諸衆生隨意所用受於快樂記五依報增長種種飲食衣服臥具宮殿屋宅樹木林苑河池井泉如是等物依因於地悉皆具足記三明報恩增長二初生起六事文句從世尊是諸衆生下名報恩增長凡約六事展轉增長以知我恩故專聽增長專聽增長故功德增長功德增長故教他增長教他增長故地味增長地味增長故受樂增長受樂增長故信施增長記二隨事釋經六亦如生起初專聽增長是故世尊是諸衆生為知我恩應作是念我當必定聽受是經供養恭敬尊重讚歎作是念已即從住處若城邑聚落舍宅空地往法會所聽受是經記二功德增長既聽受已還其所止各應相慶作如是言我等今日聞此甚深無上妙法已為攝取不可思議功德之聚值遇無量無邊諸佛三惡道報已得解脫於未來世常生天上人中受樂記三教他增長是諸衆生各於住處若為他人演説是經若説一喻一品一緣若復稱歎一佛一菩薩一四句偈乃至一句及稱是經首題名字記四地味增長世尊隨是衆生所住之處其地具足豐壤肥濃過於餘地凡是因地所生之物悉得增長滋茂廣大記五受樂增長令諸衆生受於快樂多饒財寶記六信施增長好行惠施心常堅固深信三寶文句悉如文記二佛述成二初標文文句二佛述成記二隨釋二初述成展轉增長爾時佛告地神堅牢若有衆生乃至聞是金光明經一句之義人中命終隨意往生三十三天文句文為二一約聞經展轉增長從人世至天世從天世至出世日夜即受不可思議快樂即出世樂也地神所説止是今世增長如來述成文雖略意極長遠記一約聞經下為成展轉義故探取下科為出世也日夜受樂在次文耳二述成供養增長地神若有衆生為欲供養是經典故莊嚴屋宅乃至張懸一幡一蓋及以一衣欲界六天已有自然七寶宮殿是人命終即往生彼地神於諸七寶宮殿之中各各自然有七天女共相娛樂日夜常受不可思議微妙快樂文句二述成供養增長從人世至天世從天世至出世長遠之義準前可知云云記經明供養是在人世也是人下往天世也日夜下至出世也雖受天樂住樂法界故無所受是故名為不可思議微妙快樂三發誓護經二初分文文句三發誓護經文為三一誓護説法者二誓護化道不絶三誓護聽法者記二釋義三並如分文初誓護説法者爾時地神白佛言世尊以是因緣説法比丘坐法座時我常晝夜衛護不離隱蔽其形在法座下頂戴其足記二誓護化道不絶世尊若有衆生於百千佛所種諸善根是説法者為是等故於閻浮提廣宣流布是妙經典令不斷絶記三誓護聽法者是諸衆生聽是經已未來之世無量百千那由他劫於天上人中常受快樂值遇諸佛疾成阿耨多羅三藐三菩提三惡道苦悉斷無餘文句如文音釋經懅音巨懅畏怖也撻音塔撻笞也沃音屋沃灌也恬音田恬靜也㖃厚吼二音簸音布簸去粳也咃音他
