body:
  text: 北涼三藏法師曇無讖譯經天台智者大師説文句門人灌頂録四明沙門知禮述文句記雙徑沙門明得會句并記入於經文記二流水品二初品題金光明經流水長者子品第十六記句文分二初兼除病釋名二初釋流水二初引文標二名文句文云一能流水二能與水記二接經釋二義二初釋二義二初別釋二義二初釋與水二釋流水初則大慈與樂次則大悲拔苦初又二初列二水文句與水者與安樂水也一世安樂二出世安樂記二釋二水文句世安樂者如象負水濟彼枯魚是也出世安樂者如發誓言於未來世當施法食與菩提記是也記今此一類世樂且在果報之益出世唯明一實之益若論此時結淨國緣合遍人天及以四教二釋流水二初列二水文句流水者流除苦惱水也一果報苦惱二業因苦惱記流除者流去其水即是除義二釋二水文句流除果報苦惱如治諸病人救彼渴魚是也流除業因苦惱者授三歸説十二因緣讚佛十號是也記言業因者於果報外九益皆能除於業因今十號等乃以能除顯於所除十二因緣經稱甚深驗三歸十號皆是圓説讖本雖無三歸之文最勝經有真諦所譯必亦有之授法之儀闕之不可二雙成二義文句請父求方欲成流水之義從王借象欲成與水之義記二單示題二初問文句既有二能那單以流水題品記二答文句文中既彰與水之義題品須安流水之名不煩於文二義雙顯出經者之巧為若此也記經文與題二名互題巧不過此也二釋長者子文句長者者如法華疏中十種長者義也子者持水之子故言子也記法華疏中具十種德名長者一姓貴二位高三大富四威猛五智深六年耆七行淨八禮備九上歎十下歸子者下亦如王子公子也故經云持水大長者家中後生一子名曰流水二取授記出意文句此文是斷疑中第三結緣之近由記二經文三初明第三結緣近由二初分文文句近由又二一弄引二正近由弄引又二一行恩布德二國人稱美並如文近由又三一明眷屬二見魚之緣三正救魚如文記二釋義二初弄引二初行恩布德佛告樹神爾時流水長者子於天自在光王國內治一切衆生無量苦患已令其身體平復如本受諸快樂以病除故多設福業修行布施記二國人稱美尊重恭敬是長者子作如是言善哉長者能大增長福德之事能益衆生無量壽命汝今真是大醫之王善治衆生無量重病必是菩薩善解方藥記二正近由三初明眷屬善女天時長者子有妻名曰水空龍藏而生二子一名水空二名水藏記二見魚之緣即禽獸馳奔也時長者子將是二子次第遊行城邑聚落最後到一大空澤中見諸虎狼狐犬鳥獸多食肉血悉皆一向馳奔而去時長者子作是念言是諸禽獸何因緣故一向馳走我當隨後逐而觀之記三正救魚私開為二初明因緣二初因流水興悲時長者子遂便隨逐見有一池其水枯涸於其池中多有諸魚時長者子見是魚已生大悲心記二緣樹神示數時有樹神示現半身作如是言善哉善哉大善男子此魚可愍汝可與水是故號汝名為流水復有二緣名為流水一能流水二能與水汝今應當隨名定實時長者子問樹神言此魚頭數為有幾所樹神答言其數具足足滿十千善女天爾時流水聞是數已倍復增益生大悲心記二與水食二初與水四初取樹技覆日善女天時此空池為日所曝唯少水在是十千魚將入死門四向宛轉見是長者心生恃賴隨是長者所至方面隨逐瞻視目未曾捨是時長者馳趣四方推求索水了不能得便四顧望見有大樹尋取枝葉還到池上與作陰涼記恃依也二知水源決絶作陰涼已復更推求是池中水本從何來即出四向周遍求覔莫知水處復更疾走遠至餘處見一大河名曰水生爾時復有諸餘惡人為捕此魚故於上流懸險之處決棄其水不令下過然其決處懸險難補計當修治經九十日百千人功猶不能成況我一身記捕捉也決棄其水決音穴廣雅云穿也説文云下流也周易藩決不羸亦音穴也三就大王借象時長者子速疾還反至大王所頭面禮拜却住一面合掌向王説其因緣作如是言我為大王國土人民治種種病漸漸遊行至彼空澤見有一池其水枯涸有十千魚為日所曝今日困厄將死不久惟願大王借二十大象令得負水濟彼魚命如我與諸病人壽命爾時大王即敕大臣速疾供給爾時大臣奉王告敕語是長者善哉大士汝今自可至象廄中隨意選取利益衆生令得快樂記廄馬舍也釋名云廄聚也馬之所聚也四明負水濟魚是時流水及其二子將二十大象從治城人借索皮囊疾至彼河上流決處盛水象負馳疾奔還至空澤池從象背上下其囊水瀉置池中水遂彌滿還復如本記二施食二初察魚飢惱時長者子於池四邊倣徉而行是魚爾時亦復隨逐巡岸而行時長者子復作是念是魚何緣隨我而行是魚必為飢火所惱復欲從我求索飲食我今當與記倣徉上扶方反下以章反廣雅徙倚也又徘徊也二取食施與善女天爾時流水長者子告其子言汝取一象最大力者速至家中啓父長者家中所有可食之物乃至父母飲噉之分及以妻子奴婢之分一切聚集悉載象上急速來還爾時二子如父教敕乘最大象往至家中白其祖父説如上事爾時二子收取家中可食之物載象背上疾還父所至空澤池時長者子見其子還心生歡喜踊躍無量從子邊取飲食之物散著池中與魚食已即自思惟我今已能與此魚食令其飽滿記二明第四結緣二初分文文句從未來之世當施法食下是第四正結緣又為四一發誓願二思惟説法三正説法四魚改報生天酬恩供養就魚報恩文為四一魚改報生天二天酬恩而下地三王見光問瑞四長者徵教而定答如文記二釋義四初發誓願未來之世當施法食記二思惟説法復更思惟曾聞過去空間之處有一比丘讀誦大乘方等經典其經中説若有衆生臨命終時得聞寶勝如來名號即生天上我今當為是十千魚解説甚深十二因緣亦當稱説寶勝佛名時閻浮提中有二種人一者深信大乘方等二者毀呰不生信樂時長者子作是思惟我今當入池水之中為是諸魚説深妙法思惟是已即便入水記三正説法作如是言南無過去寶勝如來應供正遍知明行足善逝世間解無上士調御丈夫天人師佛世尊寶勝如來本往昔時行菩薩道作是誓願若有衆生於十方界臨命終時聞我名者當令是輩即命終已尋得上生三十三天爾時流水復為是魚解説如是甚深妙法所謂無明緣行行緣識識緣名色名色緣六入六入緣觸觸緣受受緣愛愛緣取取緣有有緣生生緣老死憂悲苦惱記先稱十號次説因緣十號在悟在果因緣在迷在因迷悟因果其名雖殊而體不異以十號果是究盡三德十二因緣是本來三德三德不改因果寧殊故普賢觀云大乘因者諸法實相大乘果者亦諸法實相諸法是修二實相是一性此三圓融不縱不橫全體為因全體為果衆生雖迷十號無減諸佛悟極十二不虧以世間相皆常住故今先唱果果理已顯令其解生初稱寶勝者乃是別名名於一佛如來等十乃是通名三世十方佛佛皆具若以通從別合得名為寶勝如來寶勝佛寶勝世尊此三既然例此合云寶勝應供寶勝正遍知乃至寶勝天人師也此十通號大經大論出其名天台慈恩出其義相狀已顯今傍諸釋更約三三及一總結以銷十號令知一一無非祕藏此義若明則不辱於果人名字初三既以如來為首即法身中三也如來是真如屬法身應供利生是解脫正遍知具二智是般若以其法身必具二德故也次三既以明行足為首即解脫中三也三明之行是解脫善逝能趣極是般若解三世間一一常住是法身以其解脫必具二德故也後三既以無上士調御丈夫為首即般若中三也見性名丈夫故當般若天人師軌訓衆機是解脫佛是復本大覺是法身以其般若必具二德故也此九即三此三即一一無一相三九宛然三千世間九世剎那一多延促究竟自在故言世尊十二因緣束為三道無明愛取三支屬煩惱道行有二支屬業道識名色六入觸受及生老死屬苦道此雖昏迷繫縛輪轉而全體即是三因佛性皆不可思議隨人觀察顯發不同故大經説下中上智觀此乃得三乘菩提若上上智觀得佛菩提以前三教智有思議故觀十二止得三乘唯有圓教不思議智體無明等即是性染非佛天人修羅所造一一常住當處圓融方曰因中具於果性又玄文中三道三識雖本有位與果後三德無二無別得此意已方可分別十二別名無明謂不了六受即空假中行謂依不了心動作業行識謂業牽中陰識託母胎名色謂二滴為色心但有名六入謂名色增長成六入根觸謂六根對外為塵所觸受謂觸生三受苦樂平平愛謂迷三受故於樂染著取謂愛染纏綿四方求索有謂由取造業須有來報生謂有業既熟未來陰興老死等謂生須變滅悲惱縈纏此十二支或約三世或約二世或約一念雖三不同皆以十二而對三道即事而理一一究竟清淨自在不縱不橫而高而廣如是觀者得佛菩提略三歸者義已具也蓋三寶三德體本不異既稱南無寶勝十號豈非歸命果上三德復説甚深十二因緣乃是心依因中三德迷悟極際三德無差一體義備三皆具足常樂我淨真是歸依三寶義究竟成當知讖師意趣深妙四魚生天報恩四初魚改報生天善女天爾時流水長者子及其二子説是法已即共還家是長者子復於後時賓客聚會醉酒而臥爾時其地卒大震動時十千魚同日命終既命終已生忉利天記凡初生天以自業力有三種念一自知從其處死二自知今此處生三自知先作何業得來生天既知曩事故下酬恩二天酬恩下地既生天已作是思惟我等以何善業因緣得生於此忉利天中復相謂言我等先於閻浮提內墮畜生中受於魚身流水長者子與我等水及以飲食復為我等解説甚深十二因緣并稱寶勝如來名號以是因緣令我等輩得生此天是故我等今當往至長者子所報恩供養爾時十千天子從忉利天下閻浮提至流水長者子大醫王家時長者子在樓屋上露臥眠睡是十千天子以十千真珠天妙瓔珞置其頭邊復以十千置其足邊復以十千置右脅邊復以十千置左脅邊雨曼陀羅華摩訶曼陀羅華積至于膝作種種天樂出妙音聲閻浮提中有睡眠者皆悉覺寤流水長者子亦從睡寤是十千天子於上空中飛騰遊行於天自在光王國內處處皆雨天妙蓮華是諸天子復至本處空澤池所復雨天華便從此沒還忉利宮隨意自在受天五欲記經樓屋者重屋曰樓或作樓臺者誤也釋此為二初事文句報恩有二善一事二理事者真珠四邊報水飲食因緣十號等四種澤也記因緣十號且就能詮屬言教故同於水食名為事也二理文句理者準涅槃文云施食令他得命表常令他得樂是故得涅槃令他得悟是故成自在我如法求財是故得淨用四十千報常樂我淨之恩也記秪於四事而解四德故成理益以十千魚由戒緩故受鱗介身由乘急故今遇大乘真善知識故能於事深解妙理受食得命即表真常受水得樂表涅槃樂於十二棘林解自在我依十號法獲天報財於世淨命解性淨德此四法益因流水得故持四萬真珠瓔珞報恩供養食等四事既表理益四萬珠瓔豈但事供蓋表千界萬如是法一一皆具常樂我淨即四十千真味瓔珞非嚴而嚴嚴於法身此乃財供而成法供若不爾者豈得名為有妙善根得記緣耶三王見光瑞時閻浮提過是夜已天自在光王問諸大臣昨夜何緣示現如是淨妙瑞相有大光明大臣答言大王當知忉利諸天於流水長者子家雨四十千真珠瓔珞及不可計曼陀羅華王即告臣卿可往至彼長者家善言誘喻喚令使來大臣受敕即至其家宣王教令喚是長者是時長者尋至王所王問長者何緣示現如是瑞相記四長者據教定答長者子言我必定知是十千魚其命已終時大王言今可遣人審實是事爾時流水尋遣其子至彼池所看是諸魚死活定實爾時其子聞是語已向於彼池既至池已見其池中多有摩訶曼陀羅華積聚成𧂐其中諸魚悉皆命終見已即還向其父言彼諸魚等悉已命終爾時流水知是事已復至王所作如是言是十千魚悉皆命終王聞是已心生歡喜記三明第五結會古今爾時世尊告道場菩提樹神善女天欲知爾時流水長者子今我身是長子水空今羅睺羅是次子水藏今阿難是時十千魚者今十千天子是是故我今為其授阿耨多羅三藐三菩提記爾時樹神現半身者今汝身是文句第五結會古今者昔佛疑魚數樹神定判十千今神疑行淺記深佛為説妙因緣今昔相關是故結會也記經羅睺羅此云覆障以六年在胎因立斯號新云羅怙羅此云障月然本迹事不可審知傍文思之十千今昔必是所化餘皆能化此之能化據華嚴等諸經所説皆是劫海修其實因熟其十千令今得脫若取法華久成之意皆是迹中接此等機令今得記此宗講者內心合知記六捨身品二初品題金光明經捨身品第十七記句文分二初問捨多題少文句捨義甚多財位壽命獨以身當名邪記二答從要立題文句此從正要得名受者須身餘則非要施者正捨身餘旁捨爾故言捨身品記受者須身虎飢所逼正須身肉壽命財位非彼所求夫行門無量根由宿熏四種三昧逐人所尚於隨自意善行六度樂行檀者於身命財無所吝惜自行教化隨喜讚歎皆在於施若於善師及依實教修檀行者體能施心及受施境所施身等即空假中事行理觀合一而修助道正修相資而進既稱本習故欣然而為或因事卒行宿緣會故或積年要誓令觀成故或顯陳所願令物效故或密遂其心息他謗故悲重故密慈重故顯心若真實四悉俱成心若詐欺二利皆失然佛談本事令人效行故疏云引昔捐軀誡今師弟勿吝財法問大論云捨身易捨心難論欲行者捨執著心故以難歎欲息事施故以易斥何不依論遠離執心今人為何好捨身命答抑揚取捨皆遵佛教悉赴人心佛談正助不同人樂理事不等今品特示捨於身命安得以論難易為譏又復空説捨心而執己見膠固自體一毛不拔毀他捨命為非既乖隨喜之心寧逃嫉善之咎願聞佛説隨力奉行二經文二初分文文句文為四一問二答三衆得益四結成記二釋義四初問爾時道場菩提樹神復白佛言世尊我聞世尊過去修行菩薩道時具受無量百千苦行捐捨身命肉血骨髓惟願世尊少説往昔苦行因緣為利衆住受諸快樂文句問者上聞大士治病救魚實為曠濟小人小蟲得二世益時衆願聞亡身殞命感深契極之事行苦而果樂可得聞邪是故請問記小人即國病者小蟲一萬枯魚魚關未來法食之誓獲成佛記例病差者定於後世為解脫機是故皆蒙二世之益感深契極者以不二解導難行行此感至深捨身命財與後際等此契唯極衆聞獲益正當此時是故樹神乘機發問二答二初分科文句佛答為二一敘緣起二正明捨身緣起為十一地塔涌二大衆生疑三佛起禮四樹神問禮五佛答禮六命阿難取七阿難述骨狀八命示大衆九奉命取示十佛勸衆禮皆如文記二釋義二初敘緣起十十段悉如科列初地塔涌爾時世尊即現神足神足力故令此大地六種震動於大講堂衆會之中有七寶塔從地涌出衆寶羅網彌覆其上記二大衆生疑爾時大衆見是事已生希有心記三佛起禮爾時世尊即從座起禮拜是塔恭敬圍繞還就本座記四樹神問禮爾時道場菩提樹神白佛言世尊如來世雄出現於世常為一切之所恭敬於諸衆生最勝最尊何因緣故禮拜是塔記五佛答禮佛言善女天我本修行菩薩道時我身舍利安止是塔因由是身令我早成阿耨多羅三藐三菩提記六命阿難取爾時佛告尊者阿難汝可開塔取中舍利示此大衆是舍利者乃是無量六波羅蜜功德所熏記七阿難述骨狀爾時阿難聞佛教敕即往塔所禮拜供養開其塔戶見其塔中有七寶函以手開函見其舍利色妙紅白而白佛言世尊是中舍利其色紅白記八命示大衆佛告阿難汝可持來此是大士真身舍利記九奉命取示爾時阿難即舉寶函還至佛所持以上佛記十佛勸衆禮爾時佛告一切大衆汝等今可禮是舍利此舍利者是戒定慧之所熏修甚難可得最上福田爾時大衆聞是語已心懷歡喜即從座起合掌敬禮大士舍利爾時世尊欲為大衆斷疑網故説是舍利往昔因緣記二正明捨身二初分文文句從過去有王下是正捨身文為二一長行二偈頌長行為四一明本眷屬二捨身方便三正捨身四捨後悲戀記二釋義二初長行四初明本眷屬二初分科文句就本眷屬為五一明本眷屬二遊行三各述相四見産虎五各陳觀見記二釋義五段如分科列初明本眷屬阿難過去之世有王名曰摩訶羅陀修行善法善治國土無有怨敵時有三子端正微妙形色殊特威德第一第一太子名曰摩訶波那羅次子名曰摩訶提婆小子名曰摩訶薩埵文句摩訶羅陀此翻大無罪文殊問經云羅陀翻為中摩訶波那羅或云此翻大度未詳摩訶提婆此言大天摩訶薩埵此翻大心記二明遊行是三王子於諸園林遊戲觀看次第漸到一大竹林憩駕止息記三各述相第一王子作如是言我於今日心甚怖懅於是林中將無衰損第二王子復作是言我於今日不自惜身但離所愛心憂愁耳第三王子復作是言我於今日獨無怖懅亦無愁惱山中空寂神仙所讚是處間靜能令行人安隱受樂記四見産虎時諸王子説是語已轉復前行見有一虎適産七日而有七子圍繞周匝飢餓窮悴身體羸瘦命將欲絶記五各陳觀見第一王子見是虎已作如是言怪哉此虎産來七日七子圍繞不得求食若為飢逼必還噉子第三王子言此虎經常所食何物第一王子言此虎唯食新熱肉血第三王子言君等誰能與此虎食第二王子言此虎飢餓身體羸瘦窮困頓乏餘命無幾不容餘處為其求食設餘求者命必不濟誰能為此不惜身命第一王子言一切難捨不過己身第二王子言我等今者以貪惜故於此身命不能放捨智慧薄少故於是事而生驚怖若諸大士欲利益他生大悲心為衆生者捨此身命不足為難時諸王子心大愁憂久住視之目未曾捨作是觀已尋便離去記二捨身方便二初分科文句從作是念言我今捨身時已到矣下是捨身方便方便為二初述觀解二起誓願願行相扶適産七日者見虎子頭上有七點知已七日出山海經也又云七日眼間又七日不食必死虎既垂死知是七日或云鬼神示悟如樹神數魚記二釋義二初述觀解二起誓願願行相扶者行即觀解非此觀解莫成其願非乎誓願行則有退疏適産七日至樹神數魚等者此文追解前第四見産虎文也疏可見經從作是念言下述觀解爾時第三王子作是念言我今捨身時已到矣何以故我從昔來多棄是身都無所為亦常愛護處之屋宅又復供給衣服飲食臥具醫藥象馬車乘隨時將養令無所乏而不知恩反生怨害然復不免無常敗壞復次是身不堅無所利益可惡如賊猶若行廁我於今日當使此身作無上業於生死海中作大橋梁復次若捨此身則捨無量癕疽瘭疾百千怖畏是身唯有大小便利是身不堅如水上沫是身不淨多諸蟲戶是身可惡筋纏血塗皮骨髓腦共相連持如是觀察甚可患厭是故我今應當捨離以求寂滅無上涅槃永離憂患無常變異生死休息無諸塵纍無量禪定智慧功德具足成就微妙法身百福莊嚴諸佛所讚證成如是無上法身與諸衆生無量法樂記觀有二種一助觀二正觀從初至甚可患厭是助道觀也以三藏教假想對治戀著依正之心從是故我今下正觀也至無諸塵纍等即空觀也無量禪定至諸佛所讚即假觀也從證成如是至法樂即中觀也説乃前後修必一心二述誓願是時王子勇猛堪任作是大願以上大悲熏修其心慮其二兄心懷怖懅或恐固遮為作留難即便語言兄等今者可與眷屬還其所止爾時王子摩訶薩埵還至虎所脫身衣裳置竹枝上作是誓言我今為利諸衆生故證於最勝無上道故大悲不動捨難捨故為求菩提智所讚故欲度三有諸衆生故滅生死怖衆惱熱故記先作方便次作誓言下正起誓六句不出四弘初二依滅諦發成佛願三四依道諦發悲智願第五依苦諦發度生願第六依集諦發斷惑願此依界外滅諦為首驗發圓心也三正捨身二初科文句正捨身為二一捨身二感動天地記二釋二初捨身是時王子作是誓已即自放身臥飢虎前是時王子以大悲力故虎無能為王子復作如是念言虎今羸瘦身無勢力不能得我身血肉食即起求刀周遍求之了不能得即以乾竹刺頸出血於高山上投身虎前記二感動天地是時大地六種震動日無精光如羅睺羅阿修羅王捉持障蔽又雨雜華種種妙香時虗空中有諸餘天見是事已心生歡喜歎未曾有讚言善哉善哉大士汝今真是行大悲者為衆生故能捨難捨於諸學人第一勇健汝已為得諸佛所讚常樂住處不久當證無惱無熱清淨涅槃是虎爾時見血流出汙王子身即便舐血噉食其肉唯留餘骨記經六種震動者謂動起涌三種是形震吼擊三種是聲今於形聲略言其二故言震動四捨身後悲戀二初科文句捨身後眷屬愁苦先兩兄愁惱各説偈共向捨所次父母愁苦記二釋二初兩兄愁惱爾時第一王子見地大動為第二王子而説偈言震動大地及以大海日無精光如有覆蔽於上虗空雨諸華香必是我弟捨所愛身第二王子復説偈言彼虎産來已經七日七子圍繞窮無飲食氣力羸損命不云遠小弟大悲知其窮悴懼不堪忍還食其子恐定捨身以救彼命時二王子心大愁怖涕泣悲歎容貌憔悴復共相將還至虎所見弟所著被服衣裳皆悉在一竹枝之上骸骨髮爪布散狼藉流血處處遍汙其地見已悶絶不自勝持投身骨上良久乃蘇即起舉首號天而哭我弟幼稚才能過人特為父母之所愛念奄忽捨身以飼餓虎我今還宮父母設問當云何答我寧在此併命一處不忍見是骸骨髮爪何心捨離還見父母妻子眷屬朋友知識時二王子悲號懊惱漸捨而去時小王子所將侍從各散諸方互相謂言今者我天為何所在記二父母愁苦爾時王妃於睡眠中夢乳被割牙齒墮落得三鴿雛一為鷹食爾時王妃大地動時即便驚寤心大愁怖而説偈言今日何故大地大水一切皆動物不安所日無精光如有覆蔽我心憂苦目睫瞤動如我今者所見瑞相必有災異不祥苦惱於是王妃説是偈已時有青衣在外已聞王子消息心驚惶怖尋即入內啓白王妃作如是言向者在外聞諸侍從推覓王子不知所在王妃聞已生大憂惱涕泣滿目至大王所我於向者傳聞外人失我最小所愛之子大王聞已而復悶絶悲哽苦惱抆淚而言如何今日失我心中所愛重者記如文二偈頌二初分文文句偈九十三行為三初二行通明昔行次別頌長行三結會記二釋義三初通明昔行爾時世尊欲重宣此義而説偈言我於往昔無量劫中捨所重身以求菩提若為國王及作王子常捨難捨以求菩提文句初如文記二別頌長行二初分文文句我念宿命下別頌長行四行頌上本眷屬上有述相陳觀今不頌餘皆頌從時勝大士下二行頌上捨身方便不頌發誓從即上高山下頌上正捨身感動也從是時二兄下頌上捨身後眷屬愁苦從是時王子下頌上父母愁苦記二釋義五初頌上本眷屬往念宿命有大國王其王名曰摩訶羅陀是王有子能大布施其子名曰摩訶薩埵復有二兄長者名曰大波那羅次名大天三人同遊至一空山見新産虎飢窮無食記二頌上捨身方便時勝大士生大悲心我今當捨所重之身此虎或為飢餓所逼儻能還食自所生子記三頌上正捨身即上高山自投虎前為令虎子得全性命是時大地及諸大山皆悉震動驚諸蟲獸虎狼師子四散馳走世間皆暗無有光明記四願上眷屬愁苦是時二兄故在竹林心懷憂惱愁苦涕泣漸漸推求遂至虎所見虎虎子血汙其口又見骸骨髮毛爪齒處處迸血狼藉在地時二王子見是事已心更悶絶自躃於地以灰塵土自塗坌身忘失正念生狂癡心所將侍從覩見是事亦生悲慟失聲號哭互以冷水共相噴灑然後蘇息而復得起記五頌上父母愁苦私開二初頌見相時愁憂二初王妃憂惱二初見相是時王子當捨身時正值後宮妃后采女眷屬五百共相娛樂王妃是時兩乳汁出一切肢節痛如針刺心生愁惱似喪愛子記二述相六初正述惡相於是王妃疾至王所其聲微細悲泣而言大王今當諦聽諦聽憂愁盛火今來燒我我今二乳俱時汁出身體苦切如被針刺我見如是不祥瑞相恐更不復見所愛子今以身命奉上大王願速遣人求覓我子夢三鴿雛在我懷抱其最小者可適我心有鷹飛來奪我而去夢是事已即生憂惱我今愁怖恐命不濟願速遣人推求我子記二述已迷悶是時王妃説是語已即時悶絶而復躃地記三王臣憂惱王聞是語復生憂惱以不得見所愛子故其王大臣及諸眷屬悉皆聚集在王左右哀哭悲號聲動天地記四國人驚愕爾時城內所有人民聞是聲已驚愕而出各相謂言今是王子為活來耶為已死亡如是大士常出軟語為衆所愛今難可見已有諸人入林推求不久自當得定消息諸人爾時慞惶如是而復悲號哀動神祇爾時大王即從座起以水灑妃良久乃蘇還得正念微聲問王我子今者為死活耶記五王妃敘德爾時王妃念其子故倍復懊惱心無暫捨可惜我子形色端正如何一旦捨我終亡云何我身不先薨沒而見如是諸苦惱事善子妙色猶淨蓮華誰壞汝身使令分離將非是我昔日怨讐挾本業緣而殺汝耶我子面目淨如滿月不圖一旦遇斯禍對寧使我身破碎如塵不令我子喪失身命記六驗相失子我所見夢已為得報直我無情能堪是苦如我所夢牙齒墮落二乳一時汁自流出必定是我失所愛子夢三鴿雛鷹奪一去三子之中必定失一記二大王求覓二初慰諭其妃爾時大王即告其妃我今當遣大臣使者周遍東西推求覓子汝今且可莫大憂愁記求覓其子大王如是慰喻妃已即便嚴駕出其宮殿心生愁惱憂苦所切雖在大衆顏貌憔悴即出其城覓所愛子爾時亦有無量諸人哀號動地尋從王後是時大王既出城已四向顧望求覓其子煩惋心亂靡知所在最後遙見有一信來頭蒙塵土血汙其衣灰糞塗身悲號而至爾時大王摩訶羅陀見是使已倍生懊惱舉首號呌仰天而哭記二頌知終後悲苦三初使者回白二初前使慰王先所遣臣尋復來至既至王所作如是言願王莫愁諸子猶在不久當至令王得見記二後使告實須臾之頃復有臣來見王愁苦顏貌憔悴身所著衣垢膩塵汙大王當知一子已終二子雖存衰悴無賴第三王子見虎新産飢窮七日恐還食子見是虎已生大悲心發大誓願當度衆生於未來世證成菩提即上高處投身虎前虎飢所逼便起噉食一切血肉已為都盡唯有骸骨狼籍在地記二大王悶絶是時大王聞臣語已轉復悶絶失念躃地憂愁盛火熾然其身諸臣眷屬亦復如是以水灑王良久乃蘇復起舉首號天而哭記二王迎二子三初臣述失志復有臣來而白王言向於林中見二王子愁憂苦毒悲號涕泣迷悶失志自投於地臣即求水灑其身上良久之頃乃還蘇息望見四方大火熾然扶持暫起尋復躃地舉首悲哀號天而哭乍復讚歎其弟功德記二王並思惟是時大王以離愛子其心迷悶氣力惙然憂惱涕泣並復思惟是最小子我所愛重無常大鬼奄便吞食其餘二子今雖存在而為憂火之所焚燒或能為是喪失命根我宜速往至彼林中迎載諸子急還宮殿其母在後憂苦逼切心肝分裂或能失命若見二子慰喻其心可使終保餘年壽命記一亡二存對並思忖亡者叵尋存者宜取三迎子慰母爾時大王駕乘名象與諸侍從欲至彼林即於中路見其二子號天扣地稱弟名字時王即前抱持二子悲號涕泣隨路還宮速令二子覲見其母記三結會二初科文句從佛告樹神下第三結會結會為三一結會人二結會塔三結會誓願記二釋三初結會人佛告樹神汝今當知爾時王子摩訶薩埵捨身飼虎今我身是爾時大王摩訶羅陀於今父王輸頭檀是爾時王妃今摩耶是第一王子今彌勒是第二王子今調達是爾時虎者今瞿夷是時虎七子今五比丘及舍利弗目犍連是記經輸頭檀或閲頭檀此云淨飯摩耶此云天后調達亦提婆達多此云天授父母從天乞子天授與之是佛堂弟瞿夷此云明女悉達有三夫人一瞿夷二耶輸三鹿野各有二萬采女五比丘者憍陳如頞跋提十力迦葉拘利太子陳如十力迦葉二是母親餘三是父親舍利弗此云身子母好身形故母名身是彼之子故名身子目犍連此云胡豆姓也上古有仙居山常採菉豆而食因以命族尊者是彼之後也二結會塔爾時大王摩訶羅陀及其妃后悲號涕泣悉皆脫身御服瓔珞與諸大衆往竹林中收其舍利即於此處起七寶塔記塔具云塔婆義翻方墳或云聚相謂纍木石及寶高以為相茶毗後分云佛塔高十三層上有相輪支佛塔十一層羅漢四層輪王塔無復層級以未脫三界故十二因緣經八種塔並有露盤佛塔八重菩薩七重支佛六重四果五重三果四二果三初果二輪王一凡僧但蕉葉火珠而已雖兩經異説而凡僧並無層級邇世所立雖無露盤既出四簷猶濫初果儻循蕉葉火珠之制則免僭上聖識者宜效之舍利此云身骨三結會誓願是時王子摩訶薩埵臨捨命時作是誓願願我舍利於未來世過算數劫常為衆生而作佛事記三大衆所益説是經時無量阿僧祗諸天及人發阿耨多羅三藐三菩提心文句説是經時下大衆所益也記四結問意樹神是名禮塔往昔因緣爾時佛神力故是七寶塔即沒不現文句樹神是名禮塔下第四是結問意記經怖懅其據反廣雅云畏懼也瘭必遙反疽疾也奄忽忽謂倐忽也雛士虞反鳥子也瞤如輪反目動也抆武粉反拭也躃旁益反倒也慟哀過也惙陟劣反疲也記七讚佛品二初品題金光明經讚佛品第十八記句文分二初明讚之能所二初大師約因人讚果釋文句此品從能所得名能讚是三番菩薩所讚是一佛世尊能所合標故言讚佛品記能讚是三番菩薩者一是經初陳列之衆二是信相發起之人三是樹神善女此雖衆兼道俗形混人天既發大心咸名菩薩所讚是一佛世尊者即釋迦教主一佛也斯欲異前讚品能讚是往世金龍一人所讚是三世極果諸佛也然準前釋題品目具含四悉今文略示欲明其相者應云題標讚佛義含能所即世界歡喜也二能讚善生必托緣起緣中最勝莫過讚佛故三菩薩能讚即為人生善也三所讚為能讚乃印成三菩薩説無虗謬即破惡對治也四如來讚樹神快説果地大體大智大用即入理第一義也題含四義文理一如今疏存略不無其以蓋題讚佛實通能所以所讚果佛反讚因人生善破惡二俱不便然或以所讚為能讚生他善業破他惡事斯何不可故知略也二章安約因果互讚釋文句私謂三番菩薩是能讚一佛是所讚一佛是能讚三番是所讚三番是當佛一佛是現佛通而為言皆是能讚皆是佛故言讚佛品記言一佛是能讚者經云善哉善哉樹神善女汝於今日快説是言經雖獨讚樹神意兼前二故云三番是所讚言三番是當佛等者釋疑也恐人疑云既讚兼能所何以獨題讚佛故釋云佛通現未皆是讚佛爾二明品之次第二初明諸品所歸亦是今品之來意也文句次第者因前十七品故有今品何者序品敘大體如來遊於無量甚深法性窮源極邊壽量品極果冥深合廣能起大用懺品勸菩薩若欲修學當如懺品滅惡讚品生善空品導成四王至散脂誓願流通説請者之功德正論至善集明説者之功德鬼神至流水説聽者之功德捨身明行者之功德記何者下釋諸品次第序品敘大體等者向疏釋經敘乎五章今唯敘體者蓋指極果所遊所契而高而廣法性是佛地之所證為今經之大體也下壽量洎諸品功德皆不出大智大用言窮源等者妙覺中理之源已窮邊際之事已極故種智泯照萬行休息是唯一性更無異途故曰經之大體也壽量果地二智已圓故冥深廣之體起長短之用懺讚空導豈越大用諸品功德無違應體故下云皆金光明之力也二示今文讚意文句如是等利益出現世者皆是如來大體大智大用金光明力既善始令終初中後竟故諸菩薩等以讚讚佛稱揚教及教主故言讚佛品記明由上一十七品之利益故有下六十二行之歎辭也善始令終者序等三分既皆獲利故三菩薩荷佛深恩而興讚歎故有讚佛品也令亦善也二經文二初標科文句此文為二一經家敘陳列讚衆記二釋義二初經家敘爾時無量百千萬億諸菩薩衆從此世界至金寶蓋山王如來國土到彼士已五體投地為佛作禮却住一面合掌向佛異口同音而讚歎曰文句從此至彼金寶蓋剎施三業供養投地是身同聲是口口身共暢意業也記疏文可見經云從此至金寶蓋國者欲張大其衆滿中菩薩皆讚釋迦教主也比見有人不曉斯旨謂讚彼佛經疏非暗一何昧哉或恐後學隨他所解謬釋經文今略引疏示之原乎讚品之來者蓋三番菩薩並由上聞經得利故讚佛及教豈闕他佛況疏云一佛是能讚若謂讚彼佛者能讚一佛何指釋迦定起耶經疏泠然故不繁引二正説偈二初分文別釋二初分文文句二正説偈合六十五行半文為三一二十行諸菩薩説二十七行信相説三二十八行半樹神説云云記即智者就題分偈故合六十五行半文為三即以如來定起三行經文合在樹神段中故云二十八行半樹神説分文可見疏不委釋故注云云應云六十五行半文為二初六十二行半三番菩薩説二後三行如來定起説故下章安總釋乃云其文有四即斯義也具如下釋二釋義三然此三番菩薩讚辭疏不分釋達者必辭意俱明恐新學者不曉今粗科釋初諸菩薩讚三初寄言讚三初讚能説教主自行功德三初讚大小相海二初讚相好三初讚金色光一大相如來之身金色微妙其明照耀如金山王記經云如來之身者標起也金色微妙等三句者讚第十四金色光微妙一大相也二讚身清潔等三小相身淨柔軟如金蓮華無量妙相以自莊嚴隨形之好光飾其體淨潔無比如紫金山圓足無垢如淨滿月記經云身淨者即讚第十一身清潔一小相也柔軟者讚第十二身柔軟小相也圓足無垢二句讚第二十身滿足小相亦是讚容儀滿足三重讚梵音一大相其音清徹妙如梵聲師子吼聲大雷震聲六種清淨微妙音聲迦陵頻伽孔之聲記亦是兼讚言音深遠小相海也梵聲者譬佛音深遠故師子吼聲者譬佛音無畏也大雷震聲者譬佛音破迷也云六種聲者諸文皆云八音一極好二柔軟三和適四尊慧五不女六不誤七深遠八不竭譯人增減不須和會亦可先舉妙如梵聲者即八音中深遠音也師子吼大雷震即舉不女音也以佛住首楞嚴定常有世雄之德久離雌耎之心故所出音聲能令一切聞者敬畏天魔外道莫不歸伏也上既已列二種聲下但云六種聲者即舉迦陵頻伽孔等六種聲也以迦陵頻伽翻極好聲也二讚尊特清淨無垢威德具足百福相好莊嚴其身光明遠照無有齊限記上以大小相間而讚蓋顯身相大小咸遍辭意雖含尊特未彰故今復讚身相光明俱無限齊經云威德者巍巍堂堂之相也二讚智斷功德智慧寂滅無諸愛習記上句讚智德下句讚斷德三總結尊特世尊成就無量功德譬如大海須彌寶山記大論云尊特身佛者巍巍堂堂譬如須彌映臨大海所有大小相好亦巍巍堂堂然如來自行具足三身功德諸菩薩唯讚尊特者上冥下應已攝三身斯乃讚智之巧學者思之二讚所説教法化他利益二初敘説教因由為諸衆生生憐愍心於未來世能與快樂記在文可見新經云欲利益諸衆生故常行法施乃至令得大果證常樂故二讚所説教法二初讚經宗體如來所説第一深義記體指序品如來所遊深廣無界超諸因理故稱第一深義舉深該廣即甚深無量也宗指壽量極果所得過諸菩薩亦稱第一也法報體一深義可知二讚經力用三初讚上懺品滅惡能令衆生寂滅安隱記寂滅者寂諸業行之惡滅於果報之苦二讚上讚品生善能與衆生無量快樂記上是如來敘昔龍尊讚佛意生今日當機之善故能與無量快樂三讚空品雙導二初讚能導空法妙能演無上甘露妙法能開無上甘露法門記經云甘露者即長生不死之藥也文詮中道妙空實相真諦能過二死迷變可生四德常身故斯理空即名甘露仍由染體本淨空名妙法從此而入復名法門二讚滅惡生善深能入一切無患窟宅能令衆生悉得解脫度於三有無量苦海安住正道無諸憂苦記懺得斯空二死惡患之報即謝三德涅槃之宅可入言解脫者有二意若就解脫惑業之縛即破惡也若取無染自在之淨即生善也度三有等破惡生善可知三結讚人法如來世尊功德智慧大慈悲力精進方便記功德智慧結上讚能説教主尊妙人也慈悲精進結上讚所説教法宏深也法之宗用如是者皆慈悲精進所致也二絶言讚三初絶言讚故不能稱計説喻如是無量不可稱計我等今者不能説喻記二絶心讚故盡思度量不能得知大海一滴少分也諸天世人於無量劫盡思度量不能得知如來所有功德智慧無量大海一滴少分記三指廣結讚我今略讚如來功德百千億分不能宣一記可見三讚已回向若我功德得聚集者回與衆生證無上道記回向有三義現文有二理含其三在文可見二信相説二初經家敘爾時信相菩薩即於此會從座而起偏袒右肩右膝著地合掌向佛而説讚言記二正説偈二初總讚相好功德世尊百福相好微妙功德千數莊嚴其身記千數者舉大數也二別讚大小相海五初別讚二種光相二初讚色具光相色淨遠照視之無厭如日千光彌滿虛空光明熾盛無量無邊猶如無數珍寶大聚其明五色青紅赤白琉璃頗梨如融真金光明赫奕通徹諸山悉能遠照無量佛土記色淨遠照下即第十四金色光相光明熾盛下即第十五身光相然二種光相若據生身皆有齊限如云身光面各一丈今云如日千光乃至悉能遠照無量佛土故知信相昔為龍尊讚佛尊特發願未來得值釋迦今日讚佛豈忘其本是則大相小相皆寄尊特而讚也二明光具與拔能滅衆生無量苦惱又與衆生上妙快樂記昔為龍尊讚佛身放大光滅盡三界一切諸苦令諸衆生悉受快樂今日讚佛還讚光明滅苦與樂在文可見二總讚諸根相好諸根清淨微妙第一衆生見者無有厭足記如大相中有身端直皮膚薄細舌大覆面齒白齊密眼如金精睫如牛王小相中有鼻高孔好不現耳輪輻相埵成身清潔柔軟等諸根皆見者無有厭足三又比讚一小相二初讚髮相髮紺柔軟猶孔項如諸蜂王集在蓮華記孔頂蜂王等皆比髮有紺色如八十好中有髮色青珠好等二具功德清淨大悲功德莊嚴無量三昧及以大慈如是功德悉已聚集記清淨慈悲無量禪定久皆莊嚴故髮好柔軟四復明相好功德二初明相好具功德二初明嚴身克果之用相好妙色嚴飾其身種種功德助成菩提記可見二明攝生感讚之功如來悉能調伏衆生令心柔軟受諸快樂種種深妙功德莊嚴亦為十方諸佛所讚記若相若好隨大隨小悉能調伏令心柔軟受諸快樂故為諸佛所讚二明功德具光明其光遠照遍於諸方猶如日明充滿虛空功德成就如須彌山在在示現於諸世界記功德高廣猶如須彌顯出大海五又比讚齒毫二大相齒白齊密猶如珂雪其德如日處空明顯眉間毫相右旋宛轉光明流出如琉璃珠其色微妙如日處空記三樹神説二初經家敘爾時道場菩提樹神復説讚曰記言道場菩提樹神者即如來得道之場在此樹下然樹本名畢鉢羅佛坐其下得菩提智果立此為名故今女天依此樹住亦以為名也西域記云昔佛在世高數百尺屢經殘伐猶高四五大莖幹黃白枝葉青翠冬夏不凋光鮮無變每至如來涅槃之日葉皆凋落頃之復故此在中印度摩竭陀國大城西南四百餘里修苦行處不遠有此樹也二正説偈四初總讚南無清淨無上正覺記南無者歸命之辭也清淨者佛性論有二種一性淨本無惑染故二相淨對治離障故今總讚如來中邊智滿法報應圓故謂無上正覺也二別讚二初廣讚能説教主三初就所覺顯明讚佛法身甚深妙法隨順覺了遠離一切非法非道獨拔而出成佛正覺記甚深妙法者法性高廣諸法融妙圓智圓覺遍一切處衆邪染障本自離故如來隨順斯理覺了其性一切魔外涅槃非法禪戒非道猶如大樹盤根厚地唯佛金剛大智獨拔而出成佛正覺者所謂出纏大法身也然準圓佛大智覺了本性非法非道應離三乘七方便涅槃非法戒定非道方曰遠離一切法者即所生果法也道者即能生因道也苟未離無明相分皆曰其非也二就能覺智行讚佛報身三初約法知有非有本性清淨希有希有如來功德記知有下二句讚報智也知者照也有即俗非有即真本性清淨即中以一切種智知照三諦則冥深契廣事理周極名佛無上報智也希有下二句讚佛助行功德重言希有者歎美之鄭重也下皆例然因中戒定萬行有排障敵惡之力名功助發大智成佛大果名德法華云久修業所得即無上報故謂如來功德也二約喻希有希有如來大海希有希有如須彌山記即喻上報身智行也大海喻智也須彌喻行也其智冥理窮實相底故方之大海釋論謂智度大海佛窮其底因中萬行積功纍德喻彼須彌如華嚴涅槃皆云析骨書經如彼妙高三總合希有希有佛無邊行記智行契理三法一如故曰無邊行也三就垂世形益讚佛應身希有希有佛出於世如優曇華時一現耳希有如來無量大悲記優曇華者具足云優曇鉢羅此言瑞應亦云靈瑞輪王出世時感此華泥洹經云閻浮提內有尊樹王名優曇鉢羅有實無華優曇鉢樹有金華者世乃有佛故云時一現耳無量大悲者垂應本也以大悲故不住涅槃二略讚所説教法釋迦牟尼為人中日為欲利益諸衆生故宣説如是妙寶經典記如來將欲口輪説法必須意業鑒機如日照物無所不遍為欲利益者準金光明之力用須明十種利益方盡垂世説法之意也三請佛出定二初讚今所入定為請見由三初就果佛讚所遊定善哉如來諸根寂滅而復遊入善寂大城無垢清淨甚深三昧入於諸佛所行之處記諸根寂滅者以了眼等性常具無減修諸惑死生悉已寂滅故常居寂定而復遊入者將軫法輪表不妄説又三世佛説必須入定故首楞嚴經云雖知諸法常是定相而示衆生諸禪差別言善寂大城者正讚所入定也即向經初法性三昧若入此定即能善了諸法寂滅無非法性故防生死之非禦涅槃之敵即中道善寂而名大城也亦名無垢清淨三昧等既是佛之境思故受無垢清淨之名為諸佛行處也二明三昧能空行相一切聲聞身皆空寂兩足世尊行處亦空如是一切無量諸法推本性相亦皆空寂一切衆生性相亦空記此經雖則結歸方等説在般若時後懺讚善惡皆推空導故空品謂無量餘經已廣説空故此經中亦談其空為入理門也佛遊三昧亦從空入聲聞之人雖從空入猶為身果所纏如來空智明見聲聞身果性相皆空諸佛境界亦空如是一切無量諸法者指上自他依果國土淨穢推性推相不見差品一切衆生依正境界推求性相皆同真淨無復其異然推乎性相者即空觀遣情顯理之要門也一家明觀諸處共論其如講學之人亦多昧之今家承用則依中論智論準理準義開拓觀門故於權教實教事觀理觀悉已明之學者須知且如性相二空本是一空觀法備遣情計故有兩番行相是知若善修一空觀者必遣二種執性如法華止云知法常無性荊溪謂應無性性無相性諸文為辨性相寄前後説故以二諦分之乃云四句推性不見性是世諦破性四句推名不見名是真諦破相相破即相空也荊溪釋云若有性執世而非諦破性執已世乃名諦是以名為世諦破性性執破已但有名字名之為假假即是相為空相故觀理證真是名真諦破相空非前後二諦同時故知性執破已雖名世諦初軫其觀即須觀真四句推性雖不執性其如惑存轉計其名既不見理但名世諦仍觀法性真理破名字相相執破已方證其真故名真諦破相或初觀真諦四句推性便了陰界色心名字無四句相即名真諦破性破相豈待轉觀破相方用真諦耶若爾推性何故云不自他共等推相自謂不內外中間等句法既別顯理用觀自異何謂秪一四句空觀破二種執耶答向謂寄前後説對所破執相故推性則謂不自他等推相乃言不內外等考乎觀門豈有異途故荊溪云內秪是因外秪是緣等況止觀明性空觀畢乃引中論諸法不自生等四句為證洎明相空觀畢亦引斯論諸法不自生等四句以斯照之應無別觀又止觀但名一總空觀者即二空觀也問法華疏約真俗假實明生法二空荊溪釋云真諦即法空俗諦即生空俗假真實乃引玄文世諦破性真諦破假假破即相空性破即性空為證若以性相二空秪一空觀何引人法二空對顯二諦耶以人空時亦未法空故性相二空若例人法空者應二空須異何謂性空未顯於理相空無別觀耶答小乘得人空時容有未得法空如云見惑若破得須陀洹果名得生空此則少顯真理進破思惑方得法空其理究顯大乘人法境融觀道不異如大品云色性如我性我性如色性四陰如我用觀亦然縱有惑分粗細執破前後用觀必無異時而法華疏約人法空名二諦者為對所破寄分真俗故引世諦破性名性空真諦破相名相空為證其如用觀委明行相須於我人生境破性破相方得生空復於陰界入法寄俗寄真推此二空窮斯真理名為法空方是用觀行相委悉故止觀云於性相中求我人知見不可得是生空於性相中求陰界入不可得是法空而疏以俗諦對生空者蓋此生空體是法執故以俗諦顯此空相故云俗假假即虗妄也法執若破妄染究盡方名真諦故云真實實即究竟也荊溪體斯疏意復以玄文寄世諦顯性空等義而為證也故云真俗不二二空俱時問既云二諦不二二空俱時顯是一理一空又何分二諦及明二空耶答其實所顯理是一能觀觀亦一為對所破執故而分二空顯空淺深故而寄二諦是故性相空中性空約理理既未顯但名世諦明空空猶未盡但名性空仍於世法又觀真諦破此執名之相相若破已理顯方名真諦觀成方名相空故寄二諦顯二空相故知若曉性相二空對所破而分真俗者則寄二諦明人法二空準理亦然是則人空空未實故乃寄俗顯故云俗諦即生空也法空空既已淨而寄真顯故云真諦即法空也矧又雖用生法互融之觀而照真俗不二之境其如衆生無始多於生境計我起執不二之觀亦於生境先當其用故破人執時且名生空既法執在復觀其法本無其執離四句相方名法空故大師謂始覺人空終覺法空然此二諦顯二空相通圓之教行相亦同但通用其觀止照真理故寄俗寄真顯性顯相明斯二空唯在真理而圓實之教體生體法推性推相唯是中道法性法性無生無性名世諦破生破性此生此性即法法體本空名真諦破法破相雖寄二諦悉用中道而顯二空通無此觀學者思之然委明二空推所執能人執隨法執亡者具如前疏空品記文三指凡愚不了請現狂愚心故不能覺知記上讚佛所遊三昧空智遍了諸有差異悉皆泯亡唯真智獨存更無染異樹神分曉悲愍凡迷狂亂愚癡不了性相俱空故請佛出定二騰昔常願見正請出定四初正敘昔願行請現我常念佛樂見世尊常作誓願不離佛日我常於地長跪合掌其心戀慕欲見於佛我常修行最上大悲哀泣雨淚欲見於佛我常渴仰欲見於佛為是事故憂火熾然惟願世尊賜我慈悲清冷法水以滅是火記我常念佛者念即觀照之異名也心遊法界常照三身敘昔觀力未充欲求深證故助之以誓願跪之以合掌加乎戀慕哀泣雨淚修行大悲等並助常念之觀也言最上大悲者即無緣悲也正助合修故曰最上問樹神在會明見如來入定説經何故方今頻言欲見於佛耶答今有二意一者如來入定本為説經説經既畢要須出定欲出其定須得其請故佛出定能印三番所説皆實既一期事畢乃樹神致請殷勤故敘昔常願見復加願行欲使未來亦得見佛故云願使我身常得見佛二者樹神久已分見如來真身欲唱念佛之觀更求上證故寄請佛出定頻陳欲見苟得如來酬請現身即己心中真佛顯發更明故下結云唯願慈悲為我現身二約定具慈悲請現三初明慈悲能護迷暗世尊慈愍悲心無量願使我身常得見佛世尊常護一切人天是故我今渴仰欲見記樹神自昧如來上位真身故請佛加願使我身常得見佛復愍於他迷瞽所及不見佛之真體故敘世尊常護一切是故渴仰欲見者即引己及他請佛現身二約聖凡未發性明聲聞之身猶如虗空𦦨幻響化如水中月衆生之性如夢所見記即樹神擊請今佛出定也佛雖在定明了性淨猶如琉璃表裏通徹照機起應皆不動於寂定如來雖久已明了其如衆生未發上定故樹神頻請出現發悟斯機乃舉六喻顯乎聲聞色體非性明體所證真理閴寂無知如空之虗無亦燈之煙焰術之所幻聲之谷響神通之化水中之月皆非實性不能即寂即現也衆生之性虗妄現在如夢所見都無實相三就佛行處明見請現如來行處淨如琉璃入於無上甘露法處能與衆生無量快樂如來行處微妙甚深記正明佛所入定具慈愍照故請如來出定令我及衆得安樂故三愍凡聖不知請現樹神以凡夫小聖共迷佛所遊境界故請佛現身即令明見唯心佛現一切衆生無能知者五通神仙及諸聲聞一切緣覺亦不能知記經五通神仙者別舉人趣中有術成仙者發得五通雖有他心宿命而不知佛所遊定照理起應不離衆生心體無漏二乘雖有三明六通亦昧佛境唯心故曰亦不能知也四指已信不疑請現我今不疑佛所行處惟願慈悲為我現身記樹神述已於佛行處明了無滯雖知本無隱現上舉他衆共迷佛境實有動靜故敦請出定云惟願慈悲為我現身問今佛入定説法對告起禮舍利既有往來時會共見樹神焉知如來在定未出而致請殷勤耶答樹神大權久與佛同事昔為流水救魚樹神現半身示數長者既已成佛樹神豈猶滯凡故今一動一靜皆扶佛化何不知之有矧凡出定入定皆有其儀佛雖起坐往來其如未示出定之相樹神敦請至勤方現出相其相者必須先示微微動搖其身次乃黈氣嚬坤徐緩而起方知如來示出定相故法華謂安詳而起此經云出微妙音故知定起皆有其相也問新經自云爾時薄伽梵於日晡時從三昧起觀察大衆而説頌曰金光明妙法最勝諸經王今之讖本何故至三番讚畢方云從三昧起耶苟譯者所見不同其如集經者梵本編文安次如何耶答梵本不同豈須和會其如學者無由曉經今略試評之在理或當冀無私隱且夫此經古師謂是偏方之教即一時赴機之説也故天台結歸方等部攝斯由機分大小應赴權實赴權小者令見佛從定起説法應實大者則知佛在定而告亦如華嚴中令見女子身中入正受男子身中起出説等當時察物既殊故集經者或言定起方説或云説畢定起然佛滅度後集經者又迹一途亦有窟內窟外所集亦云梵語有賖有切等致譯經者所覩梵本不同如讖師曾遊五天必覩梵文正本見云佛在定而説必須信受敬譯淨師本弘小典晚接梵文或見云佛從定起方説正符所宗故編譯無改至列聲聞菩薩等衆皆云於日晡時從定而起到佛會所古師嘗推譯者未為雅當信亦有之然聖師所為必非徒然凡流膚學莫盡考乎厥由也求過得過附贅之尤亦已甚矣學者體而思之問大師既依讖本釋經何故云入遊法性出敘經王耶答如來常在法性上定應機順物示入定相雖心遊寂理口出其言故謂出敘經王蓋寂不阻照説無妨定非謂身出其定也四酬請起定二初明經家敘起定爾時世尊從三昧起以微妙音而讚歎言記爾時者即當樹神請畢之時佛示出定之相乃云以微妙音而讚歎言即微細妙好之音而悅豫四衆也二明佛定起能讚善哉善哉樹神善女汝於今日快説是言一切衆生若聞此法皆入甘露無生法門記佛讚樹神意合前二以諸菩薩及妙幢能讚佛所説教皆是快言如來序品已來明大體大宗大用是金光明妙三法也故云快説是言若衆生聞此三法即能發解證悟明了常住故云入甘露無生法門耳二章安總釋二初約義釋二初約佛讚義二初約定果讚因二初正明讚因義二初示義文句私謂其文有四前三是能讚後一是所讚所讚又是能讚能讚又是所讚記私謂下總釋也其文有四者前大師分科止為三段以如來定起三行之文合為樹神段中故注云云今章安開釋方為盡理文現可見二引證文句故文云佛從三昧起以微妙音而讚歎言善哉善哉樹神善女汝於今日快説是言豈非所讚讚能讚其文既明不須惑也記二示印成讚教文句又是印成三番菩薩讚教從序品已來快説如是果地大體大智大用菩薩修因也上文有佛禮舍利即果身禮因身也記三番菩薩皆先讚佛次讚説教即讚如來從序品已來是説一經大體大智大用菩薩修因也何者序品明遊法性佛指所遊是諸經王等三番謂佛是説一經之大體也壽量明佛常果三番謂佛是説一經之大智智即宗也懺讚空品謂佛是説一經之大用也四王至捨身品皆是説菩薩修因也三番讚教既稱佛所説故如來定起印成即讚樹神等快説是言也二讚通三業文句今文有佛讚大懺大讚能請能説能聽能行皆是快説也當知快説是果讚因菩薩也即果口讚因口其義孱然果意讚因意任運例成也云云記章安因明今品果佛定起能讚因人快説復考經之上文亦有果身禮舍利之義舍利者翻骨分也即因身爾上懺品佛讚大懺讚品佛讚龍尊是大讚皆言大者一懺一讚等法性大體知罪福性空也四王品能請善集品能説鬼神品等能聽捨身品能行皆是快説者共能了金光明教能詮所詮是體宗用三即一切三法故皆名快説也信相龍尊四王等並是因人故謂因口所説孱字士限反現也身口非意不行故云任運例成也二約出定義二初據起問入文句問佛何處入定此云從三昧起記二答始末在定二初明住法性定文句答初將説經佛遊甚深法性今説將竟故從三昧起此經首尾皆在法性中説其文甚明記問諸經先須入定定起方説今經何故一向在定而有所説耶答若論法性上定豈有出入説默之異既示其定蓋順物機物機所宜適樂不同諸經示同往佛皆先入定履歷法緣對治散心妄有所説故須入定定起方説此經首尾在定而能説者意同向理又示金光明無量甚深自在無礙寂照融遍故説畢定起印成三番快領如來所説法也二彰法性圓融文句若作入法性者法性自在四佛五佛同處各處共見異見四來四去一住一在隨人所覩皆無障礙也記言若作入法性者顯理含容不阻出入上唱法性無量甚深一出一入有説有默豈逾法性故云法性自在言四佛者即四方佛也五佛者并釋迦耳同處各處等者信相室與靈鷲山雖異若了唯心者見唯妙土則弟子衆一故五佛同處共一身一智也是則四無來去一無住在其執權教者弟子衆異謂妙幢所居共佛耆山敻隔多里故四佛五佛匪唯各處亦見異身異智實來實去定住定在雖此殊別無離法性故云隨人所覩皆無障礙也二約觀釋二初明事三業境文句觀心者諸菩薩三業讚佛三業事可解記言觀心者標明觀釋也先明諸菩薩讚具三業為妙觀境然讚雖在口身須恭謹心仍尊重三業齊運讚義方成二明理三觀成二初明於事觀理文句三觀心者觀身不得身身空但有名字名字無量或捨身名檀乃至身空名智慧六度十度八萬塵沙法門名字即空説空不定空假非言假非空非有即顯中道記言三觀心者寄身等境示空假中能觀三觀心也近有講人不知便謂後人妄加心字亦由向迷心為所觀致有踳駁斯之疏謬不可云也止如十六觀經本明佛觀疏云心觀為宗或不見斯意乃妄有穿鑿今之學者切宜思之觀身不得身者先明身觀推檢四大本無實性名身性空但有名字即身相也名字多種且舉六度十度等如身行布施名檀身離諸非名戒身受所辱名忍身動前行名進身能安靜名禪身了體空名慧身行其巧名方便身立盟誓名願身利及於他名力身出生死名智身乃至身行八萬塵沙法門行者隨受名字達名無名名身相空推檢性相雖空而色心諸法宛然故空不定空假不定假非空非假皆真實妙性名顯中道也觀身既然口意例解二明事得理成三初明無觀俱失文句三觀宛然事理六法皆悉具足若無觀慧事亦不成記身等為境能發其觀觀成境現事理雙明豬揩金山方之可解二以衣物為例文句例如三衣六物若解其意三六俱成若不解者非但無六三亦不成記三衣者僧伽梨多羅僧安陀會也六物者兼尼師壇鉢多羅漉水囊也是知六外無三亦如四禪八定定外無禪蓋衣名則局物名稍通衣者遮覆之義也鉢多羅等且非遮覆故通名物也亦如無色四處受想慮亡則無支林喜樂之名故通受定名也色界四處雖通靜慮受想尚行則別受禪名故知解之則事三理六俱明昧之則三六四八俱暗三得理俱成文句觀心亦爾若得理觀六觀亦成若不得意既無理觀事觀亦不成無六亦無三此之謂也此大好甚廣云云記境由觀顯理觀若成身口意三名妙色心故亦名六觀亦名事理成也無六亦無三者牒上例中若不解之文也可見記維昔先稟法智大師嘗講次撰記解釋經疏方終一十七品會乃歸寂其最後讚佛一品經旨幽邈疏科尚簡而鈎索深隱固亦難矣豫雖不敏忝久親講授遂纂集舊聞繫諸卷末亦冀覽者豈貽續貂之譏云音釋經廄音救廄馬舍也倣徉倣音傍徉音羊倣徉徙倚也憩音氣憩息也呰音子口毀也舐音是舐以舌取物也睫音接睫目傍毛也噴普寸切噴鼓鼻也愕五各反驚也惋音腕惋驚嘆貌也挾音協挾持也懷也奕音亦奕大也盛也記閴音吸閴寂也黈天口切黈氣也嚬呻嚬音頻呻音申嚬呻師子振威也晡音逋晡申時也敻休廎切遠也廎音慶駁音撥駁馬色不純踳蠢喘二音踳駁色雜不同
