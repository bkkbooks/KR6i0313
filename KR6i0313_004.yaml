body:
  text: 北涼三藏法師曇無讖譯經天台智者大師說文句門人灌頂録四明沙門知禮述文句記雙徑沙門明得會句并記入於經文記二明供養諸佛二初立意分文文句從我今供養下三十五行明供養諸佛所以供養者我本癡盲蒙示懺悔此恩深重故興供養文為二初一行明財供養後三十四行明法供養記二依文釋義二初明財供養我今供養無量無邊三千大千世界諸佛記我今等者此乃即法以明財供何者以一大千界中自有千百億佛況無量無邊大千諸佛財若有限何能遍供良由了達所奉之供體是法界出生無盡一一周遍故一切剎一切佛前皆有六塵妙供養事不獨廣遍亦乃常存盡未來時施作佛事為彰次段修行法門故此別名財供養矣須知二供其體相即為門不同故分為二二法供養二初分文立意文句法供養為二初八行半明化他法供養隨順如來慈悲法門濟利含識是為化他修法供養後二十五行半明自行法供養隨順如來智慧法門修十地功德是為自行修法供養諸供養中法供養最為第一財供法供事理自他皆悉具足也記化他用慈是無緣慈不離三智自行順智既是佛智豈離三慈為令易解相對說耳法供養第一者能令佛壽常住不斷妙化無窮故也又有法則二供俱成無法則財供亦廢是故法供得稱為最二依文釋義二初明化他法供養二初化他令修行二初分文釋義二初分文文句化他法供養文為二初四行化他令其修行後四行半化他令修懺悔初修行者我自行十地為法供養今復化人令法供養譬如一燈然百千燈瞑者皆明明終不盡其意有四初明化始以大悲拔苦次勸真因十地之行次勸真果菩提大覺次勸精進督使速成記二釋義四初明化始以大悲拔苦我當拔濟十方一切無量衆生所有諸苦記二勸真因十地之行我當安止不可思議阿僧祇衆令住十地記三勸真果菩提大覺已得安止住十地者悉令具足如來正覺記四勸精進督使成行為一衆生億劫修行使無量衆令度苦海記二約教觀釋二初教義文句夫衆生等故性欲亦等善巧度一衆多亦然不計劬勞積行纍德功成大覺即智德滿盡一切苦即斷德滿文自明顯不俟多釋記二觀行文句觀心者調一念心使真明發任運成真果調一切心數亦復如是弟子衆塵勞隨意之所轉即此義也記一念心者趣舉一念也以妙三觀調妄即真名真明發或至初住或至六根或成五品皆得名為成真果也故止觀義例道樹之喻觀陰等境成不思議名為生芽初品已上皆名生果彼修止觀生芽生果與今觀心真明真果法喻相當調一切等者乃一心觀成歷彼彼心無不成觀與彼義例淨心遍歷任運泯合其意亦同二化他令懺悔二初立意分文文句次四行半化他令修懺者我蒙佛教懺還以懺教他重重然無盡燈化化不絶也文為三意初欲為說懺次正為說懺三說懺已記二依文釋義三初欲說懺我當為是諸衆生等演說微妙甚深悔法所謂金光滅除諸惡記二正為說千劫所作極重惡業若能至心一懺悔者如是衆罪悉皆滅盡文句千劫者假多以顯懺力大爾譬如惡人造罪山積能拔於王難尚分半國償豈復問其前愆設千劫造逆雖復厚重能拔法性之王從如來藏中顯成法身者大覺朗然超升自在寧復為五無間業之所縛邪記涉時既多造罪復重若了逆罪即金光明全所具理為能觀觀由此顯出法性金等名拔王難障轉成德何罪能縛故五無間皆解脫相此乃名為正為說懺三說懺已我今已說懺悔之法是金光明清淨微妙速能滅除一切業障記二明自行法供養二初分文立意文句從我當安止下二十五行半自修法供養文為二初五行自修行後二十行半自修懺前自懺竟今那復重譬如金師從初習學至于皓首互燒互打器成方息修行譬智燒修懺譬斷打智斷極乃止重說無咎前是自行門今是法供養門為異也自修行又為三初一句標章我當安止是也次修因十地是也次成果菩提是也記前自下問譬如下答以譬帶法兼而答之金師譬金鼓釋迦化主也初習譬始發僧那時皓首譬今果後示現從始至今何嘗暫廢說行說懺互燒譬即懺說行互打譬即行說懺智斷亦然器成譬一番之機自因得果故未得果須數燒打何嫌重說今是下辨異雖數燒打各有其門二依文釋義二初自修行三初標章我當安止記二修因住於十地十種珍寶以為腳足文句珍寶者十地因可貴諸地即是珍寶也腳足者十地是果家之基本故言腳足又十度是十地之腳足於餘功德非為不修隨力隨分正以檀為初地之足檀足若滿得入初地乃至智度足滿得入十地故十度為十地腳足也記腳足者疏存二解初以十地為果腳足二以十度為十地腳足言十度者六外更加方便願力智也於餘下釋出十度為地足意華嚴十地品廣明其相三明成果成佛無上功德光明令諸衆生度三有海諸佛所有甚深法藏不可思議無量功德一切種智願悉具足百千禪定根力覺道不可思議諸陀羅尼十力世尊我當成就文句果中有總明果滿別明果滿在文可知功德光明者是果上二種莊嚴也令衆生度海者即果上轉法輪也記指經初句為總餘三行三句為別功德是福嚴光明是智嚴不離色光而論智光以其色心不二究竟也三行之中疏不釋者今略列之冀免檢尋法藏須論八萬四千皆祕密故名為甚深功德乃是六度萬行所成就者略言萬德廣則無量一切種智即中道智中必雙照令三圓極禪謂達禪達根本等皆法界故定謂楞嚴本性健相二是大乘事理二定於一切法皆明靜故泛舉百干根謂五根力謂五力即信進念定慧此五能生一切善法名之為根力排五障乃以疑怠邪亂癡遮此五故名之為力與上五根名同用別覺謂七覺分一擇法覺分二精進三喜四除五捨六定七念此七能令定慧均平通名覺分者有到極果覺知之分也道謂八正道一正見二正思惟三正語四正業五正命六正精進七正念八正定八離偏邪通至涅槃故名正道根等道品修雖在因證皆果德陀羅尼者翻為遮持遮一切惡持一切善數或五百八萬四千表破煩惱且言其實數一切法能遮能持十力如向記中已列此乃自行始終之相二自修懺二初分文文句從諸佛世尊下二十行半明自修懺文為二初一行請佛記二釋義二初請佛諸佛世尊有大慈悲當證微誠哀受我悔記二明懺二初分文文句後十九行半明懺文為五初四行半懺報障次一行半懺煩惱障次六行懺業障次兩行明回向次五行半懺善惡兩難就報障文又二初二行半出報障相次二行請除滅記二釋義五初懺報障二初出報障相若我百劫所作衆惡以是因緣生大憂苦貧窮困乏愁熱驚懼怖畏惡業心常怯劣在在處處暫無歡樂文句百劫者受報之時也時中受身身即是報報有所作作即是障貧窮困苦是依報不圓亦是報障也愁熱驚懼者由貧窮外逼故驚懼內焦皆報障也所作衆惡者即想行陰苦也貧窮困苦者即色陰苦也愁熱驚懼心常怯劣者即識陰苦也暫無歡樂者即受陰苦也此皆報陰意爾記百劫受身身作衆惡惡為因緣即生憂苦能生所生皆是報障良由報得惡五陰故故疏與經對於五陰既知皆陰非報是何須了五陰造作衆惡方名報障若作衆善豈名障耶二請惡除滅十方現在大悲世尊能除衆生一切怖畏願當受我誠心懺悔令我恐懼悉得消除記願佛受懺即是除滅若不助正資導成懺佛雖有力何能除障意可見故疏更不釋二懺煩惱障二初分文文句次煩惱障文為二初兩句出相次一行乞清淨記二釋義二初出相我之所有煩惱業垢記業垢者業名動作煩惱心動成於垢染亦可煩惱從宿業生故名業垢二乞清淨惟願現在諸佛世尊以大悲水洗除令淨記大悲水者同體之悲方稱為大此悲為水洗無不淨悲雖同體非緣不興三懺為緣不洗而洗也三懺業障二初分文文句次業障文為三初二行豎論三世造業次二行橫明現起十惡次二行求懺過去業記二隨釋三初豎論三世造業過去諸惡今悉懺悔現所作罪誠心發露所未作者更不敢作已作之業不敢覆藏記文二初對報示文句今正受者名為報障未受者繫屬行人若修善道能為障礙記現前色心名正受者未成報者有繫屬能若修善禪諸無漏道則來責報現諸業相或密為障不依大乘三種懺法此障不滅二設問釋二初設未有問文句問過現須懺未來未有云何言懺記二明遮起答三初引經論證文句答數家呼為未來有論家呼為當有大經云遮未來故名之為殺現在念念滅何所可殺秪遮斷未來名為殺爾經論悉以未來為有故須懺也記數家是婆沙論家是成實遮未來者斷相續心若不遮斷短音未來必起故新經淨除業障品懺罪文中依三世菩薩皆云已作之罪願得除滅未來之惡更不敢作並遮未來也二引現事例文句今更舉現事例之如在家人畫度生方起無量惡念事雖未有次第必更忽然發心捨家修道前所念事併與緣差記在家例造罪時捨家例修懺時若不遮斷必須更改未有之事至於正有三據義結答文句未來之業亦應如此雖非現有時到必然今若懺悔索然清淨記索然猶解散也二橫明現起十惡身業三種口業有四意三業行今悉懺悔身口所作及以意思十種惡業一切懺悔文句橫開現世三業為十惡可解記三求懺過去業遠離十惡修行十善安止十住逮十力尊所造惡業應受惡報今於佛前誠心懺悔文句遠離者惡斷也修行者善生也十住者初心因位也逮十力者後果滿也記若十惡十善止就三塗人天解釋豈安十住逮十力耶得前五戒持犯之意則今義可解十住十力別圓二教皆可明之持犯之意今義易明故須因位至於後果節節論於十惡十善四明回向若此國土及餘世界所有善法悉以回向我所修行身口意善願於來世證無上道文句次明回向者衆生頑故愛著於有不能升出今懺此罪故云回向他以若此國土及餘世界為隨喜之文今意不爾此土他方凡所作善皆施衆生共向佛果如聲入角則能遠聞方便力大與虗空等又結文云是回向不得作隨喜釋隨喜在下文也記此懺愛著因果之罪他以此國及餘世界是五乘人修善法處約處明人故云隨喜今明我在此土他界所修之善今悉攝取回向衆生證無上道聲喻諸善角喻回向近遠可知方便力大者若善回向成大方便功等大虗然若不了善即法界不名回向也五懺善惡二難二初揀示分文文句釋八難者此是善惡中論八難非佛前佛後之八難文為二初四行指惡為難次一行半指惡遮善為難或指善遮道為難記次一行半疏釋正取善遮道義二隨文釋義二初指惡為難若在諸有六趣險難愚癡無智造作衆惡今於佛前皆悉懺悔世間所有生死險難種種淫欲愚煩惱難如是諸難我今懺悔心輕躁難近惡友難三有險難及三毒難記文六初釋諸有險難文句初四句是報障難諸有者二十五有報得之身造作衆惡豈非報障記二十五有者四趣并四洲六欲大梵天四禪無想報那含四空處未絶漏業故同名有釋報障義具於前疏二釋生死險難文句生死險難有二解若取其因即是業障若取其果即是報障記業為險難至非非想定報為險難至有頂天頭藍弗是其例也下之業報險難可知二釋淫欲難文句種種淫欲即煩惱障記四釋輕躁難二初正示輕躁相文句心輕躁者復是報障輕躁是覺觀覺觀屬報法記謂初心在緣名覺細心分別名觀亦尋伺心也此之陰心故屬報法二引聖凡例二初聖文句如羅漢斷煩惱盡出觀猶有覺觀散心當知輕躁是報障非煩惱也記出觀者出定也就無學釋無惑業故驗是報法也二凡文句更舉世人學問回轉易轍不成業障皆由輕躁之過豈非障邪記回轉易轍者如學經未成復欲學律學律未成復欲學論此輕躁人終不成功業也不成業障者障應作者字之誤也五釋近惡友難文句近惡友難者惡友能汙染人三業此屬業障如移廄於屠邊如孟母鄰於哭貨朱赤墨黑即其義也記如移廄者廄音救馬舍也馬之所聚也付法藏傳云親近賢善聽聞正法如昔華氏國有一白象氣力勇健若有罪人令象踏殺後時象廄為火所燒移近精舍有一比丘誦法句偈曰為善生天為惡入淵白象聞之心便柔和後付罪人不害嗅舐而已王召智臣共謀此事一臣白王此象繫近精舍必聞妙法是故爾耳今可繫近屠坊彼覩殺害惡心當盛王令繫象屠所象見殺戮惡心猛盛殘害彌甚鄰於哭貨者謂鄰墓學哭鄰市學貨蔡氏貨請經曰貨化也變化易之也故字有化又財也史記曰孟軻考母偏孤居近墓軻乃常戲於墓母曰此非所居去居市旁軻復戲為商賈母又曰不可居又居學館之旁乃為揖讓進退有禮母曰此真可以居軻後遂為大儒著書七篇六釋三毒難文句三毒是煩惱障也記疏分科云善惡八難善論四難經疏可了今之惡難經似列七約何云四蓋就三障義有兼獨一兼三獨乃成四難何者六趣險難三有險難及輕躁難此雖三難獨在報障淫欲愚癡及三毒難獨屬煩惱近惡友難獨屬業障若生死險難疏有兩解體兼業報故三障惡義當四難然須了知惡是性惡是故此惡即無生觀如此懺之頓消諸難二指善為難遇無難難值好時難修功德難值佛亦難如是諸難今悉懺悔記文二初明善惡俱能為難二初雙明二義文句遇無難難下此有二義一若不修善障難不興若欲修善惡障即起善非是障惡來遮善名善為難此義易知常人皆作此解也二者諸善是難善能障道豈非難邪此義今當說記二依善釋文四初釋遇無難難文句遇無難難者自謂無惡不肯修善如二乘入空生滅度想生安隱想不復進求菩提即其義也記二乘出宅到無畏處無難相顯故舉為例暫樂人天自謂無難皆當此難二釋修功德難文句修功德難者多作有為求可意果如一比丘專行福德不修禁戒墮白象中七寶絡身金盂承糞又妙莊嚴王本事等豈非修功德難記如一等者大論第八云迦葉佛時有兄弟二人出家求道一人持戒誦經坐禪一人廣求檀越修諸福業至釋迦佛出世一人生長者家一人作大白象力能破賊長者子出家學道得六通羅漢而以薄福乞食難得他日持鉢入城乞食遍不能得到白象廄見王供養象種種豐足語此象言我之與汝俱有罪過象即感結三日不食守象人怖求覔道人見而問曰汝作何術令王白象病而不食答此象是我先身時弟共於迦葉佛時出家學道我但持戒誦經坐禪不行布施弟但廣求檀越作諸布施故飲食備具種種豐足我但行道不修布施故今雖得道乞食不得妙莊嚴王者法華疏云昔佛末法有四比丘於法華經極生殷重如甘露未霑於是結契入山修道居山日久衣糧殫罄一人云君三人但以命奉道莫慮朝中我捨身力誓給所須三人功圓事辦一人數涉人間偶逢王出愛彼光榮功德熏修報生人天常得為王三人議云我免籠樊功由於王王耽果報增長有為方沈火坑宜早開化一人云此王著欲而復邪見若非愛鈎無由可拔一人為端正婦二作聰明兒兒婦之言必當從順如宜設化果獲改邪婦即妙音菩薩也二子即藥王藥上也王即華德也三釋值好時難文句值好時難者如劫初時在單越時一向受樂都不修道豈非值好時難記如劫初閻浮人壽八萬歲北洲壽定一千歲俱以壽長受樂不樂修道單越此云殊勝勝餘三洲故四釋值佛亦難文句值佛亦難者如旃遮婆羅門女善星調達等皆是值佛而難例此應云聞法起謗值僧起破皆是難也記興起行經云多舌童女儛杅起腹至我前曰沙門何不自說家事乃說他事汝今自樂不知我苦耶汝先共我通使我有娠今當臨月事須蘇油養於小兒盡當給我天帝化作一鼠入其衣裏嚙杅忽然落地是時地裂旃遮現身墮阿鼻獄涅槃迦葉品善星是佛菩薩時子出家之後受持解說十二部經壞欲界結獲得四禪而親近惡友退先四禪生惡邪見言無佛無法無有涅槃遙見佛來生惡邪心入阿鼻獄調達是佛堂弟而自造三逆謂出佛身血破轉法輪僧弒阿羅漢教阿闍世弒父成就害母加行復以惡心十爪甲下藏於毒藥欲嗚佛足刺足害佛將往耆山出城地裂生入泥犂此等值佛而成大難然上三句體是漏善障修無漏故名為難此句造逆似不類上以值三寶最名為善逆故成難亦可例上於善障道二明平去二聲讀文二初明讀字通平文句若讀作難易之難者此是惡來遮善之義使善難成也若讀作障難之難者此是善自是難能障於道記二據經屬去文句又依經文云如是諸難今悉懺悔當知經作障難之難義也記三明稱歎二初立意分文文句從諸佛世尊我所依止下二十一行偈是第三稱歎者論次第前財法供養是身意身意未泄未備今更口歎若作法門者前是供養法門今是念佛三昧法門文為三初一行標章歎次十九行正歎三一行結歎記二種供養可對身意既不興言是故未泄三業不足是故未備今加口業顯而復具故成次第前雖自他修行修懺而能資益佛之壽命名供養門今雖稱歎佛之三身而能成就行人觀法名念佛門法雖互具從增勝故立二法門二隨文釋義三初標歎諸佛世尊我所依止是故我今敬禮佛海文句標諸佛者橫則十方竪則三世事即報應理即法身言略而意廣標章之巧妙也我所依止者依止法性一體三佛也佛海者四眼入佛眼十智入如實智皆失本名字但名佛眼佛智如物投石蜜如流會海無不甘醎者法性三佛攝一切法故名佛海也記報應二修全理之事也法身一性全事之理也十方三世佛佛三身如此標章何所不攝我依止者既云法性一體三佛驗知他佛為心性佛此依本覺起於始覺亦是三諦發於三智非此依止不成妙懺故圓初心名修佛行四眼入佛眼等大論文也十智與如實智總十一智十智與二乘共如實獨在佛十智者一法智二比智三他智四世智五苦智六集智七滅智八道智九盡智十無生智如物投等者石蜜至甘海水至醎物投水會皆失本味體法即性無不妙也此之佛海寧不歸敬二正歎二初分文文句就正歎為二初十六行寄言歎後三行絶言歎寄言又二初一行略歎略況次十五行廣歎廣況記二隨釋二初寄言歎二初略歎略況金色晃耀猶如須彌是故我今頂禮最勝記文二初釋略歎二初金色相貌二初以他金比色文句略歎者諸相好中略歎金色釋論以即時鐵比即是金即時金比海金海金比龍金龍金比閻浮洲金閻浮洲金比四天王金如是傳傳比第六天金第六天金比佛身金色第六天金如鐵記閻浮金者此是西域河名近閻浮樹其金出彼河中此河因樹立稱金由河得名二以照物顯光文句又佛金光徹照壁障無影佛入城時放光照地一女人低頭禮拜金叉墮地唯見晃晃不知何者是地何者是叉佛過後光歇方見金叉爾記二讚金色所以二初明是衆相所依文句然金色身是衆相所依處唯見金色故知是總歎衆相好也記二明為四德之譬文句金有四義堅不可毀譬常得之者富譬樂體無瑕穢譬淨色妙晃耀譬我諸德之中四德為總記二釋略況文句猶如須彌者須彌為四寶所成況佛身具足四德故知總況也記二廣歎廣況二初廣歎二初分文文句廣歎廣況文為二初十二行半廣歎次二行半廣況廣歎又四記二隨釋言讚應色意彰法報色相是表智證是裏雖分表裏豈是異體故新本中所明四德別屬三身謂法具常我應身具淨化身具樂分圓為別融別為圓故圓三身身身四德其得意者了今應四即法報四當以此意尋乎經疏文四初歎我德其色無上如天真金眼目清淨如紺琉璃功德威神名稱顯著佛日大悲滅一切暗文句從其色無上下二行廣歎金色無上無上者我德也記二歎淨德善淨無垢離諸塵翳無上佛日大光普照煩惱火熾令心焦熱唯佛能除如月清涼三十二相八十種好莊嚴其身視之無厭文句從善淨無垢下三行廣歎佛色無垢無垢者淨德也記三歎常德功德巍巍明網顯耀安住三界如日照世猶如琉璃淨無瑕穢妙色廣大種種各異其色紅赤如日初出頗梨白銀校飾光網如是種種莊嚴佛日文句從功德巍巍下三行半廣歎佛色安住安住者常德也記經巍巍者高大貌也頗梨此云水玉也四歎樂德三有之中生死大海潦水波蕩惱亂我心其味苦毒最為粗澀如來網明能令枯涸妙身端嚴相好殊特金色光明遍照一切智慧大海彌滿三界是故我今稽首敬禮文句從三有之中下四行廣歎佛色能除苦毒即樂德也記潦音老行水也稽首者說文云下首也首頭也孔安國云稽首謂首至地二廣況二初分文文句從如大海水下二行半廣況文為二初二行廣況二半行合喻記二隨釋二初廣況如大海水其量難知大地微塵不可稱計諸須彌山難可度量虗空邊際亦不可得文句佛功德海思所不能知言所不能盡心行處滅言語道斷即此義也海水難知況常德也地塵難知況淨德也山斤難知況我德也空邊難知況樂德也記此之四句喻前四佛舉大師釋之或喻應身有量無量或喻法報四諦四德玄文序中顯金光明佛不能喻良以三身三一自在是故四喻或別在一或總顯三此文正同前對四德海無增減故常地體是淨山形高出如我虗空無礙故樂二合喻諸佛亦爾功德無量文句諸佛亦爾下合喻也記二絶言歎二初分文文句從一切有心下三行絶言歎也文為二初一行半正絶言歎二一行半牒譬帖合記二隨釋二初正絶言歎一切有心無能知者於無量劫極心思惟不能得知佛功德邊文句一切有心不能得知即是絶思思既已絶口何所宣即絶言也記二牒喻帖合大地諸山尚可知量毫滴海水亦可知數諸佛功德無能知者文句更牒譬帖合在文可見記問疏釋寄言及以絶言皆離思說同耶異耶答四德祕密本離心緣今之稱歎為令衆生入祕藏故故寄言絶言皆彰離念寄言用四喻於四德喻既莫數顯德忘緣絶言中四不可為喻亦顯四德忘於緣慮大師深達經文妙旨故解二文皆絶思說也三總結相好莊嚴名稱讚歎如是功德令衆皆得文句從相好莊嚴下一行總結相者結一切相好者結一切好莊嚴者一一相一一好中皆具衆德以為莊嚴也記四明發願二初立意分文文句從我以善業諸因緣故下有五十一行半偈是第四發願行若無願如牛無御不能有所至如畫無膠如壞未火如水中月故以願持行亦是懺悔退轉之罪也文為二初有四十七行半明發願次四行約願隨喜初願又二初九行自發願次三十八行半為他發願自願又二初四行願果滿次五行願因圓果滿願又四初一行成佛道是願意輪滿次一行說法是願口輪滿次一行摧魔是願身輪滿次一行住壽久益是願慈悲滿記如牛無御者謂牧竪也夫立願者若多若少皆須不失四弘之意而此四弘須依四諦願不依諦名為狂願今就圓論依無作諦雖世出世二種因果皆了即性無苦可度無集可斷無道可修無滅可證如是則能遍度盡斷圓修妙證比前三教願未免狂銷今諸願若失此意非圓行人二隨文釋義二初正明發願二初自發願二初願果滿四初願意輪滿我以善業諸因緣故來世不久成於佛道記大覺圓明故屬意業二願口輪滿講宣妙法利益衆生度脫一切無量諸苦記三願身輪滿摧伏諸魔及其眷屬轉於無上清淨法輪記陰死天子多約於身煩惱屬意今從多分四願慈悲滿住壽無量不思議劫充足衆生甘露法味記非無緣慈住壽不爾二願因圓二初分文文句因圓願又四初一行具六度願有為功德圓次一行願無為功德圓次二行宿命念佛圓次一行值佛圓記二釋義四初願有為功德滿我當具足六波羅蜜猶如過佛之所成就記六度成就此約真因破於六蔽從斷正論是智德故故名有為二願無為功德滿斷諸煩惱除一切苦悉滅貪欲及恚癡等記此約真位垂形九道調伏衆生任運不與惑苦相應是斷德故故名無為故海東法師云始覺斷障是實斷斷本覺斷障是不斷斷正與今家智斷二德其義齊也三願宿命念佛滿我當憶念宿命之事百生千生百千億生常當志心正念諸佛聞說微妙無上之法記憶宿命故見過去佛亦憶諸佛所說正法四願值佛滿我因善業常值諸佛遠離諸惡修諸善業記因過去善見未來佛遠惡修善成智斷因二為他發願二初分文文句為他發願文為二前八行半願作藥樹王身大悲拔苦後三十行願作寶珠王身大慈與樂拔苦又為四初一行總拔衆苦次一行拔根不具苦次兩行拔病苦次四行半拔王難苦記二釋義二初願作藥王拔苦二願作珠王與樂此能拔能與是無緣慈悲所拔所與須論十番所謂果報修因聲聞支佛四教菩薩方便實報今藥樹王拔此十種行人之苦珠王合與十種人樂當以此意銷與拔文初自分四初總拔衆苦一切世界所有衆生無量苦惱我當悉滅記二拔根缺苦若有衆生諸根毀壞不具足者悉令具足記三病苦十方世界所有病苦羸疲頓乏無救護者悉令解脫如是諸苦還得勢力平復如本記四王難苦若犯王法臨當刑戮無量怖畏愁憂苦惱如是之人悉令解脫若受鞭撻繫縛枷鎖種種苦事逼切其身無量百千愁憂驚畏種種恐懼擾亂其心如是無邊諸苦惱等願使一切悉得解脫記二願作珠王與樂二初分文文句與樂又為三初十六行半與世間果樂次九行半與出世因樂後四行結成記二隨釋三初與世間樂果若有衆生饑渴所惱令得種種甘美飲食盲者得視聾者得聽啞者得言裸者得衣貧窮之者即得寶藏倉庫盈溢無所乏少一切皆受安隱快樂乃至無有一人受苦衆生相視和顏悅色形貌端嚴人所喜見心常思念他人善事飲食飽滿功德具足隨諸衆生之所思念皆願令得種種伎樂箜篌箏笛琴瑟鼓吹如是種種微妙音聲江河池沼流泉諸水金華遍布及優鉢羅隨諸衆生之所思念即得種種衣服飲食錢財珍寶金銀琉璃真珠璧玉雜廁瓔珞願諸衆生不聞惡聲乃至無有可惡見者願諸衆生色貌微妙各各相於共相愛念世間所有資生之具隨其所念悉令具足願諸衆生諸所求索如其所須應念即得香華諸樹常於三時雨細末香及塗身香衆生受者歡喜快樂文句上文大悲苦根不具者令具今大慈與樂視聽聰明暢悅快樂諸根語同與小異也記經鼓吹古今注云短簫也經優鉢羅此云黛色即青蓮華也常於三時者晝三時也二與出世樂因二初分文文句從願諸衆生常得供養下九行半與出世因樂文為二初三行半令修行外緣具次六行令修行內因具外緣又二初二行值三寶二一行半離八難記二隨釋二初令修行外緣具二初值三寶願諸衆生常得供養不可思議十方諸佛無上妙法清淨無垢及諸菩薩聲聞大衆記二離八難願諸衆生常得遠離三惡八難值無難處覲覩諸佛無上之王文句人緣不同或值佛難不除或難除不值佛今願其亦除亦值記二令修行內因具二初分文文句內因又二一半行生尊貴家二五行半多饒財寶記二隨釋二初生尊貴願諸衆生常生尊貴記二饒財寶多饒財寶安隱豐樂上妙色像莊嚴其身功德成就有大名稱願諸女人皆成男子具足智慧精勤不懈一切皆行菩薩之道勤心修習六波羅蜜常見十方無量諸佛坐寶樹下琉璃座上安住禪定自在快樂演說正法衆所樂聞文句人因不同或多財而卑賤或尊貴而貧窮因不具足今令其亦貴亦富女有五礙願其無五礙苦記五礙者一不作梵王二不作帝釋三不作輪王四不作魔王五不得作佛三結成二初分文文句從若我現在下四行結成自他誓願也前二行結自後二行結他記二釋經二初結自若我現在及過去世所作惡業諸有險難應得惡果不適意者願悉滅盡令無有餘記二結他若諸衆生三有繫縛生死羅網彌密牢固願以智刀割斷破裂除諸苦惱早成菩提記二約願隨喜二初分文文句從若此閻浮下四行約願隨喜隨喜者慶他修善也亦是懺悔嫉妬之罪也文為二初二行隨喜於他後二行隨喜於自記二釋經二初隨喜他若此閻浮及餘他方無量世界所有衆生所作種種善妙功德我今深心隨其歡喜記二隨喜自我今以此隨喜功德及身口意所作善業願於來世成無上道得淨無垢吉祥果報記五結成二初分文文句從若有敬禮下有九行偈是第五結成文為三初二行結成斷惡故言超六十劫罪次四行半結成生善故言國王大臣之所恭敬次二行半結值佛多雖不別說善知識佛自兼之記二釋經三初結成斷惡若有敬禮讚歎十力信心清淨無諸疑網能作如是所說懺悔便得超越六十劫罪記二結成生善諸善男子及善女人諸王剎利婆羅門等若有恭敬合掌向佛稱歎如來并讚此偈在在生處常識宿命諸根具足清淨端嚴種種功德悉皆成就在在處處常為國王輔相大臣之所恭敬記三結值佛多非於一佛五佛十佛種諸功德聞是懺悔若於無量百千萬億諸佛如來種諸善根然後乃得聞是懺悔記三讚歎品生善二初品題金光明經讚歎品第四記句文分二初約義通釋二初示四悉意二初列文句讚歎凡有四意一從能讚人二從生善三從滅惡四從所讚人記二釋四初世界文句一從能讚人者前品明信相思疑佛壽四尊盡降其室一心信解夜夢金鼓出聲且向耆山說夢今品佛述其昔為龍尊面讚法王願我當來夜夢晝說說斯人之本事故言讚歎品記思疑佛壽者即前經云作是思惟心生疑惑也一心信解者開悟也即經云信相聞是四佛宣說壽命深心信解也斯人者信相也本事者今之所為皆由昔願令衆歡喜故屬世界二為人文句二從生善得名者夫善不孤運生必託緣緣中勝者無過於佛龍尊讚佛能生妙善從生善緣得名故言讚歎品記三對治文句三從滅惡得名者罪之尤者無過毀佛若翻滅斯罪應須讚歎讚歎治於毀訾從能治得名故言讚歎品記罪之尤者尤甚也以德勝恩重毀之罪甚口毀曰訾亦訶也四第一義文句四從所讚人得名者即是去來現在三世諸佛諸佛極尊甚深無量稱揚顯說故名讚歎品記言諸佛極尊甚深無量者圓初住去分以法性為身體相妙覺盡以深廣法性為身體相故起信論云諸佛如來皆是法身智相之身第一義諦離於施作今稱讚此令人入理二釋讚歎名二初分字釋義文句若欲分別述德名為讚喻名為歎亦更互分別爾記亦更互分別者以述德為讚褒喻為歎但使敘述稱義成對字無在二引論證成文句釋論第三十云美其功德名為讚讚之不足又稱揚之名為歎也記彼之稱揚可證褒喻也二結示別顯二初約三業別顯文句此品有恭敬是身業尊重是意業讚歎是口業口業不發身意不暢為暢身意音聲為佛事故稱揚顯說美如來真實功德故言讚歎品也記雖具三業口業為正故是別顯二約四悉別顯文句結此四義都是四悉檀因緣立此品名故言讚歎品也此品雖從四悉檀立名正是生善之用記四義指向能讚人等也此品下別顯也於四悉中正在生善對前懺品正滅惡故二經文二初分文文句文為二一長行二偈頌記二隨釋二初長行爾時佛告地神堅牢善女天過去有王名金龍尊常以讚歎讚歎去來現在諸佛記文二初釋對告人二初約對治釋文句而對告地神者主此大地菩薩行行皆寄其上壽命長久見去來今事證義事彊如瑞應云積功纍德誰為證佛時指地是知我今說往昔金龍尊事所以對告地神也記瑞應云佛告魔王我積功纍德今得作佛魔云積功纍德誰為證佛時以手指地云是知我是者謂指地神于時地神涌現為證二約為人釋文句又對善女天者男天陽表權女天陰表實實智能生衆善善生故宜對善女證往故宜對堅牢云云今論生善之用故對告善女記半空已上皆是男天半空已下皆是女天是鬼神報稱為天者有天然力用故褒之以天召諸鬼神皆以天名不唯此也實智乃是善法之本今讚覺者生人實智宜告善女又別名堅牢宜證往事稱理不壞云云之意也二釋金龍尊文句金龍尊者此王往昔修金光明法門依法性理故言金能以智慧讚三世佛辨如雲雨故言龍能為衆生作大利益為物所仰故言尊從行得名故言金龍尊也記金光明法門所依法也金龍尊能契行也若法若行皆性一修二故金為理能讚為龍能益故尊斯以證理起用二修對於一性當體名為金龍尊也二偈頌二初分文文句總有六十二行半偈文為三一三十五行讚三世佛二二十五行半發來世願三二行結會二世事就讚佛文為五初一行半總讚次二十三行別讚次三行遍類讚次五行半絶言讚次二行回向記二隨釋三初讚三世佛五初總讚我今尊重敬禮讚歎去來現在十方諸佛諸佛清淨微妙寂滅記文三初約事理明總文句總讚者竪總三世橫總十方世方是總事微妙寂滅是總理記三世十方心意識境名之為事何有一事不從理現經云寂滅是涅槃義既稱微妙是大滅度則彰三德非縱非橫名祕密藏密藏圓遍無別世方世方宛然無非三德不以二相見諸佛土斯之謂歟以此總讚為妙何極二約三法明總文句總理是總法身總事是總報應二身總讚三身亦是總讚三德三寶等種種三法門記法身者明性一也報應者明修二也全修在性合三為法名總法身全性成修合三為報合三為應是故名為總報應也一切三法莫不然耳又法身總三土以實報等皆寂光故報身總二土方便同居覩尊特故應身總同居淨穢兩處凡夫二乘見生身故分別則三身三土勝劣不濫融即則三身三土局遍相收以此讚佛佛德無遺矣三約四德明總文句如是諸佛總皆清淨清淨者即是總讚之辭也非但清淨亦常樂我云云記經云諸佛清淨剋果明德也果中衆德更無不會舉一淨德必常樂我四德圓妙舉一全收是故此四乃是三身之德三身融故四德遍嚴是故三身無非四德總此為讚極佛體用也令此點示故注云云二別讚二初分文立義二初分文文句從色中上色下二十三行是歷相別讚其文間出分為六意初六行半讚七大相海亦讚髮紺之好次二行讚兩小相海次兩句遍讚大相海次十三行又讚四大相海次兩句讚一小相海次兩句讚手足柔耎復是一大相海記大相謂三十二相小相謂八十種好皆稱海者若大若小悉無有邊故皆是法界全體顯現故一一相無非法海據其總讚諸佛清淨微妙寂滅以總顯別一一相好皆祕密藏大師見彼得意處故故釋相好皆立海名二立義二初明能讚智巧文句所以然者大相小相更相間填共嚴佛身龍尊巧智如法相解如法相讚故大相小相相間而讚爾記二明所讚德深二初歷教分別二據圓融即此之二意學者應知括經論之幽文立教觀之深趣彰化迹之不濫顯圓機之頓照何者以分別故從勝別示以融即故獨境遍收得後後者必得前前得前前者不得後後不知後故當分義成能知前故跨節義顯若能了知真中感應二識見佛則今二意收揀無遺矣二識者起信論云佛用有二種一依分別事識凡夫二乘心所見者說名應身以不知轉識現故見從外來取色分齊不能盡知故二者依於業識謂諸菩薩從初發意乃至菩薩究竟地心所見者名為報身身有無量色色有無量相相有無量好所住依果亦復無量種種莊嚴隨所示現即無有邊不可窮盡離分齊相隨其所應常能住持不毀不失皆因諸波羅蜜無漏行熏及不思議熏之所成就是受樂相說名報身文畢斯乃如來以法界用隨順衆生事業二識現報應身應身是今生身報身是今尊特及法性身依事識者但見應身不能覩報以其粗淺不窮深故依業識者既覩報身亦能見應以知真如起二用故行者應知真如之用現佛身相大有三品一如華嚴談相好數有十蓮華藏世界微塵二如觀無量壽佛經明八萬四千相好光明三如此經及法華般舟等說三十二相八十種好此三品相既是真如全體之用若多若少皆無邊際故悉稱海無非尊特然有通局以藏塵八萬局業識見其三十二通事識見名生名應若業識見即無有邊不可窮盡離分齊相名為尊特屬於報身此如今經列所歎相在三十二以金龍尊就佛四德微妙寂滅而為總讚以總顯別故三十二無非祕藏故一一相離於分齊如空無邊常住不毀疏據此釋三身融即正讚尊特若其不知龍尊總讚是依業識見應即報豈三十二圓光一尋名尊特耶言真中感應者良以如來現應化身示住偏真說於生滅及無生法被藏通機現尊特身住於中道宣說無量及無作法被別圓機故文句云丈六身佛住真諦丈六尊特合身佛雙住真中尊特身佛雙住俗中法身佛住中道疏有六處明應化尊特皆約真中感應而辨如法華歎佛經文顯云三十二相八十種好法身具故嚴法身故是特尊相是故荊溪類同華嚴一一相好與虛空等又云一一相皆法界海一一好無非名海疏釋今文大相小相皆稱為海此大小相全異華嚴九十七名一一皆與法界次第三十二相八十種好名目無差又懺悔品讚佛三十二相八十種好豈龍尊昔讚與今金鼓所讚優劣故知秪就中道感應稱為尊特非是加添相好之數方名尊特故華嚴中業報衆生等十種之身皆盧舍那舍那非報報非尊特耶失此意者勿議今宗也父母生身丈六身也三藏及通鈍根所感尊特即是他受用報通教利根及別所感法性是法身圓人所感此乃如來法界大用對三類機現三種身故能嚴相亦分三種三身力用優劣有殊不唯示果身相不同亦示行因三種差別以今見佛皆是曩世結緣機也如示迹因論四修相行六度等或示事修或即空修或次第修或圓頓修示修不等致令衆機結緣有異今日感見三身不同初自分二初總明文句夫相好本莊嚴佛身佛身多種父母生身尊特身法性身身既不同相好亦異相體不同相用亦異相用不同相業亦異記二別釋二初釋三身相三初釋生身相文句三身異者如林微尼園舉手攀樹化右脅生天地大動阿夷甚驚披氎而相相相炳明決定成佛悲不能聲此是生身佛相也記林微尼此云解脫處舉手攀樹者即摩耶夫人攀無憂樹而太子自右脅而生也阿夷亦阿私陀此云無比仙人名也披開也太子既生三日遂褁以白氎王召仙人相之於是開氎相其形也相相炳明者謂三十二相皆明顯也決定成佛者即仙人奏王之語謂輪王雖有三十二相相不明了今觀太子相相炳明決定作佛不為輪王也悲不能聲者即仙人自嗟年老不見太子成佛故泣也無聲自出淚曰泣今云悲不能聲是泣也此是生身也者疏雖標云父母生身須解其意豈後二身全無父母今特云者彰藏通佛住偏真也以偏真理不具五陰故使佛身從正習造機緣若盡灰滅淪空永無示現故以父母顯其有生機盡歸空顯其有滅通雖幻有亦須永無依教分別相狀如是二釋尊特相文句如釋論說尊特身佛巍巍堂堂譬如須彌映臨大海所有大相小相亦巍巍堂堂不同常身常光常相此即尊特佛身相也記巍巍高也堂堂明也言尊崇奇特者此別圓機所見身也常身常光者即凡夫二乘所見身也然高明身相應知兩意有須現起有不須現皆是如來鑑機進不中道之力於須現者即為現之如梵網經云方坐蓮華臺華嚴藏塵相維摩所說身如須彌映于大海觀無量壽相好八萬身量無邊此等皆是現起尊特相也有不須現者但以力加令於劣身見無分齊作巍巍堂堂而解以不可思議而觀此如今經讚三十二為尊特法性之身法華以三十二相莊嚴法身相相皆與虗空等量此等機緣悉以業識而見以中智而觀劣即無邊色即智性故不須現起而稱尊特若不爾者龍尊所讚三十二相疏云融三正讚尊特如何和會學人於此當善了之三釋法性相文句法性身佛者非是凡夫二乘下地之所能見唯應度者亦令得見此即無身之身無相之相一切智為頭第一義諦髻八萬四千法門髮大悲眼中道白毫無漏鼻十八空舌四十不共齒四弘誓肩三三昧腰如來藏腹權實智手定慧足如是等相莊嚴法性身佛也記此乃諸佛第一義諦智相之身凡夫二乘尚不知名豈能覩見若論極證等覺罔窮又復初地不知二地是故樹神哀泣自淚請佛現身即此身也皆得名為非下地見唯應度等者斯是大乘第一義悉檀機扣佛者乃以此身應之令見即前疏解一時之義一切種智與中諦一時也無身等者非質礙身是微妙身非差別相是智淨相一切智是萬行首故以為頭第一義諦諸法十最故以為髻八萬塵勞轉為法門數多名髮大悲為眼見苦即中道白毫不偏不染無漏為鼻嗅功德香十八空舌遍嘗理味不共為齒四十數齊大論以十八不共法十力四無畏大慈大悲三念處等為四十皆不與下地共故四弘為肩荷負不息三三昧止散如腰束衣圓三三昧秪是三觀空即空觀無相即假觀不得空相故無願即中觀於二邊不作願求故如來藏腹含三千故權實智手遍拔衆生定慧等足究踐理地今第三身與餘處列不無少異如觀無量壽佛經疏云色相身義當生身及他受用同為應身次法門身即今所列種種法門義當報身乃自受用也三實相身即以法門所嚴之理為第三身今則合彼理智二身為法性身開彼應身為生身尊特互有開合三身不虧又復應知今法性身頭等法門即是龍尊所讚之相心即色故名前二身色即心故名為法門但今歷教就分別門隨機所見前不見後是故後後從勝立名故使三身有優劣相又復尊特及法性身皆業識見以尊特相兼於別修故就身相高廣而示今法性佛即修即性故隱色相從法門說講者學者宜在精詳三釋三相業此從如來淨佛土時隨彼機緣示修不等故分三種初識生身業文句種相業者如釋論修百福德成於一相三千二百福德成三十二相此即生身佛種相義也記雖通通教今且在藏以其通教是大乘門利人能見後二佛故今就三藏修行事度為相好因言修百福成一相者論存多解今明一種大千衆生遇緣當死一一救之皆得壽命是為一福此福至百方成一相此指伏惑事度所成令彼衆生效此修之今見生身二釋尊特業文句若以空慧導諸相業一一業悉與空相應諸相應中空相應最為第一此是尊特身佛種相義也記言空慧者良以體法即空之慧三教共修鈍根之者但能空有利人知空非但空有亦能空空今分別門論尊特業雖能雙空且在別教但中之慧導諸相業諸業不出前之六度以知中故非莊嚴莊嚴乃能莊嚴第一義體令彼衆生效此修種今見尊特無分齊身三釋法性業文句若以實相慧導成諸業一一業無非實相法界此是法性身佛種相義記實相者中道理也全中實理為能觀慧名實相慧實相即慧也非別有慧從其所照得實相名導成諸業者諸業豈離前之六度以圓修故一一即性故無非實相一攝一切故無非法界故散脂云安住一切法如性於一切法含受一切法如是修之絶三教之情名不思議業令彼衆生效此修之今見法佛同虗空相二據圓融即三初正融即文句三身三種相三種相業不得縱橫並別若一異者則不清淨非微妙寂滅以不縱橫並別故是絶言言歎所不及也記圓佛頓證三身三相亦能頓示三種修相若其圓機能於一念修三相業能於一身見三身三相以了三身是祕藏故生身必具尊特法性尊特必具法性生身法性必具生身尊特見身既爾修業亦然如是方祛縱橫一異之情想也常樂我淨微妙寂滅此義方成金龍尊王昔是圓人頓修頓見故於一身讚三身相欲彰三相是祕藏故寄言讚後絶言讚之欲令衆生圓見圓修故也二明巧讚文句今經正讚尊特身相上兼法性下攝生身處中而明實讚者之巧云云記經之讚辭就三十二即示絶言乃顯能嚴即非莊嚴嚴第一體尊特身相豈不然乎亦可得云非生非法而生而法上兼法性下攝生身其意在此斯乃龍尊巧讚之意也三明妙用文句一一相皆明其用如足下安平相一切魔邪無能傾動者一切有無無能動者一切邊無能動者如頂肉髻相法不禮人亦不禮聖亦不禮分中別有所出云云記三相三業據圓相即被物成差歷教分之即融而別初安平相生身則表魔邪不動魔謂愛惑邪是見惑既住偏真此二莫動若尊特佛雙住俗中即無量四諦故凡夫有二乘無此二莫動若法性佛唯住中道邪外三教一切二邊當處皆中何邊能動最後肉髻兼無見頂故以不禮而為所表言法不禮者謂法爾也生身出離愛見二故法爾不禮凡夫之人尊特出離界內界外二種塵沙法爾不禮藏通之聖法性身佛究竟圓中法爾不禮分證中道初後既爾中三十相論用可知然不禮凡聖兼因而說非專果也別有所出及注云云者指諸廣文解相好處也記二依經釋義六初讚七大相海色中上色金光照耀於諸聲中佛聲最上猶如大梵深遠雷音其髮紺黑光螺𦦨起蜂翠孔色不得喻其齒鮮白猶如珂雪顯發金顏分齊分明其目修廣清淨無垢如青蓮華映水開敷舌相廣長形色紅輝光明照耀如華初生眉間毫相白如珂月右旋潤澤如淨琉璃記三十二為大八十種好為小一一相好皆是法界無邊無底故稱為海謂初句是讚第十四金光微妙故云上色次一句讚第十五身光三一行讚二十八梵音深遠四一行讚小相中第七十九髮色青珠五一行讚二十二四十齒具足六一行讚二十九眼七一行讚二十七舌大薄覆面至髮際八一行讚三十一眉間白毫相此八段中一是小相七是大相二讚兩小相海眉細修揚形如月初其色黑耀過於蜂王鼻高圓直如鑄金鋌微妙柔軟當于面門記初一行讚第三眉如月初次一行讚第二鼻高好孔不現修揚者修長也揚舉也即是眉高而長也面門口也三遍讚大相海如來勝相次第最上記既云次第最上即遍讚三十二也四又讚四大相海得味真正無與等者一一毛孔一毛旋生軟細紺青猶孔項即於生時身放大光普照十方無量國土滅盡三界一切諸苦令諸衆生悉受快樂地獄畜生及以餓鬼諸人天等安隱無患悉滅一切無量惡趣身色微妙如融金聚面貌清淨如月盛滿佛身明耀如日初出進止威儀猶如師子修臂下垂立過于膝猶如風動裟羅樹枝圓光一尋能照無量猶如聚集百千日月佛身淨妙無諸垢穢其明普照一切佛剎佛光巍巍明𦦨熾盛悉能隱蔽無量日月佛日燈炬照無量界皆令衆生尋光見佛本所修習百千行業聚集功德莊嚴佛身記初二句讚二十六咽中津液得味中上味二四句讚十三毛向上青色柔軟右旋三修臂下四句讚第九立手摩膝相四圓光一尋下四句讚第十五身光面各一丈此言一尋是約佛說也手既摩膝即當面各一丈也此既常光驗知諸相皆是常相云讚尊特者故知不須身大相多但是業識依中理見即名尊特學者應知此丈六身若其量度即不得際若不度之所見如故如淨名室但是一丈而能容受百千人天又能容於三萬二千師子之座皆高八萬四千由旬其一丈量初無所改良以三脫不思議力使之然也今即常身歎尊特相義豈不然微妙寂滅斯言得矣經文除此四大相外或歎放光拔苦與樂行業之因功德之果悉如經文但須皆作十番益解其有二小相以文顯故疏不指之即面貌如月乃第四十面淨如滿月也身無垢穢即十一身淨潔也五又讚一小相海臂𦟛纖圓如象王鼻記即第十四指長纖圓也𦟛丑凶反均也直也又音容六復讚二大相海手足柔蠕敬愛無厭記即第四手足柔軟勝餘身分三十二相八十種好具如法界次第龍尊智巧雖略而周三遍類讚去來諸佛數如微塵現在諸佛亦復如是如是如來我今悉禮身口清淨意亦如是以好香華供養奉獻百千功德讚詠歌歎文句從去來諸佛下是第三遍類讚諸佛法身平等一心一慧應化亦然特舉一佛一相以為讚端遍類諸佛亦復如是文殊問般若云念一佛功德與十方諸佛等即其義也身口清淨者有二解一云所讚者三業清淨我今悉禮二云能讚者清淨以好華香是身淨奉獻是意淨歌詠是口淨云云記三世塵數而言一者過去不滅未來不生現在不住法身平等報應無差一不離多多即是一生佛尚即佛佛豈殊是故讚一類於一切此文復是讚尊特身何者如前疏云若見四佛同尊特身一身一智慧即是常身弟子衆一故若四佛不同即是應化弟子衆多故故知秪就一身一智及常住義是尊特相不必須論現起大身也文殊問般若者問字誤也應作說字今家依二經明常坐三昧一文殊說般若二文殊問菩提今所引文是說般若文也四絶言讚二初分文文句從設以百舌下是第四絶言讚初三行半是絶言讚次二行是絶心讚記二隨釋二初絶言令兼例絶心初絶言讚設以百舌於千劫中歎佛功德不能得盡如來所有現世功德種種深固微妙第一設復千舌欲讚一佛尚不能盡功德少分況欲歎美諸佛功德記二絶心讚大地及天以為大海乃至有頂滿其中水尚以一毛知其滴數無有能知佛一功德文句而有三番者或應擬三身絶言也一人百頭頭有百口口有百舌住壽千劫讚生身佛相好功德不能得盡一人千頭頭有千口口有千舌住壽萬劫讚尊特身佛相好功德不能得盡大地及天毛滴其水一切有心不能知法性身佛相好功德是故絶言絶心歎記三番者仍就分別門三身優劣不離分別有融即義學者應知五回向我今以禮讚歎諸佛身口意業悉皆清淨一切所修無量善業與諸衆生證無上道文句從我今下兩行總回向也記一回事向理即實際二回自向他即衆生際三回因向果即菩提際今闕實際菩提兼之謂無上道本性無上故也二發來世願二初分文立意文句從如是人王下二十五行半是第二廣發來願文為二初一行佛述後二十四行半是龍尊發願文為五別初五行夜夢晝說願次兩行為他取淨土願次兩行半同求記莂願次三行下化願次十二行上求願其間細釋可尋問諸願皆剋此中何不與記答法伴未來來在不久云云記來在不久者即下授記品十千天子從忉利天來者是也二隨經釋義二初佛述如是人王讚歎佛已復作如是無量誓願記二龍尊發來願五初夜夢晝說願若我來世無量無邊阿僧祇劫在在生處常於夢中見妙金鼓得聞懺悔深奧之聲今所讚歎面貌清淨願我來世亦得如是諸佛功德不可思議於百千劫甚難得值願於當來無量之世夜則夢見晝如實說記二為他取淨土願我當具足修行六度濟拔衆生越於苦海然後我身成無上道令我世界無與等者記不修六度不拔衆生二無由淨當知四修及拔四相令於當世見我三身三同求記莂願奉貢金鼓讚佛因緣以此果報當來之世值釋迦佛得受記莂并令二子金龍金光常生我家同共受記記以鼓必具圓空鳴義今讚如來一體三身名為金鼓讚佛因緣以此因緣趣向果地名為奉貢不論事相金鼓形也四下化願若有衆生無救護者衆苦逼切無所依止我於當來為是等輩作大救護及依止處能除衆苦悉令滅盡施與衆生諸善安樂記五上求願我未來世行菩提道不可劫數如盡本際以此金光懺悔因緣使我惡海及以業海煩惱大海悉竭無餘我功德海願悉成就智慧大海清淨具足無量功德助菩提道猶如大海珍寶具足以此金光懺悔力故菩提功德光明無礙慧光無垢照徹清淨我當來世身光普照功德威神光明𦦨盛於三界中最勝殊特諸功德力無所減少當度衆生越於苦海并復安置功德大海來世多劫行菩提道如昔諸佛行菩提者三世諸佛淨妙國土諸佛至尊無量功德令我來世得此殊異功德淨土如佛世尊記此之二願皆明滅惡生善二益在文可見三結會二世事信相當知爾時國王金龍尊者則汝身是爾時二子金龍金光今汝二子銀相等是文句從信相當知下兩行是第三結會古今如文記四空品導成二初品題金光明經空品第五記句文分二初正釋題二初約四教詮空示所言空者破相為義故一代教四空不同若不辨之迷名昧理此自分二初約部列四二初正判四空文句夫空者應有四種謂滅色入空即色是空滅邊入空即邊是空記滅色入空者三藏教也且寄色言諸法皆滅謂析破見愛陰乃不生既詮實有滅方入空也即色是空者通教也體乎因果非四性生既詮幻有故即色是空也滅邊入空者別教也中道為空不唯空有亦乃空空然不知中具於空有是故次第滅二邊已方入中空也即邊是空者圓教也中道具德何邊不中唯假唯空三皆絶待頓破諸相名即邊空二約部須四文句此經通諸乘懺悔應須四種空記判教屬通三乘同懺前攝三藏後通別圓導成之空合論四種故四空慧不得不明二定品唯圓二初直示唯圓二初就理示文句而今品但標空者專是即邊而空也記示機用四此乃通塗品在圓空斯為的旨是故中空即邊而示二引文示文句何故爾經云無量餘經已廣說空是故此中略而解說也記諸部般若廣示衍中三教空慧復以三藏為助道觀斯為聞持利根之者廣談空相此空慧機義持雖利聞持根鈍故不廣談四種空相唯說即邊一中空慧二略示圓相文句又空者空有空無空有者空二十五之塊有空無者空二乘之灰無兩邊清淨名之為空記中受空名意彰蕩相凡夫執有塊然質礙二乘證無灰滅歸寂中觀絶念空此兩邊令畢竟淨約次不次分於別圓今不次也二約六句對中簡二初明用句意文句直作此說惑者迷名濫理不能超悟今作六句分別記若直說空是中道義能空二邊其如邪小及以別教皆說雙非空於有無故迷名者謂與今同何能超悟邊即中空又復恐謂若是圓實合談中道那但名空空唯離有豈此中道雙離二邊為防此計故作相破相修相即三雙六句而對辨之若諸法相名相濫者無此六句莫辨異同二正用句簡二初列六句文句空破非有非無非有非無破空空修非有非無非有非無修空空即非有非無非有非無即空記雙非是中沒於中名存雙非者以中道名邪小稀立若雙非名處處皆有故特用之對今圓空辨於同異又外道二乘別教空句及雙非句體是思議可破壞法圓教雙非及空若立諸義皆滅是以圓二互破諸二又復諸二互修圓二則二酥中外道菩薩入圓者是二乘初心亦有修義此之兩雙諸二對圓優劣有異第三一雙屬圓當教名別體同是故相即不言修破二釋句相三初釋相破句二初空破中二初略示文句空破非有非無者所謂凡邪非有非無見二乘偏住非有非無證別教教道執非有非無門悉為空品空所破也記以理定詮不遭名惑豈聞雙非便是實理蓋能了知凡邪雙非體是見惑二乘雙非但證偏真別教雙非既存教道未與三融圓空若立前諸雙非須皆銷殞故云破也二廣釋三初破凡邪雙非二初泛示見相二初正示文句凡邪之見多種一單四見二復四見三具足四見單四見可解復四見者謂有有有無無有無無亦有亦無有亦有亦無無非有非無有非有非無無此是復四見具足四見者於一句中具有四句四四十六句故名具足也記復四者復猶重也謂於一句更計有無即執有是有執有是無乃至雙非是有雙非是無具足之見其計轉巧故於句句皆生四計二結過文句雖單復具足皆苦集浩然記三種四句雖轉巧細以執一為實餘皆妄語見愛尤盛業苦無涯浩然如海二正破第四二初示所破邪計文句雖計為非有非無實是妄見記雙非是惑不入真中實是虛妄二明能破圓空文句故為空品空所破也記二破二乘雙非二初泛明證相二初明證相文句二乘偏住非有非無證者斷常見故言非有斷斷見故言非無有無二見滅無餘三界見思永已盡生滅度想生安隱想梵行已立所作已辦不受後有保此而已不復進求三菩提記二乘雙非雖非中實而離斷常諦於真理未至寶渚已到化城寧不安隱梵行等者無學四智四中但闕我生已盡以滅度等當之力足由保此故不求遍知二示四門文句但二乘發真斷常見斷斷見其門不同或從有門入如阿毗曇或從無門入如成實論或從亦有亦無門入如昆勒或從非有非無門入如那陀迦旃延經記阿毗曇此云無比法詮有門觀法拘鄰五人千二百羅漢皆此門入成實論詮空門觀法須菩提此門入昆勒此云篋藏彼論詮於雙亦觀法故大論云若不得般若波羅蜜多入阿毗曇則墮有中若入空門則墮無中若入昆勒則墮有無中那陀等者釋論明佛垂滅阿難問車匿佛答云惡性車匿吾涅槃後心漸調伏當為說陀那迦旃延經即雙非門也四門觀法假人本無四門不異而其實法四相不同有門則念念生滅空門則三假浮虛雙亦門則有無從容雙非門則有無俱遣隨依一觀可以發真三藏四門其意略爾二正示破中二初示所破假名中文句離斷離常名聖中道四門俱斷斷常名同中道實是保偏取證記中道之名大略有二一離斷常稱為中道有名無體屬前二教二者佛性稱為中道此有實體屬後二教今論雙非斷常二見得中道名其實全非妙色妙心故無中體故情想不忘保偏取證此以沙礫謂琉璃珠也二示能破畢竟空文句故為空品空所破也記斯乃今品即邊之空若發此空假名中壞是為空破非有非無三破別教雙非門三初示迷門起失二初舉意明失二初舉意文句別教教道執非有非無門者佛為鈍根菩薩方便權巧作四門說中道如彼筏喻記別人望圓其根名鈍非四說四名為權巧筏喻者四門意在入理簰筏意在度川若執門起諍如檐筏馳道故筏喻經云法尚應捨何況非法二明失文句不得意者四門成諍記失於融攝是一非三二示四門相文句故涅槃云真善妙有大般涅槃空佛性亦色非色非色非非色記亦色非色雙亦門也非色非非色雙非門也二明失故須破文句若各執一門則於如來有諍訟心不見中道執此教門猶為空品空所破也記此之執諍非即邊空無由可破三引證示失相文句新本云初地菩薩欲行有相道斯即一門之意也文中悉有四門之說大經云自此之前我等悉名邪見人也記經談初地被於地前悉有四門者經云初地菩薩欲行有相道即有門於無相法多用功力即空門一意欲入涅槃一意欲入生死即兩亦門微妙祕密之藏修行未足即雙非門大經下明今之得顯前之失前屬別門執諍邪見非是外道邪見也二明中破空文句非有非無破空者還是凡邪之空見二乘之空證教道之空門墮在二邊故為中道非有非無所破也記二明相修句二初明諸空修圓中文句相修者見空證空教道空應修中道非有非無也記凡邪空見二乘空證別教空門既隨二邊若聞圓中皆須即邊而觀中道二諸雙非修圓空文句非有非無見非有非無證非有非無教門應修中道空也記若邪小及別教門雖曰雙非皆成取相皆須修於三諦俱空名畢竟空由諸雙非及諸空句非究竟道是九界法是故皆須修於圓教空中妙觀歸祕密藏三釋相即句雖諸經論說空說中名相多少中若即邊空蕩三諦此則圓教一體異名是相即義不須相破及互修也二初明圓教空中不二二初直示不二文句相即者破二邊空即是中道非有非無中道非有非無即是破二邊空無二無別記二引般若結文句般若是一法佛說種種名空即是非有非無記實相觀照文字三種般若即三而一故是一法即一而三立名何極得此意者一切異名無不相即二明今品略說名空文句而不以非有非無為名者為略說故故言空品也記文約義豐空無不盡以被義持根利之者故以略名而標品目二明來意二初導成上品二初正示二初導二用文句此品來意者懺品破惡讚品生善空品導成滅惡生善也記若其不了即邊是空懺非無生破惡不盡讚非稱性生善不深善不深故豈成智德惡不盡故豈成斷德鈍根之者於前未悟故於今品圓談空慧導前懺歎令成二用二成三章文句亦是導成用宗體等記懺歎是用如向說之導成宗者萬行之因以無所得方證三身非畢竟空豈無所得是故圓空導於萬行成果德宗導成體者深廣法性遍一切法二種我故生死浩然今以二空導一切法顯成經體二引證文句故釋論云若以無此空一切無所作導成上品故明空品也記論明一切以體宗用攝無不盡二開悟鈍根文句又常果顯體滅惡生善非不明空利者已解為鈍根故起大悲心更明五陰生法本性空寂爾記圓空具德一切清淨故談常宗及顯性體懺歎二用皆是究竟清淨之法豈有一句暫離圓空如云一切衆生皆是般若即此意也利根聞上已解空義今為鈍根未解之者特論生法境觀皆空俾成上義音釋經躁音躁動也潦音老潦大水也戮音律辱殺也鑄音注鑄鎔鑄也鋌音定鋌銅鐵璞文句泄音泄氎音跌㲲毛布也記殫罄殫音丹殫盡也罄音慶罄器中空也儛杅儛音舞義同杅音于杅盆也娠音身妊娠也簰當作𥴖音排
